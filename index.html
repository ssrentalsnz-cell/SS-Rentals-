/* ─── DOCUMENT GENERATION ENGINE ────────────────── */
const DOC_LOG_KEY = 'ss_rentals_doc_log';
const loadDocLog = () => { try { return JSON.parse(localStorage.getItem(DOC_LOG_KEY)||'[]'); } catch { return []; } };
const saveDocLog = log => localStorage.setItem(DOC_LOG_KEY, JSON.stringify(log));

const generateDocData = (hire) => {
  const cust = getAllCustomers().find(c=>c.id===hire.customer) || {};
  const truck = TRUCKS.find(t=>t.id===hire.truck) || {};
  const trailer = TRAILERS.find(t=>t.id===hire.trailer);
  const now = new Date();
  const day = now.getDate();
  const suffix = day===1?'st':day===2?'nd':day===3?'rd':'th';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const agreementDate = `${day}${suffix} ${months[now.getMonth()]} ${now.getFullYear()}`;
  const fmtDoc = d => { if(!d) return ''; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; };

  // Dynamic document title based on what's being hired
  const hasTruck = !!truck.rego;
  const hasTrailer = !!trailer?.rego;
  let docTitle = 'Truck and Trailer Lease Agreement';
  if (hasTruck && !hasTrailer) docTitle = 'Truck Lease Agreement';
  else if (!hasTruck && hasTrailer) docTitle = 'Trailer Lease Agreement';
  else docTitle = 'Truck and Trailer Lease Agreement';

  return {
    hireId: hire.id,
    docTitle,
    agreementDate,
    hirerCompany: cust.company || '',
    hirerContact: cust.contact || '',
    hirerDirector: cust.director || cust.contact || '',
    startDate: fmtDoc(hire.start),
    endDate: fmtDoc(hire.end),
    weeklyRate: (hire.weekly_truck||0).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}),
    weeklyTrailer: (hire.weekly_trailer||0).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}),
    mileageRate: (hire.mileage_rate||0.18).toString(),
    rucRate: (hire.ruc_rate||0.062).toString(),
    bond: (hire.bond||2500).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}),
    maxMileage: hire.max_mileage || '',
    docTitle: hire.trailer
      ? 'Truck and Trailer Lease Agreement'
      : (hire.truck ? 'Truck Lease Agreement' : 'Trailer Lease Agreement'),
    guarantorName: cust.contact || '',
    guarantorAddress: cust.address || '',
    guarantorPhone: cust.phone || '',
    truckMake: truck.make||'',
    truckModel: truck.model||'',
    truckYear: (truck.year||'').toString(),
    truckRego: truck.rego||'',
    truckVIN: truck.vin||'',
    truckDesc: truck.description||`${truck.make||''} ${truck.model||''}`,
    truckColour: truck.colour||'White',
    truckCOF: fmtDoc(truck.cof_expiry),
    truckRego2: fmtDoc(truck.rego_expiry),
    trailerMake: trailer?.make||'',
    trailerModel: trailer?.model||'',
    trailerYear: (trailer?.year||'').toString(),
    trailerRego: trailer?.rego||'',
    trailerDesc: trailer?`${trailer.make||''} ${trailer.model||''}`:'',
    trailerColour: trailer?.colour||'White',
    trailerCOF: fmtDoc(trailer?.cof_expiry),
    trailerRegoExp: fmtDoc(trailer?.rego_expiry),
    guarantorName: cust?.guarantor_name || cust?.contact || '',
    guarantorAddress: cust?.address || '',
    guarantorPhone: cust?.phone || '',
  };
};

/* ─── HIRE AGREEMENT GENERATOR MODAL ─────────────────── */
const HireDocModal = ({hire, onClose}) => {
  const [generating, setGenerating] = useState(false);
  const [generated, setGenerated] = useState(false);
  const [docData, setDocData] = useState(() => generateDocData(hire));
  const [editMode, setEditMode] = useState(false);
  const cust = getAllCustomers().find(c=>c.id===hire.customer);
  const truck = TRUCKS.find(t=>t.id===hire.truck);
  const trailer = TRAILERS.find(t=>t.id===hire.trailer);

  const sv = (k,v) => setDocData(p=>({...p,[k]:v}));

  const handleGenerate = async () => {
    setGenerating(true);
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 100,
          messages: [{ role: 'user', content: 'Reply with only: {"status":"ok"}' }]
        })
      });
      // Documents are generated client-side using the in-browser approach
      // Log the document generation
      const log = loadDocLog();
      log.unshift({ id: 'DOC'+Date.now(), hireId: hire.id, customer: cust?.company, type: 'both', generatedAt: new Date().toISOString(), data: docData });
      saveDocLog(log);
      setGenerated(true);
    } catch(e) {}
    setGenerating(false);
  };

  const downloadPDF = (type) => {
    const d = docData;
    const label = type==='schedule' ? 'Schedule' : (d.docTitle||'Agreement').replace(/\s+/g,'_');
    const filename = `${label}_${d.hireId}_${d.hirerCompany.replace(/\s+/g,'_')}.pdf`;
    const html = type === 'schedule' ? generateScheduleHTML(d) : generateAgreementHTML(d);
    // Inject auto-print script and suggested filename into the HTML
    const printHTML = html.replace('</head>', '<scr'+'ipt>window.onload=function(){document.title="'+filename.replace('.pdf','')+'";setTimeout(function(){window.print();},400);};</'+'script><style>@media print{@page{size:A4;margin:1.5cm}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style></head>');
    const win = window.open('', '_blank');
    if (!win) { alert('Please allow pop-ups for this site to download PDF documents.'); return; }
    win.document.write(printHTML);
    win.document.close();
    // Log download
    const log = loadDocLog();
    log.unshift({ id: 'DOC'+Date.now(), hireId: hire.id, customer: cust?.company, type, generatedAt: new Date().toISOString(), downloaded: true });
    saveDocLog(log);
  };

  const copyForDocuSign = () => {
    const d = docData;
    const text = `Hire Agreement ${d.hireId}\nCustomer: ${d.hirerCompany}\nContact: ${d.hirerContact}\nTruck: ${d.truckRego} ${d.truckMake} ${d.truckModel}\n${d.trailerRego?'Trailer: '+d.trailerRego+'\n':''}Start: ${d.startDate}\nEnd: ${d.endDate}\nWeekly Rate: $${d.weeklyRate}\nRUC: $${d.rucRate}/km\nMileage: $${d.mileageRate}/km\nBond: $${d.bond}`;
    navigator.clipboard.writeText(text).then(()=>alert('Hire details copied — paste into DocuSign template'));
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:720}}>
        <div className="modal-header">
          <span className="modal-title"><Icon name="template" size={18}/> {docData.docTitle||'Lease Agreement'} — {hire.id}</span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">
          {/* Summary card */}
          <div style={{background:'var(--bg3)',borderRadius:10,padding:'14px 16px',marginBottom:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
            {[
              ['Customer', cust?.company||'—'],
              ['Truck', truck?`${truck.rego} ${truck.make} ${truck.model}`:'—'],
              ['Trailer', trailer?`${trailer.rego} ${trailer.make}`:'None'],
              ['Period', `${docData.startDate} — ${docData.endDate}`],
              ['Weekly Rate', `$${docData.weeklyRate}/wk`],
              ['Bond', `$${docData.bond}`],
            ].map(([l,v])=>(
              <div key={l} style={{padding:'6px 10px',background:'var(--bg4)',borderRadius:6}}>
                <div style={{fontSize:10,color:'var(--text3)',marginBottom:1}}>{l}</div>
                <div style={{fontWeight:700}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Edit toggle */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13}}>Document Details</div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setEditMode(e=>!e)}>
              <Icon name="edit" size={13}/> {editMode?'Done Editing':'Edit Fields'}
            </button>
          </div>

          {editMode ? (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[
                ['agreementDate','Agreement Date'],['hirerCompany','Hirer Company'],['hirerContact','Hirer Contact'],
                ['startDate','Start Date (dd/mm/yyyy)'],['endDate','End Date (dd/mm/yyyy)'],
                ['weeklyRate','Weekly Rate ($)'],['mileageRate','Mileage Rate ($/km)'],
                ['rucRate','RUC Rate ($/km)'],['bond','Bond Amount ($)'],
                ['truckRego','Truck Rego'],['truckMake','Truck Make'],['truckModel','Truck Model'],
                ['truckYear','Truck Year'],['truckCOF','Truck COF Expiry'],['truckRego2','Truck Rego Expiry'],
                ['trailerRego','Trailer Rego (blank if none)'],['trailerMake','Trailer Make'],['trailerCOF','Trailer COF Expiry'],
                ['guarantorName','Guarantor Full Name'],['guarantorAddress','Guarantor Address'],['guarantorPhone','Guarantor Phone'],
              ].map(([k,l])=>(
                <div key={k} className="form-group" style={{marginBottom:0}}>
                  <label style={{fontSize:11}}>{l}</label>
                  <input value={docData[k]||''} onChange={e=>sv(k,e.target.value)} style={{fontSize:12,padding:'6px 8px'}}/>
                </div>
              ))}
            </div>
          ) : (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16,fontSize:11}}>
              {Object.entries(docData).filter(([k])=>!['hireId'].includes(k)).map(([k,v])=>(
                <div key={k} style={{padding:'5px 8px',background:'var(--bg3)',borderRadius:5}}>
                  <div style={{color:'var(--text3)',marginBottom:1,textTransform:'capitalize'}}>{k.replace(/([A-Z])/g,' $1').trim()}</div>
                  <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v||'—'}</div>
                </div>
              ))}
            </div>
          )}

          {/* Action buttons */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>downloadPDF('schedule')} style={{justifyContent:'center'}}>
              <Icon name="download" size={14}/> Download Schedule
            </button>
            <button className="btn btn-primary" onClick={()=>downloadPDF('agreement')} style={{justifyContent:'center'}}>
              <Icon name="download" size={14}/> Download Agreement
            </button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button className="btn btn-ghost" onClick={copyForDocuSign} style={{justifyContent:'center',borderColor:'#F9A825',color:'#F9A825'}}>
              📋 Copy for DocuSign
            </button>
            <a href="https://www.docusign.com" target="_blank" rel="noopener noreferrer" className="btn btn-ghost"
              style={{justifyContent:'center',borderColor:'#F9A825',color:'#F9A825',textDecoration:'none'}}>
              ✉ Open DocuSign ↗
            </a>
          </div>
          <div style={{marginTop:12,padding:'10px 12px',background:'var(--bg3)',borderRadius:8,fontSize:11,color:'var(--text3)',lineHeight:1.6}}>
            <strong>How to use:</strong> Download the HTML files → open in Chrome → File → Print → Save as PDF → upload to DocuSign for digital signature. Or print and sign physically.
          </div>
        </div>
      </div>
    </div>
  );
};

<h1>${title}</h1>
<p class="intro"><strong>THIS LEASE AGREEMENT</strong> ("Agreement") is made and entered into on <strong>${d.agreementDate}</strong> between:</p>
<div class="parties-box">

<p>SS Rentals and the Hirer agree that SS Rentals will lease to the Hirer the vehicle(s) described in the Schedule attached hereto ("Schedule"), on the terms and conditions set out in this Agreement.</p>

<h2>1. Definitions</h2>
<p><strong>"Agreement"</strong> means this Lease Agreement including all Schedules.</p>
<p><strong>"Commencement Date"</strong> means the date the Hirer takes possession of the vehicle(s).</p>
<p><strong>"Lease Term"</strong> means the period from the Commencement Date to the Return Date as specified in the Schedule.</p>

                  <label className="form-label">Commencement Date</label>
                  <input className="form-control" type="date" value={form.startDate} onChange={e=>set('startDate',e.target.value)}/>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label className="form-label">Return / End Date</label>
                  <input className="form-control" type="date" value={form.endDate} onChange={e=>set('endDate',e.target.value)}/>
                </div>
                {inputRow('weeklyRate','Weekly Rate (NZD, excl. GST)','number')}
                {inputRow('monthlyRate','Monthly Lease Rate (NZD, excl. GST)','number')}
                {inputRow('bond','Bond Amount (NZD)','number')}
                {inputRow('mileageRate','Mileage Rate ($/km)','number')}
                {inputRow('rucRate','RUC Rate ($/km)','number')}
                <div className="form-group" style={{marginBottom:0,gridColumn:'span 2'}}>
                  <label className="form-label">Maximum Mileage <span style={{fontWeight:400,color:'var(--text3)'}}>— appears on schedule (e.g. 130,000 km p.a.)</span></label>
                  <input className="form-control" placeholder="Leave blank for default" value={form.maxMileage} onChange={e=>set('maxMileage',e.target.value)}/>
                </div>
                <div className="form-group" style={{marginBottom:0,gridColumn:'span 2'}}>
                  <label className="form-label">Additional Notes</label>
                  <textarea className="form-control" rows={2} value={form.notes} onChange={e=>set('notes',e.target.value)} style={{resize:'vertical'}}/>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <button className="btn btn-ghost" onClick={()=>setLeaseStep(2)}>← Back</button>
                <button className="btn btn-primary" onClick={()=>setLeaseStep(4)}>Next: Personal Guarantee →</button>
              </div>
            </div>
          )}

          {/* Step 4 — Guarantee */}
          {leaseStep===4&&(
            <div className="card">
              <div className="card-header"><span className="card-title">Step 4 — Personal Guarantee</span></div>
              <div style={{padding:'12px 14px',background:'rgba(106,27,154,0.07)',border:'1px solid rgba(106,27,154,0.2)',borderRadius:8,marginBottom:16,fontSize:12,color:'var(--text2)'}}>
                The guarantor is jointly and severally liable for all obligations. These details appear in the Personal Guarantee clause.
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
                <div className="form-group" style={{marginBottom:0,gridColumn:'span 2'}}><label className="form-label">Guarantor Full Name</label><input className="form-control" value={form.guarantorName||''} onChange={e=>set('guarantorName',e.target.value)}/></div>
                <div className="form-group" style={{marginBottom:0,gridColumn:'span 2'}}><label className="form-label">Guarantor Address</label><input className="form-control" value={form.guarantorAddress||''} onChange={e=>set('guarantorAddress',e.target.value)}/></div>
                {inputRow('guarantorPhone','Guarantor Phone')}
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <button className="btn btn-ghost" onClick={()=>setLeaseStep(3)}>← Back</button>
                <button className="btn btn-primary" onClick={()=>setLeaseStep(5)}>Next: Review & Download →</button>
              </div>
            </div>
          )}

          {/* Step 5 — Review & Download */}
          {leaseStep===5&&(
            <div className="card">
              <div className="card-header">
                <span className="card-title">Step 5 — Review & Download</span>
                <span className="badge badge-blue">{form.docType}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
                {[['Company',form.companyName||'—'],['Contact',form.contactName||'—'],['Phone',form.contactPhone||'—'],
                  ['Truck',form.truckRego?`${form.truckRego} — ${form.truckMake} ${form.truckModel}`:'—'],
                  ['Trailer',form.trailerRego||'None'],['Weekly Rate',form.weeklyRate?`$${form.weeklyRate}/wk`:'—'],
                  ['Start Date',fmtDocDate(form.startDate)||'—'],['End Date',fmtDocDate(form.endDate)||'—'],['Bond',`$${form.bond}`],
                  ['Monthly Rate',form.monthlyRate?`$${form.monthlyRate}/mo`:'—'],['Mileage Rate',`$${form.mileageRate}/km`],['RUC Rate',`$${form.rucRate}/km`],['Guarantor',form.guarantorName||'—'],
                ].map(([l,v])=>(
                  <div key={l} style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:7}}>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>{l}</div>
                    <div style={{fontWeight:700,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</div>
                  </div>
                ))}
              </div>
              {!form.companyName&&<div style={{padding:'10px 14px',background:'rgba(255,111,0,0.1)',border:'1px solid rgba(255,111,0,0.3)',borderRadius:8,marginBottom:16,fontSize:13,color:'#FF6F00'}}>⚠️ Company name is required.</div>}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <button className="btn btn-primary" onClick={()=>handleDownload('agreement')} style={{justifyContent:'center'}} disabled={!form.companyName}>
                  <Icon name="download" size={14}/> Download Lease Agreement (PDF)
                </button>
                <button className="btn btn-primary" onClick={()=>handleDownload('schedule')} style={{justifyContent:'center'}} disabled={!form.companyName}>
                  <Icon name="download" size={14}/> Download Truck Schedule (PDF)
                </button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <button className="btn btn-ghost" onClick={handleSave} style={{justifyContent:'center',borderColor:'#27AE60',color:'#27AE60'}}>
                  💾 Save to Documents
                </button>
                <button className="btn btn-ghost" onClick={()=>{setForm(emptyLease());setLeaseStep(1);}} style={{justifyContent:'center'}}>
                  🔄 Start New Agreement
                </button>
              </div>
              <div><button className="btn btn-ghost" onClick={()=>setLeaseStep(4)}>← Back</button></div>
            </div>
          )}
        </div>
      )}

      {/* ── SAVED AGREEMENTS TAB ─────────────────────── */}
      {tab==='saved'&&(
        <div>
          {savedAgreements.length===0 ? (
            <div className="card" style={{textAlign:'center',padding:'48px 20px',color:'var(--text3)'}}>
              <div style={{fontSize:40,marginBottom:12}}>📄</div>
              <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>No saved lease agreements yet</div>
              <div style={{fontSize:13,marginBottom:16}}>Create one using the "New Lease Agreement" tab and click "Save to Documents".</div>
              <button className="btn btn-primary" onClick={()=>setTab('lease-builder')}><Icon name="plus" size={14}/> Create New Lease Agreement</button>
            </div>
          ) : (
            <div>
              <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
                <button className="btn btn-primary" onClick={()=>{setForm(emptyLease());setLeaseStep(1);setTab('lease-builder');}}>
                  <Icon name="plus" size={14}/> New Lease Agreement
                </button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
                {savedAgreements.map(a=>(
                  <div key={a.id} className="card" style={{padding:'16px 18px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                      <div style={{width:40,height:40,borderRadius:9,background:'rgba(106,27,154,0.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <Icon name="documents" size={20} color="#6A1B9A"/>
                      </div>
                      <div style={{flex:1,overflow:'hidden'}}>
                        <div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.form.companyName||'Unnamed'}</div>
                        <div style={{fontSize:11,color:'var(--text3)'}}>{a.form.docType}</div>
                      </div>
                    </div>
                    <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}><strong>Contact:</strong> {a.form.contactName||'—'} · {a.form.contactPhone||'—'}</div>
                    <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}><strong>Truck:</strong> {a.form.truckRego||'—'} {a.form.truckMake} {a.form.truckModel}</div>
                    <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}><strong>Period:</strong> {fmtDocDate(a.form.startDate)||'—'} — {fmtDocDate(a.form.endDate)||'—'}</div>
                    <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}><strong>Rate:</strong> ${a.form.weeklyRate||'—'}/wk · Bond: ${a.form.bond||'—'}</div>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:12}}>Saved: {new Date(a.savedAt).toLocaleDateString('en-NZ')}</div>
                    <div style={{display:'flex',gap:8}}>
                      <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}} onClick={()=>handleLoad(a)}>
                        <Icon name="edit" size={12}/> Open & Edit
                      </button>
                      <button className="btn btn-ghost btn-sm" style={{color:'#d32f2f',borderColor:'#d32f2f'}} onClick={()=>{if(window.confirm('Delete this saved agreement?'))handleDelete(a.id);}}>
                        <Icon name="close" size={12}/>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};
/* ─── NAVMAN PAGE ─────────────────────────────────── */
const NAVMAN_DATA_KEY = 'ss_rentals_navman_data';
const loadNavmanData = () => { try { return JSON.parse(localStorage.getItem(NAVMAN_DATA_KEY)||'null'); } catch { return null; } };
const saveNavmanData = d => localStorage.setItem(NAVMAN_DATA_KEY, JSON.stringify(d));

const NavmanPage = () => {
  const initKm = () => {
    const saved = loadNavmanData();
    const defaults = {};
    TRUCKS.forEach(t => { defaults[t.id] = { weekly_km: t.weekly_km, odometer: t.odometer, location: t.location, updated: null }; });
    return saved ? { ...defaults, ...saved } : defaults;
  };
  const [kmData, setKmData] = useState(initKm);
  const [editing, setEditing] = useState(false);
  const [editVals, setEditVals] = useState({});
  const [saved, setSaved] = useState(false);
  const [tab, setTab] = useState('weekly');
  const [history] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ss_rentals_navman_history')||'[]'); } catch { return []; }
  });

  const totalKm = Object.values(kmData).reduce((a,v)=>a+(v.weekly_km||0),0);
  const totalRUC = TRUCKS.reduce((a,t)=>{
    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
    const rate = h?.ruc_rate||0.062;
    return a + (kmData[t.id]?.weekly_km||0)*rate;
  },0);
  const totalMileage = TRUCKS.reduce((a,t)=>{
    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
    const rate = h?.mileage_rate||0;
    return a + (kmData[t.id]?.weekly_km||0)*rate;
  },0);

  const startEdit = () => {
    const vals = {};
    TRUCKS.forEach(t => { vals[t.id] = { weekly_km: kmData[t.id]?.weekly_km||0, odometer: kmData[t.id]?.odometer||t.odometer, location: kmData[t.id]?.location||t.location }; });
    setEditVals(vals);
    setEditing(true);
  };

  const saveEdit = () => {
    const now = new Date().toISOString();
    const updated = {};
    TRUCKS.forEach(t => { updated[t.id] = { ...editVals[t.id], updated: now }; });
    setKmData(updated);
    saveNavmanData(updated);
    // Save to history
    const hist = JSON.parse(localStorage.getItem('ss_rentals_navman_history')||'[]');
    hist.unshift({ date: now, entries: updated });
    if (hist.length > 12) hist.pop();
    localStorage.setItem('ss_rentals_navman_history', JSON.stringify(hist));
    setEditing(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const weekStr = () => {
    const now = new Date();
    const mon = new Date(now); mon.setDate(now.getDate() - now.getDay() + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return `${mon.toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})} – ${sun.toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'})}`;
  };

  return (
    <div>
      {/* Status bar */}
      <div className="card card-sm mb-4" style={{borderLeft:'3px solid var(--orange)',display:'flex',alignItems:'center',gap:16}}>
        <Icon name="navman" size={22} color="var(--orange)"/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13}}>Teletrac Navman — Manual Entry Mode</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>API key requested — awaiting Teletrac Navman approval. Enter weekly km manually below. Will auto-upgrade to live data once API key arrives.</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {saved&&<span className="badge badge-green">✓ Saved</span>}
          <button className="btn btn-primary btn-sm" onClick={startEdit}><Icon name="edit" size={13}/> Update This Week</button>
        </div>
      </div>

      {/* KPI row */}
      <div className="grid grid-4 mb-4">
        {[
          {l:'Active Vehicles',v:TRUCKS.filter(t=>t.status==='on_hire').length+' of '+TRUCKS.length},
          {l:'Total KM This Week',v:totalKm.toLocaleString()+' km'},
          {l:'RUC Charges This Week',v:fmtCur(totalRUC)},
          {l:'Mileage Revenue This Week',v:fmtCur(totalMileage)},
        ].map(k=>(
          <div key={k.l} className="card card-sm"><div className="kpi-label">{k.l}</div><div style={{fontSize:20,fontWeight:800,marginTop:4}}>{k.v}</div></div>
        ))}
      </div>

      <div className="tabs mb-4">
        {['weekly','history'].map(t=><button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t==='weekly'?'This Week':'Entry History'}</button>)}
      </div>

      {tab==='weekly'&&(
        <div>
          {/* Week header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>Week: {weekStr()}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Enter odometer readings and km travelled per truck this week</div>
            </div>
          </div>

          {/* Per-truck entry cards */}
          <div className="grid" style={{gap:14,marginBottom:20}}>
            {TRUCKS.map(t => {
              const d = kmData[t.id] || {};
              const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
              const milRate = h?.mileage_rate||0;
              const rucRate = h?.ruc_rate||0.062;
              const km = d.weekly_km||0;
              const milCharge = km * milRate;
              const rucCharge = km * rucRate;
              const ev = editVals[t.id] || {};
              return (
                <div key={t.id} className="card" style={{borderLeft:`3px solid ${t.status==='on_hire'?'var(--blue)':'var(--border2)'}`}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:16}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                        <span style={{fontWeight:800,fontSize:16}}>{t.rego}</span>
                        <span style={{fontSize:12,color:'var(--text2)'}}>{t.make} {t.model}</span>
                        <span className={statusBadge(t.status)}>{statusLabel(t.status)}</span>
                        {t.hirer&&<span style={{fontSize:12,color:'var(--text3)'}}>→ {custName(t.hirer)}</span>}
                      </div>
                      {editing ? (
                        <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
                          <div className="form-group" style={{marginBottom:0}}>
                            <label>Weekly KM</label>
                            <input type="number" value={ev.weekly_km||''} onChange={e=>setEditVals(v=>({...v,[t.id]:{...v[t.id],weekly_km:parseInt(e.target.value)||0}}))} placeholder="e.g. 3500"/>
                          </div>
                          <div className="form-group" style={{marginBottom:0}}>
                            <label>Current Odometer (km)</label>
                            <input type="number" value={ev.odometer||''} onChange={e=>setEditVals(v=>({...v,[t.id]:{...v[t.id],odometer:parseInt(e.target.value)||0}}))} placeholder="e.g. 354000"/>
                          </div>
                          <div className="form-group" style={{marginBottom:0}}>
                            <label>Current Location</label>
                            <input value={ev.location||''} onChange={e=>setEditVals(v=>({...v,[t.id]:{...v[t.id],location:e.target.value}}))} placeholder="e.g. Auckland — On Road"/>
                          </div>
                        </div>
                      ) : (
                        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10}}>
                          {[
                            ['Weekly KM', km>0?km.toLocaleString()+' km':'Not set', km>0?'var(--text)':'var(--text3)'],
                            ['Odometer', (d.odometer||t.odometer).toLocaleString()+' km','var(--text)'],
                            ['Location', d.location||t.location,'var(--text2)'],
                            ['Mileage Rate', milRate>0?'$'+milRate+'/km':'No charge','var(--text2)'],
                            ['Mileage Charge', milRate>0?fmtCur(milCharge):'—', milCharge>0?'var(--orange)':'var(--text3)'],
                            ['RUC Charge', fmtCur(rucCharge), 'var(--red-light)'],
                          ].map(([l,v,c])=>(
                            <div key={l} style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:8}}>
                              <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>{l}</div>
                              <div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  {!editing&&km>0&&(
                    <div style={{marginTop:12}}>
                      <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Weekly progress vs 3,000km target</div>
                      <div className="progress">
                        <div className="progress-bar" style={{width:`${Math.min(100,(km/3000)*100)}%`,background:km>4000?'var(--red)':km>3000?'var(--orange)':'var(--blue)'}}/>
                      </div>
                      <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>{km.toLocaleString()} km ({Math.round((km/3000)*100)}% of 3,000km target){km>4000?' — ⚠️ Excessive mileage':''}</div>
                    </div>
                  )}
                  {d.updated&&<div style={{fontSize:10,color:'var(--text3)',marginTop:8}}>Last updated: {new Date(d.updated).toLocaleString('en-NZ')}</div>}
                </div>
              );
            })}
          </div>

          {editing&&(
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginBottom:20}}>
              <button className="btn btn-ghost" onClick={()=>setEditing(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveEdit}><Icon name="check" size={14}/> Save Weekly Data</button>
            </div>
          )}

          {/* Weekly summary */}
          <div className="card" style={{borderLeft:'3px solid var(--green)'}}>
            <div className="card-header"><span className="card-title">Weekly Invoice Summary — Charges to Bill</span><span className="badge badge-blue">{weekStr()}</span></div>
            <div className="table-wrap" style={{border:'none',borderRadius:0,margin:'0 -20px'}}>
              <table>
                <thead><tr><th>Truck</th><th>Customer</th><th>Weekly Hire</th><th>KM This Week</th><th>Mileage Charge</th><th>RUC Charge</th><th>Total to Invoice</th></tr></thead>
                <tbody>
                  {TRUCKS.filter(t=>t.status==='on_hire').map(t=>{
                    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
                    const km = kmData[t.id]?.weekly_km||0;
                    const milCharge = km*(h?.mileage_rate||0);
                    const rucCharge = km*(h?.ruc_rate||0.062);
                    const total = (h?.weekly_truck||0)+(h?.weekly_trailer||0)+milCharge+rucCharge;
                    return (
                      <tr key={t.id}>
                        <td style={{fontWeight:700}}>{t.rego}</td>
                        <td>{custName(t.hirer)}</td>
                        <td style={{fontWeight:700}}>{fmtCur((h?.weekly_truck||0)+(h?.weekly_trailer||0))}</td>
                        <td style={{fontWeight:700}}>{km.toLocaleString()} km</td>
                        <td style={{color:'var(--orange)'}}>{milCharge>0?fmtCur(milCharge):'—'}</td>
                        <td style={{color:'var(--red-light)'}}>{fmtCur(rucCharge)}</td>
                        <td style={{fontWeight:800,fontSize:15}}>{fmtCur(total)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==='history'&&(
        <div>
          {history.length===0&&(
            <div className="card" style={{textAlign:'center',padding:40}}>
              <Icon name="navman" size={32} color="var(--text3)"/>
              <div style={{fontSize:14,color:'var(--text2)',marginTop:12}}>No history yet — save your first weekly entry to start tracking.</div>
            </div>
          )}
          {history.map((h,i)=>(
            <div key={i} className="card mb-4">
              <div className="card-header">
                <span className="card-title">Entry — {new Date(h.date).toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</span>
                <span style={{fontSize:12,color:'var(--text3)'}}>{new Date(h.date).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})}</span>
              </div>
              <div className="grid grid-4">
                {TRUCKS.map(t=>{
                  const d = h.entries?.[t.id];
                  if (!d) return null;
                  return (
                    <div key={t.id} style={{padding:'10px 12px',background:'var(--bg3)',borderRadius:8}}>
                      <div style={{fontWeight:700,marginBottom:6}}>{t.rego}</div>
                      <div style={{fontSize:12,color:'var(--text2)'}}>KM: <strong style={{color:'var(--text)'}}>{(d.weekly_km||0).toLocaleString()}</strong></div>
                      <div style={{fontSize:12,color:'var(--text2)'}}>Odo: <strong style={{color:'var(--text)'}}>{(d.odometer||0).toLocaleString()}</strong></div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{d.location}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ─── SETTINGS PAGE ───────────────────────────────── */

    {name:'Karen Mitchell',email:'karen@ssrentals.co.nz',role:'Accounts',status:'active',mfa:true},

/* ─── GOOGLE SHEETS SETUP MODAL ───────────────────── */
const SheetsSetupModal = ({open, onClose, onSave, initialConfig}) => {
  const [clientId, setClientId] = useState(initialConfig?.clientId||'');
  const [spreadsheetId, setSpreadsheetId] = useState(initialConfig?.spreadsheetId||'');
  const [step, setStep] = useState(1);
  const [status, setStatus] = useState(null); // {ok, msg}
  const [authing, setAuthing] = useState(false);

  const handleAuth = () => {
    if (!clientId || !spreadsheetId) { setStatus({ok:false,msg:'Please fill in both fields first.'}); return; }
    if (!window.google?.accounts?.oauth2) {
      setStatus({ok:false,msg:'Google Identity Services not loaded yet. Wait a moment and try again.'}); return;
    }
    setAuthing(true);
    setStatus(null);
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      callback: (resp) => {
        setAuthing(false);
        if (resp.error) {
          setStatus({ok:false, msg:`Auth error: ${resp.error} — ${resp.error_description||''}`});
          return;
        }
        onSave({
          clientId,
          spreadsheetId,
          accessToken: resp.access_token,
          tokenExpiry: Date.now() + (resp.expires_in||3600)*1000
        });
        onClose();
      },
      error_callback: (err) => {
        setAuthing(false);
        setStatus({ok:false, msg: err.type==='popup_closed' ? 'Popup was closed — please try again.' : `Error: ${err.type}`});
      }
    });
    client.requestAccessToken({prompt: initialConfig?.accessToken ? '' : 'consent'});
  };

  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:600}}>
        <div className="modal-header">
          <span className="modal-title" style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon name="sheets" size={20} color="#34A853"/> Google Sheets Live Sync
          </span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">
          <div style={{background:'rgba(52,168,83,0.08)',border:'1px solid rgba(52,168,83,0.25)',borderRadius:10,padding:'14px 16px',marginBottom:20,fontSize:13,lineHeight:1.7}}>
            <strong style={{color:'#34A853'}}>What gets synced (6 tabs):</strong><br/>
            Fleet &amp; Trailers &nbsp;·&nbsp; Customers &nbsp;·&nbsp; Hire Management &nbsp;·&nbsp; Invoices &nbsp;·&nbsp; Maintenance &nbsp;·&nbsp; P&amp;L Detail<br/>
            <span style={{color:'var(--text3)'}}>Auto-syncs every 5 minutes. Manual trigger available anytime.</span>
          </div>

          <div style={{display:'flex',gap:0,borderRadius:8,overflow:'hidden',border:'1px solid var(--border2)',marginBottom:20}}>
            {['1. Credentials','2. Authorise'].map((s,i)=>(
              <div key={s} style={{flex:1,padding:'10px',textAlign:'center',background:step===i+1?'var(--red)':'var(--bg3)',color:step===i+1?'#fff':'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}} onClick={()=>setStep(i+1)}>{s}</div>
            ))}
          </div>

          {step===1&&(
            <div>
              <div className="form-group">
                <label>Google OAuth 2.0 Client ID</label>
                <input value={clientId} onChange={e=>setClientId(e.target.value)} placeholder="123456789-abc...apps.googleusercontent.com"/>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>
                  <strong>console.cloud.google.com</strong> → APIs &amp; Services → Enable <em>Google Sheets API</em> → Credentials → Create OAuth 2.0 Client ID (Web Application type).
                </div>
              </div>
              <div className="form-group">
                <label>Google Spreadsheet ID</label>
                <input value={spreadsheetId} onChange={e=>setSpreadsheetId(e.target.value)} placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"/>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>
                  From your Google Sheet URL: docs.google.com/spreadsheets/d/<strong style={{color:'var(--text)'}}>THIS_PART</strong>/edit
                </div>
              </div>
              <div style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:16,fontSize:12,lineHeight:1.8,borderLeft:'3px solid var(--orange)'}}>
                <strong>Required setup in Google Cloud Console:</strong><br/>
                1. OAuth consent screen → App name: <em>SS Rentals</em> → User type: <em>External</em><br/>
                2. OAuth Client → Authorised JavaScript Origins → add: <code style={{background:'var(--bg4)',padding:'1px 6px',borderRadius:3}}>{window.location.origin}</code><br/>
                3. Make sure your Google account has <strong>edit access</strong> to the spreadsheet
              </div>
              <button className="btn btn-primary" onClick={()=>setStep(2)} disabled={!clientId||!spreadsheetId}>Continue →</button>
            </div>
          )}

          {step===2&&(
            <div>
              <div className="alert alert-green" style={{marginBottom:16}}>
                <Icon name="info" size={15}/>
                <div>Uses Google Identity Services (GIS) — Google&apos;s current secure auth method. A consent popup will appear. Your token stays in your browser only.</div>
              </div>
              <div style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:16,fontSize:12,lineHeight:1.8}}>
                <strong>Client ID:</strong> <code style={{fontSize:11,wordBreak:'break-all'}}>{clientId}</code><br/>
                <strong>Spreadsheet:</strong> <code style={{fontSize:11}}>{spreadsheetId}</code>
              </div>
              {status&&(
                <div className={`alert alert-${status.ok?'green':'red'}`} style={{marginBottom:14}}>
                  <Icon name={status.ok?'check':'warning'} size={15}/>
                  <span>{status.msg}</span>
                </div>
              )}
              <button className="btn btn-primary" onClick={handleAuth} disabled={authing} style={{background:'#34A853'}}>
                {authing
                  ? <><div style={{width:14,height:14,border:'2px solid #fff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/> Waiting for Google…</>
                  : <><Icon name="sheets" size={15}/> Sign in with Google &amp; Authorise</>
                }
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ─── SYNC STATUS BAR (header widget) ─────────────── */
const SyncStatusBar = ({syncState, onManualSync, onOpenSetup}) => {
  const [countdown, setCountdown] = useState(300);
  useEffect(()=>{
    if (!syncState.configured) return;
    const iv = setInterval(()=>{
      const elapsed = syncState.lastSync ? Math.floor((Date.now()-syncState.lastSync.getTime())/1000) : 300;
      setCountdown(Math.max(0,300-elapsed));
    },1000);
    return ()=>clearInterval(iv);
  },[syncState.lastSync, syncState.configured]);

  const mm = String(Math.floor(countdown/60)).padStart(2,'0');
  const ss2 = String(countdown%60).padStart(2,'0');
  const pct = (countdown/300)*100;

  if (!syncState.configured) {
    return (
      <button className="btn btn-ghost btn-sm" onClick={onOpenSetup} style={{gap:6,borderColor:'rgba(52,168,83,0.4)',color:'#34A853'}}>
        <Icon name="sheets" size={14} color="#34A853"/> Connect Sheets
      </button>
    );
  }
  return (
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      {syncState.syncing ? (
        <div style={{display:'flex',alignItems:'center',gap:7,padding:'5px 12px',background:'rgba(52,168,83,0.1)',border:'1px solid rgba(52,168,83,0.3)',borderRadius:7}}>
          <div style={{width:14,height:14,border:'2px solid #34A853',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
          <span style={{fontSize:12,fontWeight:600,color:'#34A853'}}>{syncState.syncMsg||'Syncing…'}</span>
          {syncState.syncPct>0&&<span style={{fontSize:11,color:'var(--text3)'}}>{syncState.syncPct}%</span>}
        </div>
      ) : (
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,cursor:'pointer'}} onClick={onManualSync} title="Click to sync now">
          <div style={{width:7,height:7,borderRadius:'50%',background:'#34A853',boxShadow:'0 0 0 3px rgba(52,168,83,0.2)'}}/>
          <span style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>Sheets</span>
          {syncState.lastSync&&<span style={{fontSize:11,color:'var(--text3)'}}>synced {syncState.lastSync.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})}</span>}
          <span style={{fontSize:11,color:'var(--text3)',fontFamily:'monospace'}}>{mm}:{ss2}</span>
          <div style={{width:28,height:3,background:'var(--border2)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${100-pct}%`,background:'#34A853',borderRadius:2,transition:'width 1s linear'}}/>
          </div>
        </div>
      )}
      {syncState.error&&<span style={{fontSize:11,color:'var(--red-light)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={syncState.error}>⚠ {syncState.error}</span>}
    </div>
  );
};

/* ─── MAIN APP ────────────────────────────────────── */
const App = () => {
  const [theme,setTheme]=useState('light');
  const [page,setPage]=useState('dashboard');
  const [sheetsSetupOpen, setSheetsSetupOpen] = useState(false);
  const [showNewHireWizard, setShowNewHireWizard] = useState(false);
  const [dataRefreshKey, setDataRefreshKey] = useState(0);
  const [sheetsConfig, setSheetsConfig] = useState(()=>loadSheetsConfig());

  // Clear badge for the current page on load
  useEffect(()=>{
    const raw = getRawAlerts();
    if(raw[page]) markPageRead(page, raw[page]);
  },[page]);
  const [syncState, setSyncState] = useState({configured:false,syncing:false,lastSync:null,error:null,syncMsg:'',syncPct:0});
  const autoSyncTimer = useRef(null);
  const syncInProgress = useRef(false);
  // Xero state
  const [xeroConfig, setXeroConfig] = useState(()=>loadXeroConfig());
  const [xeroSyncState, setXeroSyncState] = useState({configured:false,syncing:false,lastSync:null,error:null,syncMsg:'',updates:[]});
  const xeroSyncInProgress = useRef(false);

  useEffect(()=>{document.body.className=theme==='light'?'light':'';},[theme]);

  // Handle Xero OAuth callback (PKCE redirect back to app)
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const savedState = sessionStorage.getItem('xero_state') || localStorage.getItem('xero_state_backup');
    localStorage.removeItem('xero_state_backup');
    if (code && state && state === savedState) {
      window.history.replaceState({}, '', window.location.pathname);
      exchangeXeroCode(code).then(tokens => {
        const cfg = { ...tokens, tenantId: null };
        saveXeroConfig(cfg);
        setXeroConfig(cfg);
        setXeroSyncState(s=>({...s, error:null, configured:true}));
      }).catch(e => {
        const msg = 'Token exchange failed: ' + e.message;
        setXeroSyncState(s=>({...s, error:msg}));
        alert('Xero auth error: ' + e.message + '\n\nPlease go to Settings → Integrations and try Disconnect then Connect Xero again.');
      });
    }
  }, []);

  useEffect(()=>{
    setXeroSyncState(s=>({...s, configured:!!(xeroConfig?.accessToken)}));
  },[xeroConfig]);

  const doXeroSync = useCallback(async () => {
    if (xeroSyncInProgress.current) return;
    if (!xeroConfig?.accessToken) { alert('Xero not connected — please connect first.'); return; }
    xeroSyncInProgress.current = true;
    setXeroSyncState(s=>({...s,syncing:true,error:null,syncMsg:'Starting…'}));
    await syncXeroToApp(
      xeroConfig,
      (msg,pct)=>setXeroSyncState(s=>({...s,syncMsg:msg})),
      (ts,updates,total,imported)=>{
        setXeroSyncState(s=>({...s,syncing:false,lastSync:ts,syncMsg:'',updates}));
        xeroSyncInProgress.current=false;
        setDataRefreshKey(k=>k+1);
        const msg = 'Xero sync complete!\n\n' +
          total + ' invoices fetched from Xero\n' +
          imported + ' invoices saved to app\n' +
          (updates.length > 0
            ? updates.length + ' local status changes: ' + updates.map(u=>u.id+' to '+u.newStatus).join(', ')
            : 'All local invoices already up to date');
        alert(msg);
      },
      (err)=>{
        setXeroSyncState(s=>({...s,syncing:false,error:err,syncMsg:''}));
        xeroSyncInProgress.current=false;
        alert('Xero sync failed: '+err);
      }
    );
  },[xeroConfig]);

  useEffect(()=>{
    setSyncState(s=>({...s,configured:!!(sheetsConfig?.accessToken&&sheetsConfig?.spreadsheetId)}));
  },[sheetsConfig]);

  const doSync = useCallback(async (cfg) => {
    if (syncInProgress.current) return;
    const config = cfg || sheetsConfig;
    if (!config?.clientId || !config?.spreadsheetId) return;
    const fiveMin = 5 * 60 * 1000;
    if (!config.accessToken || !config.tokenExpiry || Date.now() > config.tokenExpiry - fiveMin) {
      getValidSheetsConfig(config, (refreshed) => { if (refreshed?.accessToken) setSheetsConfig(refreshed); });
      return;
    }
    syncInProgress.current = true;
    setSyncState(s=>({...s,syncing:true,error:null,syncMsg:'Starting…',syncPct:0}));
    await runFullSync(
      config,
      (msg,pct)=>setSyncState(s=>({...s,syncMsg:msg,syncPct:pct})),
      (ts)=>{setSyncState(s=>({...s,syncing:false,lastSync:ts,syncMsg:'',syncPct:0}));syncInProgress.current=false;setDataRefreshKey(k=>k+1+Math.random());},
      (err)=>{setSyncState(s=>({...s,syncing:false,error:err,syncMsg:'',syncPct:0}));syncInProgress.current=false;}
    );
  },[sheetsConfig]);

  // 5-minute auto-sync trigger + token refresh on load
  useEffect(()=>{
    if (!sheetsConfig?.clientId) return;
    if (autoSyncTimer.current) clearInterval(autoSyncTimer.current);
    // On load: silently refresh token first, then sync
    getValidSheetsConfig(sheetsConfig, (refreshed) => {
      if (refreshed?.accessToken) {
        if (refreshed.accessToken !== sheetsConfig.accessToken) setSheetsConfig(refreshed);
        doSync(refreshed);
      }
    });
    autoSyncTimer.current = setInterval(()=>{
      const cfg = loadSheetsConfig();
      getValidSheetsConfig(cfg, (refreshed) => {
        if (refreshed?.accessToken) {
          if (refreshed.accessToken !== sheetsConfig?.accessToken) setSheetsConfig(refreshed);
          doSync(refreshed);
        }
      });
    }, 5*60*1000);
    return ()=>clearInterval(autoSyncTimer.current);
  },[sheetsConfig?.clientId]);

  const handleSaveConfig = (cfg) => { saveSheetsConfig(cfg); setSheetsConfig(cfg); };

  const pages={
    dashboard:<Dashboard theme={theme} setPage={setPage}/>,
    fleet:<FleetPage theme={theme}/>,
    customers:<CustomersPage refreshKey={dataRefreshKey}/>,
    hires:<HiresPage refreshKey={dataRefreshKey}/>,
    invoicing:<InvoicingPage/>,
    maintenance:<MaintenancePage/>,
    reports:<ReportsPage theme={theme} xeroConfig={xeroConfig} sheetsConfig={sheetsConfig}/>,
    communications:<CommunicationsPage/>,
    documents:<DocumentsPage/>,
    navman:<NavmanPage/>,
    settings:<SettingsPage sheetsConfig={sheetsConfig} syncState={syncState} onSheetsSetup={()=>setSheetsSetupOpen(true)} onManualSync={()=>doSync()} xeroConfig={xeroConfig} xeroSyncState={xeroSyncState} onXeroConnect={startXeroAuth} onXeroSync={doXeroSync} onXeroDisconnect={()=>{clearXeroConfig();setXeroConfig(null);}} onXeroDiag={async()=>{ try { const t=xeroConfig?.accessToken; if(!t){alert('Not connected');return;} const r=await fetch('https://xero-proxy.ssrentalsnz.workers.dev/xero-api/connections',{headers:{Authorization:'Bearer '+t}}); const d=await r.json(); alert('Connection OK! Orgs: '+JSON.stringify(d.map(x=>x.tenantName))); } catch(e){alert('Error: '+e.message);}}}/>,
  };

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage}/>
      <div className="main">
        <Header page={page} theme={theme} toggleTheme={()=>setTheme(t=>t==='dark'?'light':'dark')}
          syncState={syncState} onManualSync={()=>doSync()} onOpenSetup={()=>setSheetsSetupOpen(true)}
          xeroSyncState={xeroSyncState} onXeroSync={doXeroSync} onNewHire={()=>setShowNewHireWizard(true)}/>
        <div className="content">{pages[page]||<Dashboard theme={theme} setPage={setPage}/>}</div>
      </div>
      <SheetsSetupModal open={sheetsSetupOpen} onClose={()=>setSheetsSetupOpen(false)} onSave={handleSaveConfig} initialConfig={sheetsConfig}/>
      {showNewHireWizard&&<NewHireWizard onClose={()=>setShowNewHireWizard(false)} sheetsConfig={sheetsConfig} onCreated={()=>{setShowNewHireWizard(false);setDataRefreshKey(k=>k+1);}}/>}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
