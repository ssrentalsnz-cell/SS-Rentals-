*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#6A1B9A;--red-light:#FF6F00;--red-dark:#4A148C;
  --green:#27AE60;--orange:#FF6F00;--blue:#6A1B9A;

  /* SS Rentals Brand Theme — White/Purple/Orange */
  --bg:#FFFFFF;--bg2:#F8F5FF;--bg3:#F0EBF8;--bg4:#E8E0F5;
  --card:#FFFFFF;--card2:#F8F5FF;
  --border:rgba(106,27,154,0.12);--border2:rgba(106,27,154,0.22);
  --text:#1a0533;--text2:#5c3d7a;--text3:#9b7ab5;
  --sidebar:#FFFFFF;--sidebar-text:#1a0533;--sidebar-active:rgba(106,27,154,0.08);
  --shadow:0 2px 12px rgba(106,27,154,0.12);
}
body.light{
  --bg:#F2F2F7;--bg2:#FFFFFF;--bg3:#E8E8ED;--bg4:#D8D8DC;
  --card:#FFFFFF;--card2:#F5F5F5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1A1A;--text2:#555;--text3:#999;
  --sidebar:#1A1A1A;--sidebar-text:#C8C8C8;--sidebar-active:rgba(217,43,43,0.2);
  --shadow:0 2px 12px rgba(0,0,0,0.1);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#root{height:100%}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:#FFFFFF;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(106,27,154,0.15);overflow-y:auto;overflow-x:hidden}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(106,27,154,0.12)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:#FFFFFF;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#6A1B9A;flex-shrink:0}
.logo-text{color:#1a0533;font-weight:700;font-size:15px;line-height:1.2}
.logo-sub{color:#9b7ab5;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.sidebar-section{padding:8px 10px 4px;margin-top:8px}
.sidebar-section-label{color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--sidebar-text);font-size:13.5px;font-weight:500;transition:all .15s;margin-bottom:1px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.nav-item.active{background:var(--sidebar-active);color:var(--red-light);border:1px solid rgba(217,43,43,0.25)}
.nav-item .nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.8}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:#FF6F00;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.06)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header-title{font-size:17px;font-weight:700;flex:1}
.header-sub{font-size:12px;color:var(--text2);font-weight:400}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-light)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.icon-btn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-sub{font-size:12px;color:var(--text2)}
/* GRID */
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
/* KPI CARDS */
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--red))}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:12px;color:var(--text2);margin-top:6px}
.kpi-trend{font-size:11px;font-weight:600;margin-top:4px}
.kpi-trend.up{color:var(--green)}
.kpi-trend.down{color:var(--red-light)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge-green{background:rgba(39,174,96,.15);color:#4ade80;border:1px solid rgba(39,174,96,.3)}
.badge-red{background:rgba(217,43,43,.15);color:#ff6b6b;border:1px solid rgba(217,43,43,.3)}
.badge-orange{background:rgba(230,126,34,.15);color:#ffa756;border:1px solid rgba(230,126,34,.3)}
.badge-blue{background:rgba(41,128,185,.15);color:#5dade2;border:1px solid rgba(41,128,185,.3)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
/* TABLES */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 14px;border-top:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.tr-link{cursor:pointer}
/* ALERTS */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:9px;border-left:3px solid;margin-bottom:8px;font-size:13px}
.alert-red{background:rgba(217,43,43,.1);border-color:var(--red);color:#ff8585}
.alert-orange{background:rgba(230,126,34,.1);border-color:var(--orange);color:#ffc785}
.alert-green{background:rgba(39,174,96,.1);border-color:var(--green);color:#6fcf97}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;width:90%;max-width:760px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal-lg{max-width:920px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:17px;font-weight:700}
.modal-body{overflow-y:auto;padding:24px;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

.tabs{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:9px;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none}
.tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}

.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-orange{background:var(--orange)}
.dot-gray{background:var(--text3)}
/* MISC */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.text-right{text-align:right}.text-center{text-align:center}
.fw-700{font-weight:700}.fw-600{font-weight:600}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.text-red{color:var(--red-light)}.text-green{color:#4ade80}.text-orange{color:#ffa756}.text-muted{color:var(--text2)}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.w-full{width:100%}
.divider{height:1px;background:var(--border);margin:16px 0}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
/* CHART CONTAINER */
.chart-wrap{position:relative;height:220px}
.chart-wrap-sm{height:160px}
/* PROGRESS BAR */
.progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;transition:width .3s}
/* COMPLIANCE METER */
.compliance-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.compliance-row:last-child{border-bottom:none}
/* NOTIFICATION */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:4px;right:4px}
/* AVATAR */
.avatar{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}
/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:60px}.logo-text,.sidebar-section-label,.nav-item span,.sidebar-footer{display:none}
  .nav-item{justify-content:center;padding:10px}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}
}
</style>

const custName = id => CUSTOMERS.find(c=>c.id===id)?.company || id;

  const d2 = daysDiff(d);
  if(d2<0) return 'red';
  if(d2<=14) return 'orange';
  return 'green';
};

  return `badge badge-${m[s]||'gray'}`;
};

const HIRE_OVERRIDES_KEY = 'ss_rentals_hire_overrides';
const loadHireOverrides = () => { try { return JSON.parse(localStorage.getItem(HIRE_OVERRIDES_KEY)||'{}'); } catch { return {}; } };
const saveHireOverride = (id, data) => {
  const all = loadHireOverrides();
  all[id] = {...(all[id]||{}), ...data};
  localStorage.setItem(HIRE_OVERRIDES_KEY, JSON.stringify(all));
};
const getEffectiveHires = () => {
  const overrides = loadHireOverrides();
  return HIRES.map(h => overrides[h.id] ? {...h, ...overrides[h.id]} : {...h});
};

const syncSheetTab = async (accessToken, spreadsheetId, sheetName, rows) => {
  // Clear then write
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}:clear`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
  });
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?valueInputOption=RAW`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: rows }),
  });
  if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || 'Sheets write failed'); }
};

const ensureSheets = async (accessToken, spreadsheetId, neededSheets) => {
  const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties.title`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await meta.json();
  const existing = (data.sheets || []).map(s => s.properties.title);
  const toAdd = neededSheets.filter(n => !existing.includes(n));
  if (toAdd.length === 0) return;
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: toAdd.map(t => ({ addSheet: { properties: { title: t } } })) }),
  });
};

// Read a sheet tab back from Google Sheets
const readSheetTab = async (accessToken, spreadsheetId, sheetName) => {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!res.ok) return null;
  const data = await res.json();
  return data.values || [];
};

// Pull hire changes from Google Sheets back into app data
const pullHiresFromSheet = (rows) => {
  if (!rows || rows.length < 2) return 0;
  const headers = rows[0];
  const idIdx = headers.indexOf('Hire ID');
  const endIdx = headers.indexOf('End');
  const statusIdx = headers.indexOf('Status');
  const weeklyIdx = headers.indexOf('Weekly Rate');
  const notesIdx = headers.indexOf('Notes');
  if (idIdx === -1) return 0;
  let updated = 0;
  rows.slice(1).forEach(row => {
    const id = row[idIdx];
    const hire = HIRES.find(h => h.id === id);
    if (!hire) return;
    if (endIdx !== -1 && row[endIdx] && row[endIdx] !== hire.end) { hire.end = row[endIdx]; updated++; }
    if (statusIdx !== -1 && row[statusIdx] && row[statusIdx] !== hire.status) { hire.status = row[statusIdx]; updated++; }
    if (weeklyIdx !== -1 && row[weeklyIdx]) {
      const rate = parseFloat(row[weeklyIdx]);
      if (!isNaN(rate) && rate !== hire.weekly_truck + hire.weekly_trailer) { hire.weekly_truck = rate; updated++; }
    }
    if (notesIdx !== -1 && row[notesIdx] !== undefined) hire.notes = row[notesIdx];
  });
  return updated;
};

// Pull customer changes from Google Sheets
const pullCustomersFromSheet = (rows) => {
  if (!rows || rows.length < 2) return 0;
  const headers = rows[0];
  const idIdx = headers.indexOf('ID');
  const outIdx = headers.indexOf('Outstanding');
  const notesIdx = headers.indexOf('Notes');
  const statusIdx = headers.indexOf('Status');
  if (idIdx === -1) return 0;
  let updated = 0;
  rows.slice(1).forEach(row => {
    const id = row[idIdx];
    const cust = CUSTOMERS.find(c => c.id === id);
    if (!cust) return;
    if (outIdx !== -1 && row[outIdx] !== undefined) { const v = parseFloat(row[outIdx]); if (!isNaN(v)) cust.outstanding = v; }
    if (notesIdx !== -1 && row[notesIdx] !== undefined) cust.notes = row[notesIdx];
    if (statusIdx !== -1 && row[statusIdx]) cust.status = row[statusIdx];
    updated++;
  });
  return updated;
};

// Parse NZ date formats like "27/04/26", "27/4/2026"
const parseNZDate = (str) => {
  if (!str) return null;
  str = str.trim();
  // Try dd/mm/yy or dd/mm/yyyy
  const m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (!m) return null;
  let [,d,mo,y] = m;
  if (y.length===2) y = '20'+y;
  return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
};

// Parse hire period string like "27/04/26 till 27/10/26" or "25/5/26 to 31/5/26"
const parseHirePeriod = (str) => {
  if (!str) return null;
  str = str.trim();
  // Split on "till", "to", "-", "–"
  const parts = str.split(/\s+(?:till|to|–|-)\s+/i);
  if (parts.length === 2) {
    const start = parseNZDate(parts[0].trim());
    const end = parseNZDate(parts[1].trim());
    if (start && end) return { start, end };
  }
  return null;
};

// Pull hire data from Sheet1 (the original customer sheet with Hire period column)
const pullHiresFromSheet1 = (rows, extLog) => {
  if (!rows || rows.length < 2) return 0;
  // Find header row (contains "Hire period")
  let headerIdx = -1;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    if (rows[i].some(c => typeof c === 'string' && c.toLowerCase().includes('hire period'))) {
      headerIdx = i; break;
    }
  }
  if (headerIdx === -1) return 0;
  const headers = rows[headerIdx].map(h => (h||'').toLowerCase().trim());
  // Detect column indexes — with fallbacks matching actual sheet structure
  // Sheet structure: A(blank), B(Company), C(Contact), D(Phone), E(Hire period), F(Description), G(Rego), H(Weekly charges)
  let compIdx = headers.findIndex(h => h.includes('company')); if (compIdx === -1) compIdx = 1;
  let periodIdx = headers.findIndex(h => h.includes('hire period')); if (periodIdx === -1) periodIdx = 4;
  let regoIdx = headers.findIndex(h => h.includes('rego')); if (regoIdx === -1) regoIdx = 6;
  let rateIdx = headers.findIndex(h => h.includes('weekly charge') || h.includes('weekly charges')); if (rateIdx === -1) rateIdx = 7;

  let updated = 0;
  rows.slice(headerIdx + 1).forEach(row => {
    const company = (row[compIdx] || '').trim();
    const periodStr = (row[periodIdx] || '').trim();
    const regoStr = (row[regoIdx] || '').trim();
    const rateStr = (row[rateIdx] || '').toString().trim();
    if (!company || !periodStr || periodStr.toLowerCase().includes('didn') || periodStr.toLowerCase() === 'n/a') return;
    // Skip entries where period is very old (more than 60 days ago) to avoid re-matching old hires
    const testPeriod = parseHirePeriod(periodStr);
    if (testPeriod) {
      const endCheck = new Date(testPeriod.end + 'T23:59:59');
      const sixtyDaysAgo = new Date(); sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);
      if (endCheck < sixtyDaysAgo) return; // Skip very old hires
    }

    const period = parseHirePeriod(periodStr);
    if (!period) return;

    // Find matching customer — normalize & and spaces for comparison
    const normalize = s => s.toLowerCase().replace(/\s+/g,' ').replace(/&/g,'and').trim();
    const compNorm = normalize(company);
    const cust = CUSTOMERS.find(c => {
      const cNorm = normalize(c.company);
      return cNorm === compNorm ||
        cNorm.includes(compNorm) ||
        compNorm.includes(cNorm) ||
        cNorm.split(' ')[0] === compNorm.split(' ')[0];
    });
    if (!cust) return;

    // Find best matching hire — most recent for this customer
    const hire = HIRES.filter(h => h.customer === cust.id)
      .sort((a,b) => new Date(b.start) - new Date(a.start))[0];
    if (!hire) return;

    // Always update end date and start date from sheet
    let changed = false;
    if (hire.end !== period.end) { hire.end = period.end; changed = true; }
    if (hire.start !== period.start) { hire.start = period.start; changed = true; }

    // Parse weekly rate
    if (rateStr) {
      const rateNum = parseFloat(rateStr.replace(/[^0-9.]/g,''));
      if (!isNaN(rateNum) && rateNum > 0 && rateNum !== hire.weekly_truck) {
        hire.weekly_truck = rateNum; changed = true;
      }
    }

    // Save overrides to localStorage so they persist across renders
    const truck = TRUCKS.find(t => t.id === hire.truck);
    const endDate = new Date(period.end + 'T23:59:59');
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    const newStatus = endDate >= todayStart ? 'active' : 'completed';
    const override = { end: period.end, start: period.start, status: newStatus };
    if (rateStr) {
      // Handle formats: "$2590.58 per week", "2590.58", "$2,590.58/wk"
      const cleaned = rateStr.replace(/[$,]/g,'').replace(/per week|per wk|\/wk|\/week/gi,'').trim();
      const r = parseFloat(cleaned);
      if (!isNaN(r) && r > 0) override.weekly_truck = r;
    }
    saveHireOverride(hire.id, override);
    if (truck) {
      if (newStatus === 'active') { truck.status = 'on_hire'; truck.hirer = cust.id; }
      else if (truck.hirer === cust.id) { truck.status = 'available'; truck.hirer = null; }
    }
    updated++;
  });
  return updated;
};

const runFullSync = async (config, onProgress, onDone, onError) => {
  try {
    const { accessToken, spreadsheetId } = config;

    // STEP 1: Pull changes FROM Sheets INTO app
    onProgress('Reading changes from Sheets…', 0);
    let pullUpdates = 0;
    try {
      // Read Sheet1 (original customer hire period tab)
      const sheet1Rows = await readSheetTab(accessToken, spreadsheetId, 'Sheet1');
      if (sheet1Rows) pullUpdates += pullHiresFromSheet1(sheet1Rows, []);
      // Read Hire Management tab
      const hireRows = await readSheetTab(accessToken, spreadsheetId, 'Hire Management');
      if (hireRows) pullUpdates += pullHiresFromSheet(hireRows);
      // Read Customers tab
      const custRows = await readSheetTab(accessToken, spreadsheetId, 'Customers');
      if (custRows) pullUpdates += pullCustomersFromSheet(custRows);
    } catch(e) { console.error('Sheet pull error:', e.message); }

    // STEP 2: Push all current app data TO Sheets
    const allRows = buildSheetRows();
    const bankTxnsForSheet = loadBankTxns();
    const bankRows = bankTxnsForSheet.length > 0 ? [
      ['Date','ID','Payee','Memo','Amount','Type','Category','Source','Imported At'],
      ...bankTxnsForSheet.map(t=>[t.date,t.id,t.payee,t.memo,t.amount,t.type,t.category,t.source||'csv',t.importedAt||''])
    ] : [['Date','ID','Payee','Memo','Amount','Type','Category','Source','Imported At']];
    const tabMap = {
      'Fleet & Trailers': allRows.fleet,
      'Customers': allRows.customers,
      'Hire Management': allRows.hires,
      'Invoices': allRows.invoices,
      'Maintenance': allRows.maintenance,
      'P&L Detail': allRows.pnl,
      'Bank Transactions': bankRows,
    };
    onProgress('Checking sheets…', 15);
    await ensureSheets(accessToken, spreadsheetId, Object.keys(tabMap));
    const tabs = Object.entries(tabMap);
    for (let i = 0; i < tabs.length; i++) {
      const [name, rows] = tabs[i];
      onProgress(`Syncing ${name}…`, Math.round(15 + ((i) / tabs.length) * 85));
      await syncSheetTab(accessToken, spreadsheetId, name, rows);
    }
    onDone(new Date(), pullUpdates);
  } catch (e) { onError(e.message || 'Unknown sync error'); }
};

const XERO_CLIENT_ID = '4FB523DA93F24256BBD50A07CA9E9C9A';
const XERO_REDIRECT_URI = 'https://ssrentalsnz-cell.github.io/SS-Rentals-/';
const XERO_SCOPES = 'openid profile email accounting.invoices.read accounting.contacts.read offline_access';
const XERO_CONFIG_KEY = 'ss_rentals_xero_config';
// Cloudflare Worker proxy URL — handles token exchange to avoid CORS
const XERO_PROXY = 'https://xero-proxy.ssrentalsnz.workers.dev';

const loadXeroConfig = () => { try { return JSON.parse(localStorage.getItem(XERO_CONFIG_KEY)||'null'); } catch { return null; } };
const saveXeroConfig = cfg => localStorage.setItem(XERO_CONFIG_KEY, JSON.stringify(cfg));
const clearXeroConfig = () => localStorage.removeItem(XERO_CONFIG_KEY);

// PKCE helpers
const generateCodeVerifier = () => {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  const b64 = btoa(String.fromCharCode(...arr));
  return b64.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/[=]/g,'');
};
const generateCodeChallenge = async (verifier) => {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  const b64 = btoa(String.fromCharCode(...new Uint8Array(digest)));
  return b64.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/[=]/g,'');
};

const startXeroAuth = async () => {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('xero_verifier', verifier);
  localStorage.setItem('xero_verifier_backup', verifier);
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('xero_state', state);
  localStorage.setItem('xero_state_backup', state);
  const url = 'https://login.xero.com/identity/connect/authorize'
    + '?response_type=code'
    + '&client_id=' + encodeURIComponent(XERO_CLIENT_ID)
    + '&redirect_uri=' + encodeURIComponent(XERO_REDIRECT_URI)
    + '&scope=' + encodeURIComponent(XERO_SCOPES)
    + '&state=' + state
    + '&code_challenge=' + challenge
    + '&code_challenge_method=S256';
  window.location.href = url;
};

// Token exchange via proxy to avoid CORS
const exchangeXeroCode = async (code) => {
  const verifier = sessionStorage.getItem('xero_verifier') || localStorage.getItem('xero_verifier_backup');
  if (!verifier) throw new Error('No code verifier found — please try connecting again');
  localStorage.removeItem('xero_verifier_backup');
  // Try direct first (Xero may allow it), fall back to proxy
  const body = new URLSearchParams({
    grant_type:'authorization_code', code,
    redirect_uri:XERO_REDIRECT_URI,
    client_id:XERO_CLIENT_ID,
    code_verifier:verifier
  });
  let res = await fetch('https://identity.xero.com/connect/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  }).catch(()=>null);
  if (!res || !res.ok) {
    // Fall back to proxy
    res = await fetch(XERO_PROXY + '/token', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ grant_type:'authorization_code', code, redirect_uri:XERO_REDIRECT_URI, client_id:XERO_CLIENT_ID, code_verifier:verifier })
    });
  }
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error_description || e.error || 'Token exchange failed — CORS issue. A proxy server is needed.');
  }
  const data = await res.json();
  sessionStorage.removeItem('xero_verifier');
  sessionStorage.removeItem('xero_state');
  return { accessToken:data.access_token, refreshToken:data.refresh_token, tokenExpiry:Date.now()+(data.expires_in||1800)*1000 };
};

const refreshXeroToken = async (refreshToken) => {
  const body = new URLSearchParams({ grant_type:'refresh_token', refresh_token:refreshToken, client_id:XERO_CLIENT_ID });
  let res = await fetch('https://identity.xero.com/connect/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  }).catch(()=>null);
  if (!res || !res.ok) {
    res = await fetch(XERO_PROXY + '/token', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ grant_type:'refresh_token', refresh_token:refreshToken, client_id:XERO_CLIENT_ID })
    });
  }
  if (!res.ok) throw new Error('Session expired — please reconnect Xero');
  const data = await res.json();
  return { accessToken:data.access_token, refreshToken:data.refresh_token||refreshToken, tokenExpiry:Date.now()+(data.expires_in||1800)*1000 };
};

const getXeroTenantId = async (accessToken) => {
  // Route through proxy to avoid CORS
  const res = await fetch(XERO_PROXY + '/xero-api/connections', {
    headers:{ Authorization:'Bearer '+accessToken }
  });
  if (!res.ok) {
    const txt = await res.text().catch(()=>'');
    throw new Error('Cannot reach Xero API (' + res.status + '). ' + (txt.slice(0,200)||'Check your connection.'));
  }
  const tenants = await res.json();
  if (!Array.isArray(tenants) || !tenants.length) throw new Error('No Xero organisations found — make sure you approved access during login');
  return tenants[0].tenantId;
};

const fetchXeroInvoices = async (accessToken, tenantId) => {
  const res = await fetch(XERO_PROXY + '/xero-api/api.xro/2.0/Invoices?Type=ACCREC&Statuses=DRAFT,SUBMITTED,AUTHORISED,PAID&page=1', {
    headers:{ Authorization:'Bearer '+accessToken, 'Xero-tenant-id':tenantId }
  });
  if (!res.ok) {
    const txt = await res.text().catch(()=>'');
    throw new Error('Invoice fetch failed (' + res.status + '): ' + txt.slice(0,200));
  }
  const data = await res.json();
  return data.Invoices || [];
};

const mapXeroStatus = s => ({'DRAFT':'draft','SUBMITTED':'sent','AUTHORISED':'sent','PAID':'paid','VOIDED':'void'}[s]||'draft');

const syncXeroToApp = async (config, onProgress, onDone, onError) => {
  try {
    let { accessToken, refreshToken, tokenExpiry, tenantId } = config;
    onProgress('Connecting to Xero…', 10);
    if (Date.now() > tokenExpiry - 60000) {
      onProgress('Refreshing session…', 15);
      try {
        const refreshed = await refreshXeroToken(refreshToken);
        accessToken = refreshed.accessToken;
        refreshToken = refreshed.refreshToken;
        tokenExpiry = refreshed.tokenExpiry;
        saveXeroConfig({ ...config, accessToken, refreshToken, tokenExpiry });
      } catch(e) {
        onError('Session expired: ' + e.message + ' — click Disconnect and reconnect Xero.');
        return;
      }
    }
    if (!tenantId) {
      onProgress('Finding Xero organisation…', 25);
      tenantId = await getXeroTenantId(accessToken);
      saveXeroConfig({ ...config, accessToken, refreshToken, tokenExpiry, tenantId });
    }
    onProgress('Fetching invoices from Xero…', 45);
    const xeroInvs = await fetchXeroInvoices(accessToken, tenantId);
    onProgress('Matching ' + xeroInvs.length + ' invoices…', 75);
    const statusMap = {};
    xeroInvs.forEach(xi => {
      if (xi.InvoiceNumber) statusMap[xi.InvoiceNumber] = { status:mapXeroStatus(xi.Status), xeroId:xi.InvoiceID };
    });
    const updates = [];
    INVOICES.forEach(inv => {
      const match = statusMap[inv.id];
      if (match) {
        if (match.status !== inv.status || match.xeroId !== inv.xero_id) {
          updates.push({ id:inv.id, oldStatus:inv.status, newStatus:match.status });
          inv.status = match.status;
          inv.xero_id = match.xeroId;
        }
      }
    });
    onDone(new Date(), updates, xeroInvs.length);
  } catch(e) { onError(e.message||'Xero sync failed'); }
};

/* ─── MODAL ───────────────────────────────────────── */
const Modal = ({open,onClose,title,children,footer,size=''}) => {
  if(!open) return null;
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`modal ${size}`}>
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">{children}</div>
        {footer&&<div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
};

const getNavBadges = () => {
  const allV = [...TRUCKS,...TRAILERS];
  const effectiveH = getEffectiveHires();
  // Fleet: COF/rego expiring within 30 days
  const fleetAlerts = allV.filter(v=>daysDiff(v.cof_expiry)<=30||daysDiff(v.rego_expiry)<=30).length;
  // Invoicing: draft + overdue invoices
  const invoiceAlerts = INVOICES.filter(i=>i.status==='draft'||i.status==='overdue').length;
  // Maintenance: overdue or scheduled within 30 days
  const maintAlerts = MAINTENANCE.filter(m=>m.status==='scheduled'&&daysDiff(m.date)<=30).length;
  // Hires: active hires expiring within 7 days
  const hireAlerts = effectiveH.filter(h=>h.status==='active'&&daysDiff(h.end)<=7&&daysDiff(h.end)>=0).length;
  const commAlerts = INVOICES.filter(i=>i.status==='overdue').length;
  return { fleet:fleetAlerts||undefined, invoicing:invoiceAlerts||undefined, maintenance:maintAlerts||undefined, hires:hireAlerts||undefined, communications:commAlerts||undefined };
};

const TITLES = {dashboard:'Dashboard',fleet:'Fleet Management',customers:'Customers',hires:'Hire Management',invoicing:'Invoicing',reports:'Financial Reports',maintenance:'Maintenance',navman:'Navman GPS',documents:'Documents',settings:'Settings'};
const Header = ({page,theme,toggleTheme,syncState,onManualSync,onOpenSetup,xeroSyncState,onXeroSync,onNewHire}) => {
  const overdueCount = INVOICES.filter(i=>i.status==='overdue').length;
  return (
    <div className="header">
      <div>
        <div className="header-title">{TITLES[page]}</div>

      </div>
      <div className="header-actions">
        {xeroSyncState&&xeroSyncState.configured&&(
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',background:'rgba(0,184,217,0.08)',border:'1px solid rgba(0,184,217,0.25)',borderRadius:7,cursor:'pointer'}} onClick={onXeroSync} title="Click to sync Xero now">
            <div style={{width:7,height:7,borderRadius:'50%',background:'#00B8D9',boxShadow:'0 0 0 3px rgba(0,184,217,0.2)'}}/>
            <span style={{fontSize:12,fontWeight:600,color:'#00B8D9'}}>Xero</span>

        <div className="icon-btn" style={{position:'relative'}} title="Notifications">
          <Icon name="bell" size={17}/>
          <div className="notif-dot"/>

    </div>
  );
};

/* ─── CHART: REVENUE BAR ──────────────────────────── */
const RevenueChart = ({theme}) => {
  const ref = useRef(); const inst = useRef();
  useEffect(()=>{
    if(inst.current) inst.current.destroy();
    const isDark = theme==='dark';
    const grid = isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)';
    const tick = isDark?'#888':'#999';
    inst.current = new Chart(ref.current,{
      type:'bar',
      data:{
        labels:MONTHLY_REVENUE.map(r=>r.month),
        datasets:[
          {label:'Revenue',data:MONTHLY_REVENUE.map(r=>r.amount),backgroundColor:'rgba(217,43,43,0.8)',borderRadius:5,borderSkipped:false},
          {label:'Expenses',data:MONTHLY_REVENUE.map(r=>r.expenses),backgroundColor:'rgba(230,126,34,0.6)',borderRadius:5,borderSkipped:false},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:isDark?'#aaa':'#555',font:{size:11}}},tooltip:{callbacks:{label:c=>' '+fmtCur(c.parsed.y)}}},scales:{x:{grid:{color:grid},ticks:{color:tick}},y:{grid:{color:grid},ticks:{color:tick,callback:v=>'$'+v/1000+'k'}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

/* ─── CHART: FLEET STATUS DONUT ──────────────────── */
const FleetDonut = ({theme}) => {
  const ref = useRef(); const inst = useRef();
  useEffect(()=>{
    if(inst.current) inst.current.destroy();
    const allV = [...TRUCKS,...TRAILERS];
    const hired = allV.filter(v=>v.status==='on_hire').length;
    const avail = allV.filter(v=>v.status==='available').length;
    const maint = allV.filter(v=>v.status==='maintenance').length;
    inst.current = new Chart(ref.current,{
      type:'doughnut',
      data:{labels:['On Hire','Available','Maintenance'],datasets:[{data:[hired,avail,maint],backgroundColor:['#2980B9','#27AE60','#E67E22'],borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{position:'bottom',labels:{color:theme==='dark'?'#aaa':'#555',padding:12,font:{size:11}}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

/* ─── CHART: WEEKLY TREND ─────────────────────────── */
const WeeklyChart = ({theme}) => {
  const ref = useRef(); const inst = useRef();
  useEffect(()=>{
    if(inst.current) inst.current.destroy();
    const isDark = theme==='dark';
    inst.current = new Chart(ref.current,{
      type:'line',
      data:{
        labels:WEEKLY_REVENUE.map(r=>r.week),
        datasets:[{label:'Weekly Revenue',data:WEEKLY_REVENUE.map(r=>r.amount),borderColor:'#D92B2B',backgroundColor:'rgba(217,43,43,0.1)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#D92B2B'}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtCur(c.parsed.y)}}},scales:{x:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)'},ticks:{color:isDark?'#888':'#999'}},y:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)'},ticks:{color:isDark?'#888':'#999',callback:v=>'$'+v/1000+'k'}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

/* ─── DASHBOARD PAGE ──────────────────────────────── */
const Dashboard = ({theme,setPage}) => {
  const allV = [...TRUCKS,...TRAILERS];
  const onHire = TRUCKS.filter(t=>t.status==='on_hire').length;
  const avail = TRUCKS.filter(t=>t.status==='available').length;
  const maint = TRUCKS.filter(t=>t.status==='maintenance').length;
  const util = Math.round((onHire/TRUCKS.length)*100);
  const weekRev = WEEKLY_REVENUE[WEEKLY_REVENUE.length-1].amount;
  const monthRev = MONTHLY_REVENUE[MONTHLY_REVENUE.length-1].amount;
  const monthNet = MONTHLY_REVENUE[MONTHLY_REVENUE.length-1].net;
  const outstanding = INVOICES.filter(i=>i.status!=='paid').reduce((a,b)=>a+b.total,0);
  const overdue = INVOICES.filter(i=>i.status==='overdue');
  const overdueAmt = overdue.reduce((a,b)=>a+b.total,0);
  const weeklyKm = TRUCKS.reduce((a,t)=>a+t.weekly_km,0);
  const rucCost = weeklyKm*0.062;

  // Compliance alerts
  const cofAlerts = allV.filter(v=>daysDiff(v.cof_expiry)<=30).sort((a,b)=>daysDiff(a.cof_expiry)-daysDiff(b.cof_expiry));
  const regoAlerts = allV.filter(v=>daysDiff(v.rego_expiry)<=30).sort((a,b)=>daysDiff(a.rego_expiry)-daysDiff(b.rego_expiry));

  return (
    <div>
      {/* KPI row 1 */}
      <div className="grid grid-4 mb-4">
        {[
          {label:'Active Hires',value:onHire,sub:`${avail} available · ${maint} in workshop`,accent:'var(--blue)',trend:'↑ 1 from last week',up:true},
          {label:'Fleet Utilisation',value:`${util}%`,sub:`${TRUCKS.length} trucks · ${TRAILERS.length} trailers`,accent:'var(--green)',trend:'On target (>70%)',up:true},
          {label:'Weekly Revenue',value:fmtCur(weekRev),sub:'Week ending 31 May 2026',accent:'var(--red)',trend:'↑ 10.3% vs last week',up:true},
          {label:'Monthly Revenue',value:fmtCur(monthRev),sub:`May 2026 — Net ${fmtCur(monthNet)}`,accent:'#8E44AD',trend:'Best month since Oct 2025',up:true},
        ].map(k=>(
          <div key={k.label} className="kpi-card" style={{'--accent':k.accent}}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
            <div className={`kpi-trend ${k.up?'up':'down'}`}>{k.trend}</div>
          </div>
        ))}
      </div>
      {/* KPI row 2 */}

const CUST_OVERRIDES_KEY = 'ss_rentals_cust_overrides';
const loadCustOverrides = () => { try { return JSON.parse(localStorage.getItem(CUST_OVERRIDES_KEY)||'{}'); } catch { return {}; } };
const saveCustOverride = (id, data) => {
  const all = loadCustOverrides();
  all[id] = {...(all[id]||{}), ...data};
  localStorage.setItem(CUST_OVERRIDES_KEY, JSON.stringify(all));
};
const CUST_NEW_KEY = 'ss_rentals_cust_new';
const loadNewCustomers = () => { try { return JSON.parse(localStorage.getItem(CUST_NEW_KEY)||'[]'); } catch { return []; } };
const saveNewCustomers = list => localStorage.setItem(CUST_NEW_KEY, JSON.stringify(list));
const getAllCustomers = () => {
  const overrides = loadCustOverrides();
  const base = CUSTOMERS.map(c => overrides[c.id] ? {...c,...overrides[c.id]} : {...c});
  const newCusts = loadNewCustomers();
  return [...base, ...newCusts];
};
const createNewCustomer = (data) => {
  const id = 'C' + String(Date.now()).slice(-6);
  const cust = {
    id, status:'active', credit_rating:'B+', outstanding:0, ytd_revenue:0,
    weekly_truck:0, weekly_trailer:0, payment_terms:'Weekly',
    joined: new Date().toISOString().slice(0,10),
    notes:'', nzbn:'', truck:'', trailer:'',
    ...data
  };
  const list = loadNewCustomers();
  list.push(cust);
  saveNewCustomers(list);
  return cust;
};

                  <td><span className={statusBadge(i.status)}>{statusLabel(i.status)}</span></td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{i.xero_id||'—'}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
        {ctab==='documents'&&(
          <div>
            {DOCUMENTS.filter(d=>d.customer===c.id).map(d=>(
              <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:8}}>
                <Icon name="documents" size={18} color="var(--text3)"/>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{d.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{d.type} · {fmt(d.date)} · {d.size}</div></div>
                {d.signed&&<span className="badge badge-green">Signed</span>}
                <button className="btn btn-ghost btn-sm"><Icon name="download" size={13}/></button>
              </div>
            ))}
          </div>
        )}
        {ctab==='notes'&&(
          <div>
            <div style={{padding:'14px',background:'var(--bg3)',borderRadius:8,marginBottom:16}}>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Account Notes</div>
              <p style={{fontSize:13,lineHeight:1.7}}>{c.notes}</p>
            </div>
            <div><label>Add Communication Note</label><textarea placeholder="Enter note…" rows={3}/><button className="btn btn-primary mt-2 btn-sm">Save Note</button></div>
          </div>
        )}
      </Modal>
    );
  };

  // Add/Edit customer modal
  const CustomerFormModal = ({existing, onClose}) => {
    const [vals,setVals]=useState(existing ? {...existing} : {
      company:'', director:'', contact:'', phone:'', email:'', address:'',
      nzbn:'', credit_rating:'B+', payment_terms:'Weekly', notes:'', status:'active',
      weekly_truck:0, weekly_trailer:0, outstanding:0, ytd_revenue:0
    });
    const sv = (k,v) => setVals(p=>({...p,[k]:v}));
    const handleSave = () => {
      if (!vals.company.trim()) { alert('Company name is required'); return; }
      if (!vals.contact.trim() && !vals.director.trim()) { alert('Contact name or director is required'); return; }
      if (!vals.phone.trim()) { alert('Phone number is required'); return; }
      if (existing) {
        // Update existing
        const idx = CUSTOMERS.findIndex(c=>c.id===existing.id);
        if (idx !== -1) { Object.assign(CUSTOMERS[idx], vals); saveCustOverride(existing.id, vals); }
        else {
          const newList = loadNewCustomers().map(c=>c.id===existing.id?{...c,...vals}:c);
          saveNewCustomers(newList);
        }
      } else {
        // Create new
        if (!vals.contact && vals.director) vals.contact = vals.director;
        createNewCustomer(vals);
      }
      setCustRefresh(r=>r+1);
      onClose();
    };
    return (
      <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="modal" style={{maxWidth:620}}>
          <div className="modal-header">
            <span className="modal-title"><Icon name="customers" size={18}/> {existing?'Edit Customer':'Add New Customer'}</span>
            <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
          </div>
          <div className="modal-body">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
              <div className="form-group">
                <label>Company Name <span style={{color:'var(--red)'}}>*</span></label>
                <input value={vals.company} onChange={e=>sv('company',e.target.value)} placeholder="e.g. Chardikala Limited"/>
              </div>
              <div className="form-group">
                <label>Director Name</label>
                <input value={vals.director||''} onChange={e=>sv('director',e.target.value)} placeholder="e.g. Gurpinder Singh"/>
              </div>
              <div className="form-group">
                <label>Contact Person <span style={{color:'var(--red)'}}>*</span></label>
                <input value={vals.contact} onChange={e=>sv('contact',e.target.value)} placeholder="e.g. Gurpinder Singh"/>
              </div>
              <div className="form-group">
                <label>Cellphone / Contact Number <span style={{color:'var(--red)'}}>*</span></label>
                <input value={vals.phone} onChange={e=>sv('phone',e.target.value)} placeholder="e.g. 027 510 0233"/>
              </div>
              <div className="form-group">
                <label>Email Address</label>
                <input type="email" value={vals.email||''} onChange={e=>sv('email',e.target.value)} placeholder="e.g. info@company.co.nz"/>
              </div>
              <div className="form-group">
                <label>Physical Address</label>
                <input value={vals.address||''} onChange={e=>sv('address',e.target.value)} placeholder="e.g. 123 Main St, Auckland"/>
              </div>
              <div className="form-group">
                <label>NZBN (optional)</label>
                <input value={vals.nzbn||''} onChange={e=>sv('nzbn',e.target.value)} placeholder="9429..."/>
              </div>
              <div className="form-group">
                <label>Credit Rating</label>
                <select value={vals.credit_rating||'B+'} onChange={e=>sv('credit_rating',e.target.value)}>
                  {['A+','A','B+','B','B-','C'].map(r=><option key={r}>{r}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Payment Terms</label>
                <select value={vals.payment_terms||'Weekly'} onChange={e=>sv('payment_terms',e.target.value)}>
                  {['Weekly','Fortnightly','Monthly','On Invoice'].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Status</label>
                <select value={vals.status||'active'} onChange={e=>sv('status',e.target.value)}>
                  <option value="active">Active</option>
                  <option value="inactive">Inactive</option>
                  <option value="blacklisted">Blacklisted</option>
                </select>
              </div>
              <div className="form-group">
                <label>Weekly Truck Rate (NZD)</label>
                <input type="number" value={vals.weekly_truck||0} onChange={e=>sv('weekly_truck',parseFloat(e.target.value)||0)}/>
              </div>
              <div className="form-group">
                <label>Weekly Trailer Rate (NZD)</label>
                <input type="number" value={vals.weekly_trailer||0} onChange={e=>sv('weekly_trailer',parseFloat(e.target.value)||0)}/>
              </div>
            </div>
            <div className="form-group">
              <label>Notes</label>
              <textarea value={vals.notes||''} onChange={e=>sv('notes',e.target.value)} rows={2} placeholder="Any relevant notes about this customer…"/>
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',padding:'16px 24px',borderTop:'1px solid var(--border)'}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={handleSave}>
              <Icon name="check" size={14}/> {existing?'Save Changes':'Add Customer'}
            </button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div className="flex gap-2" style={{flexWrap:'wrap'}}>
          <input style={{width:260}} placeholder="Search by company, contact or director…" value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button className="btn btn-ghost btn-sm" onClick={()=>setSearch('')}>Clear</button>}
          {['all','active','inactive','blacklisted'].map(s=>(
            <button key={s} className={`btn btn-sm ${statusFilter===s?'btn-primary':'btn-ghost'}`}
              onClick={()=>setStatusFilter(s)}
              style={{textTransform:'capitalize'}}>
              {s==='all'?`All (${allCusts.length})`:
               s==='active'?`Active (${allCusts.filter(c=>c.status==='active').length})`:
               s==='inactive'?`Inactive (${allCusts.filter(c=>c.status==='inactive').length})`:
               `Blacklisted (${allCusts.filter(c=>c.status==='blacklisted').length})`}
            </button>
          ))}
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>
          <Icon name="plus" size={14}/> Add New Customer
        </button>
      </div>
      <div className="grid grid-4 mb-4">
        {[
          {l:'Total Customers',v:allCusts.length},
          {l:'Active Hires',v:getEffectiveHires().filter(h=>h.status==='active').length},
          {l:'Total Outstanding',v:fmtCur(allCusts.reduce((a,c)=>a+(c.outstanding||0),0))},
          {l:'YTD Revenue',v:fmtCur(allCusts.reduce((a,c)=>a+(c.ytd_revenue||0),0))}
        ].map(k=>(
          <div key={k.l} className="card card-sm"><div className="kpi-label">{k.l}</div><div style={{fontSize:22,fontWeight:800,marginTop:4}}>{k.v}</div></div>
        ))}
      </div>
      <div className="table-wrap">
        <table>
          <thead>
            <tr><th>Company</th><th>Director</th><th>Contact</th><th>Phone</th><th>Active Hire</th><th>Weekly Rate</th><th>Outstanding</th><th>Status</th><th></th></tr>
          </thead>
          <tbody>
            {filtered.map(c=>{
              const activeHire = getEffectiveHires().find(h=>h.customer===c.id&&h.status==='active');
              const truck = activeHire ? TRUCKS.find(t=>t.id===activeHire.truck) : null;
              return (
                <tr key={c.id} className="tr-link" onClick={()=>setSel(c)}>
                  <td style={{fontWeight:700}}>{c.company}</td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{c.director||'—'}</td>
                  <td>{c.contact}</td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{c.phone}</td>
                  <td style={{fontSize:12}}>{truck?truck.rego:'—'}</td>
                  <td>{(c.weekly_truck||0)>0?fmtCur(c.weekly_truck+(c.weekly_trailer||0))+'/wk':'—'}</td>
                  <td style={{fontWeight:700,color:(c.outstanding||0)>0?'var(--red-light)':'var(--text2)'}}>
                    {(c.outstanding||0)>0?fmtCur(c.outstanding):'—'}
                  </td>
                  <td><span className={statusBadge(c.status)}>{statusLabel(c.status)}</span></td>
                  <td style={{display:'flex',gap:4}}>
                    <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setSel(c)}} title="View"><Icon name="eye" size={13}/></button>
                    <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setEditingCust(c)}} title="Edit"><Icon name="edit" size={13}/></button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{textAlign:'center',padding:32,color:'var(--text3)'}}>No customers found for &quot;{search}&quot;</div>}
      </div>
      {sel&&<CustomerModal c={sel} onClose={()=>setSel(null)}/>}
      {showAdd&&<CustomerFormModal onClose={()=>setShowAdd(false)}/>}
      {editingCust&&<CustomerFormModal existing={editingCust} onClose={()=>setEditingCust(null)}/>}
    </div>
  );
};

/* ─── HIRES PAGE ──────────────────────────────────── */
const HiresPage = ({refreshKey=0}) => {
  const [showNew,setShowNew]=useState(false);
  const [sel,setSel]=useState(null);
  const [editing,setEditing]=useState(false);
  const [saved,setSaved]=useState(false);
  const [hireData,setHireData]=useState(()=>getEffectiveHires());
  const [docHire,setDocHire]=useState(null);
  useEffect(()=>{ setHireData(getEffectiveHires()); },[refreshKey]);
  const active=hireData.filter(h=>h.status==='active');
  const completed=hireData.filter(h=>h.status==='completed');

  const saveHire = (updated) => {
    const idx = HIRES.findIndex(h=>h.id===updated.id);
    if(idx!==-1){ Object.assign(HIRES[idx],updated); }
    setHireData(HIRES.map(h=>({...h})));
    setSaved(true); setTimeout(()=>setSaved(false),3000);
  };

  const HireModal = ({h,onClose}) => {
    const [editMode,setEditMode]=useState(false);
    const [vals,setVals]=useState({...h});
    const c=CUSTOMERS.find(x=>x.id===h.customer);
    const t=TRUCKS.find(x=>x.id===h.truck);
    const tr=TRAILERS.find(x=>x.id===h.trailer);
    const weeks=Math.ceil((new Date(vals.end)-new Date(vals.start))/604800000)||0;
    const totalEst=(vals.weekly_truck+vals.weekly_trailer)*weeks;

    const handleSave = () => {
      saveHire(vals);
      setEditMode(false);
      onClose();
    };

    return (
      <Modal open onClose={onClose} title={`Hire Agreement — ${h.id}`} size="modal-lg"
        footer={
          editMode
            ? <><button className="btn btn-ghost" onClick={()=>setEditMode(false)}>Cancel</button><button className="btn btn-primary" onClick={handleSave}><Icon name="check" size={14}/> Save Changes</button></>
            : <><button className="btn btn-ghost" onClick={onClose}>Close</button><button className="btn btn-ghost" onClick={()=>setEditMode(true)}><Icon name="edit" size={14}/> Edit</button><button className="btn btn-ghost" style={{borderColor:'var(--blue)',color:'var(--blue)'}} onClick={()=>{onClose();setDocHire(h);}}><Icon name="template" size={14}/> Generate Docs</button><button className="btn btn-ghost" style={{color:'var(--red-light)',borderColor:'var(--red-light)'}} onClick={()=>{if(window.confirm('Delete hire '+h.id+' for '+custName(h.customer)+'? This cannot be undone.')){const idx=HIRES.findIndex(x=>x.id===h.id);if(idx!==-1)HIRES.splice(idx,1);const truck=TRUCKS.find(t=>t.id===h.truck);if(truck&&truck.hirer===h.customer){truck.status='available';truck.hirer=null;}setHireData(getEffectiveHires());onClose();}}}><Icon name="close" size={14}/> Delete</button><button className="btn btn-primary"><Icon name="invoice" size={14}/> Generate Invoice</button></>
        }>
        {editMode ? (
          <div>
            <div style={{background:'rgba(41,128,185,0.08)',border:'1px solid rgba(41,128,185,0.2)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--blue)'}}>
              Editing hire {h.id} — changes save to app and sync to Google Sheets on next sync
            </div>
            <div className="form-row mb-3">
              <div className="form-group"><label>Hire End Date</label><input type="date" value={vals.end} onChange={e=>setVals(v=>({...v,end:e.target.value}))}/></div>
              <div className="form-group"><label>Status</label>
                <select value={vals.status} onChange={e=>setVals(v=>({...v,status:e.target.value}))}>
                  <option value="active">Active</option>
                  <option value="completed">Completed</option>
                  <option value="cancelled">Cancelled</option>
                </select>
              </div>
            </div>
            <div className="form-row mb-3">
              <div className="form-group"><label>Weekly Truck Rate ($)</label><input type="number" value={vals.weekly_truck} onChange={e=>setVals(v=>({...v,weekly_truck:parseFloat(e.target.value)||0}))}/></div>
              <div className="form-group"><label>Weekly Trailer Rate ($)</label><input type="number" value={vals.weekly_trailer} onChange={e=>setVals(v=>({...v,weekly_trailer:parseFloat(e.target.value)||0}))}/></div>
            </div>
            <div className="form-row mb-3">
              <div className="form-group"><label>Mileage Rate ($/km)</label><input type="number" step="0.01" value={vals.mileage_rate} onChange={e=>setVals(v=>({...v,mileage_rate:parseFloat(e.target.value)||0}))}/></div>
              <div className="form-group"><label>RUC Rate ($/km)</label><input type="number" step="0.01" value={vals.ruc_rate} onChange={e=>setVals(v=>({...v,ruc_rate:parseFloat(e.target.value)||0}))}/></div>
            </div>
            <div className="form-group mb-3"><label>Invoiced To Date</label><input type="date" value={vals.invoiced_to||''} onChange={e=>setVals(v=>({...v,invoiced_to:e.target.value}))}/></div>
            <div className="form-group"><label>Notes</label><textarea value={vals.notes||''} onChange={e=>setVals(v=>({...v,notes:e.target.value}))}/></div>
          </div>
        ) : (
          <div>
            <div className="grid" style={{gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
              {[['Customer',c?.company],['Truck',t?`${t.rego} — ${t.make} ${t.model}`:'—'],['Trailer',tr?`${tr.rego} — ${tr.make} ${tr.model}`:'—'],['Start Date',fmt(h.start)],['End Date',fmt(h.end)],['Duration',`${weeks} weeks`],['Weekly Truck Hire',fmtCur(h.weekly_truck)],['Weekly Trailer Hire',fmtCur(h.weekly_trailer)],['Mileage Rate',`$${h.mileage_rate}/km`],['RUC Rate',`$${h.ruc_rate}/km`],['Bond',fmtCur(h.bond||5000)],['Est. Total (hire only)',fmtCur(totalEst)]].map(([l,v])=>(
                <div key={l} style={{padding:'10px 14px',background:'var(--bg3)',borderRadius:8}}>
                  <div style={{fontSize:11,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',marginBottom:3}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:600}}>{v}</div>
                </div>
              ))}
            </div>
            <div className="divider"/>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Checklist</div>
            <div className="grid" style={{gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[['Agreement Signed',h.signed],['Insurance Verified',h.insurance_verified],['Pre-Handover Checklist',h.checklist_done],['Bond Received',h.bond_paid]].map(([l,v])=>(
                <div key={l} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--bg3)',borderRadius:8}}>
                  <Icon name={v?'check':'close'} size={16} color={v?'var(--green)':'var(--red-light)'}/>
                  <span style={{fontSize:13}}>{l}</span>
                </div>
              ))}
            </div>
            <div className="divider"/>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Invoice Schedule</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>Invoiced to: <strong style={{color:'var(--text)'}}>{h.invoiced_to?fmt(h.invoiced_to):'—'}</strong> &nbsp;·&nbsp; Next invoice: <strong style={{color:'var(--text)'}}>{h.next_invoice?fmt(h.next_invoice):'—'}</strong></div>
            {h.notes&&<div style={{marginTop:12,padding:'10px 14px',background:'var(--bg3)',borderRadius:8,fontSize:12,color:'var(--text2)'}}>{h.notes}</div>}
          </div>
        )}
      </Modal>
    );
  };

  const NewHireModal = ({onClose}) => {

        footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleCreate}><Icon name="check" size={14}/> Create Hire Agreement</button></>}>
        <div className="form-row mb-4">
          <div className="form-group"><label>Customer</label>
            <select value={vals.customer} onChange={e=>setVals(v=>({...v,customer:e.target.value}))}>
              <option value="">Select customer…</option>
              {CUSTOMERS.map(c=><option key={c.id} value={c.id}>{c.company}</option>)}
            </select>
          </div>
          <div className="form-group"><label>Assign Truck</label>
            <select value={vals.truck} onChange={e=>setVals(v=>({...v,truck:e.target.value}))}>
              <option value="">Select truck…</option>
              {TRUCKS.filter(t=>t.status==='available').map(t=><option key={t.id} value={t.id}>{t.rego} — {t.make} {t.model}</option>)}
            </select>
          </div>
        </div>
        <div className="form-row mb-4">
          <div className="form-group"><label>Assign Trailer (optional)</label>
            <select value={vals.trailer} onChange={e=>setVals(v=>({...v,trailer:e.target.value}))}>
              <option value="">No trailer</option>
              {TRAILERS.filter(t=>t.status==='available').map(t=><option key={t.id} value={t.id}>{t.rego} — {t.make} {t.model}</option>)}
            </select>
          </div>
          <div className="form-group"><label>Hire Start Date</label><input type="date" value={vals.start} onChange={e=>setVals(v=>({...v,start:e.target.value}))}/></div>
        </div>
        <div className="form-row mb-4">
          <div className="form-group"><label>Hire End Date</label><input type="date" value={vals.end} onChange={e=>setVals(v=>({...v,end:e.target.value}))}/></div>
          <div className="form-group"><label>Weekly Truck Rate (NZD)</label><input type="number" value={vals.weekly_truck} onChange={e=>setVals(v=>({...v,weekly_truck:parseFloat(e.target.value)||0}))}/></div>
        </div>
        <div className="form-row-3 mb-4">
          <div className="form-group"><label>Weekly Trailer Rate (NZD)</label><input type="number" value={vals.weekly_trailer} onChange={e=>setVals(v=>({...v,weekly_trailer:parseFloat(e.target.value)||0}))}/></div>
          <div className="form-group"><label>Mileage Rate ($/km)</label><input type="number" step="0.01" value={vals.mileage_rate} onChange={e=>setVals(v=>({...v,mileage_rate:parseFloat(e.target.value)||0}))}/></div>
          <div className="form-group"><label>RUC Rate ($/km)</label><input type="number" step="0.01" value={vals.ruc_rate} onChange={e=>setVals(v=>({...v,ruc_rate:parseFloat(e.target.value)||0}))}/></div>
        </div>
        <div className="form-row mb-4">
          <div className="form-group"><label>Bond Amount (NZD)</label><input type="number" value={vals.bond} onChange={e=>setVals(v=>({...v,bond:parseFloat(e.target.value)||0}))}/></div>
        </div>
        <div className="form-group mb-4"><label>Notes / Special Conditions</label><textarea value={vals.notes} onChange={e=>setVals(v=>({...v,notes:e.target.value}))} placeholder="Enter any special hire conditions…"/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['Insurance verified','insurance_verified'],['Pre-handover checklist completed','checklist_done'],['Bond payment received','bond_paid'],['Digital signature obtained','signed']].map(([l,k])=>(
            <label key={k} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,textTransform:'none',marginBottom:0,cursor:'pointer'}}>
              <input type="checkbox" checked={vals[k]} onChange={e=>setVals(v=>({...v,[k]:e.target.checked}))} style={{width:'auto'}}/> {l}
            </label>
          ))}
        </div>
      </Modal>

/* ─── BANK TRANSACTION ENGINE ────────────────────── */
const BANK_TXN_KEY = 'ss_rentals_bank_txns';
const BANK_META_KEY = 'ss_rentals_bank_meta';

const loadBankTxns = () => { try { return JSON.parse(localStorage.getItem(BANK_TXN_KEY)||'[]'); } catch { return []; } };
const saveBankTxns = txns => { localStorage.setItem(BANK_TXN_KEY, JSON.stringify(txns)); localStorage.setItem(BANK_META_KEY, JSON.stringify({count:txns.length,updated:new Date().toISOString()})); };
const loadBankMeta = () => { try { return JSON.parse(localStorage.getItem(BANK_META_KEY)||'null'); } catch { return null; } };

// Dedup merge: only add txns whose id not already in store
const mergeTxns = (existing, incoming) => {
  const existingIds = new Set(existing.map(t=>t.id));
  const newOnly = incoming.filter(t=>!existingIds.has(t.id));
  return { merged: [...existing, ...newOnly].sort((a,b)=>b.date.localeCompare(a.date)), added: newOnly.length, duplicates: incoming.length - newOnly.length };
};

// ASB CSV parser — format: Date,Unique Id,Tran Type,Cheque Number,Payee,Memo,Amount
const parseASBCsv = (text) => {
  const lines = text.split('\n');
  const txns = [];
  let headerIdx = -1;
  for (let i=0; i<Math.min(12,lines.length); i++) {
    if (lines[i].startsWith('Date,') || lines[i].includes('Date,Unique Id')) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return [];
  for (let i=headerIdx+1; i<lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(',');
    if (cols.length < 7) continue;
    const dateStr = (cols[0]||'').replace(/"/g,'').trim();
    const uniqueId = (cols[1]||'').replace(/"/g,'').trim();
    const payee = (cols[4]||'').replace(/"/g,'').trim();
    const memo = (cols[5]||'').replace(/"/g,'').trim();
    const amtStr = (cols[6]||'').replace(/"/g,'').trim();
    const amount = parseFloat(amtStr);
    if (!dateStr || isNaN(amount) || amount === 0) continue;
    const date = dateStr.replace(/\//g, '-');
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
    txns.push({ id: uniqueId||date+'_'+i, date, payee, memo, amount, type:amount>0?'credit':'debit', category:categoriseTxn(payee,memo,amount), source:'csv', importedAt:new Date().toISOString() });
  }
  return txns;
};

// Categorisation
const CATEGORIES = {
  income:       { label:'Hire Income',          color:'var(--green)',    keywords:['gocardless','d/c from','truck rent','hire','inv','rental','chardikala','empire trucking','pangly','team freight','ss dhillon','reet invest','convoy','baaz','jatana','kahlon','satpal','shah transport','vertex haulage','dhillon','dhadda','s & z','s&z','s&s','pb48','cambridge diese','gsr transport','samra','sukh'] },
  ruc:          { label:'RUC',                   color:'var(--orange)',   keywords:['nz transport','ruc','road user','e-road','eroad','nzta'] },
  insurance:    { label:'Insurance',             color:'var(--blue)',     keywords:['premium fund','insurance','vero','amic','nzi','zurich','tower'] },
  flexi:        { label:'Flexi Loan',            color:'#8E44AD',        keywords:['flexigroup','flexicommercial','flexicommerc','flexirent'] },
  heartland:    { label:'Heartland Loan',        color:'#9B59B6',        keywords:['heartland bank','heartland'] },
  navman:       { label:'Navman/GPS',            color:'#2980B9',        keywords:['navman wireless','teletracnavman','teletrac','navman'] },
  maintenance:  { label:'Repairs & Maintenance', color:'var(--red)',      keywords:['ss rentals','inv 3','inv 21','kiwiplates','vtnz','workshop','mechanic','parts'] },
  fuel:         { label:'Fuel',                  color:'#E67E22',        keywords:['bp ','z energy','gull','mobil fuel','diesel'] },
  advertising:  { label:'Advertising',           color:'#F39C12',        keywords:['facebk','facebook','tiktok','google ads'] },
  gst_tax:      { label:'GST / Tax',             color:'#C0392B',        keywords:['inland revenue','ird','gst'] },
  software:     { label:'Software & Subscriptions', color:'#7F8C8D',    keywords:['xero nz','openai','chatgpt','godaddy','claude.ai','khalsa hosting','smartpay','paymark','spark','offshoremargin'] },
  other_expense:{ label:'Other Expense',         color:'var(--text3)',   keywords:[] },
};

const categoriseTxn = (payee, memo, amount) => {
  const text = (payee+' '+memo).toLowerCase();
  if (amount > 0) {
    for (const kw of CATEGORIES.income.keywords) { if (text.includes(kw)) return 'income'; }
    return 'income_other';
  }
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    if (key==='income'||key==='other_expense'||key==='income_other') continue;
    for (const kw of cat.keywords) { if (text.includes(kw)) return key; }
  }
  return 'other_expense';
};

const buildPnlFromTxns = (txns) => {
  const monthly = {};
  txns.forEach(t => {
    const mo = t.date.slice(0,7);
    if (!monthly[mo]) monthly[mo] = {month:mo,revenue:0,insurance:0,navman_ruc:0,ruc:0,other:0,repairs:0,flexi:0,heartland:0,fuel:0,advertising:0,gst:0,software:0,expenses:0,net:0,txnCount:0};
    const m = monthly[mo]; m.txnCount++;
    const amt = Math.abs(t.amount);
    if (t.amount>0) { m.revenue+=t.amount; }
    else {
      switch(t.category) {
        case 'insurance': m.insurance+=amt; break; case 'ruc': m.ruc+=amt; break;
        case 'navman': m.navman_ruc+=amt; break; case 'maintenance': m.repairs+=amt; break;
        case 'flexi': m.flexi+=amt; break; case 'heartland': m.heartland+=amt; break;
        case 'fuel': m.fuel+=amt; break; case 'advertising': m.advertising+=amt; break;
        case 'gst_tax': m.gst+=amt; break; case 'software': m.software+=amt; break;
        default: m.other+=amt;
      }
    }
  });
  Object.values(monthly).forEach(m=>{
    m.expenses=m.insurance+m.navman_ruc+m.ruc+m.other+m.repairs+m.flexi+m.heartland+m.fuel+m.advertising+m.gst+m.software;
    m.net=m.revenue-m.expenses;
  });
  return Object.values(monthly).sort((a,b)=>a.month.localeCompare(b.month));
};

// Sheets: push bank txns tab to Google Sheets
const syncBankTxnsToSheet = async (accessToken, spreadsheetId, txns) => {
  const rows = [
    ['Date','ID','Payee','Memo','Amount','Type','Category','Source','Imported At'],
    ...txns.map(t=>[t.date,t.id,t.payee,t.memo,t.amount,t.type,CATEGORIES[t.category]?.label||t.category,t.source||'csv',t.importedAt||''])
  ];
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent('Bank Transactions')}:clear`,{method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'}});
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent('Bank Transactions')}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values:rows})});
};

// Sheets: pull bank txns from Google Sheets (two-way)
const pullBankTxnsFromSheet = async (accessToken, spreadsheetId) => {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent('Bank Transactions')}`,{headers:{Authorization:'Bearer '+accessToken}});
  if (!res.ok) return [];
  const data = await res.json();
  const rows = data.values||[];
  if (rows.length<2) return [];
  // headers: Date,ID,Payee,Memo,Amount,Type,Category,Source,Imported At
  return rows.slice(1).map(r=>({
    date:r[0]||'', id:r[1]||r[0]+'_sheet', payee:r[2]||'', memo:r[3]||'',
    amount:parseFloat(r[4])||0, type:r[5]||'', category:categoriseTxn(r[2]||'',r[3]||'',parseFloat(r[4])||0),
    source:'sheets', importedAt:r[8]||new Date().toISOString()
  })).filter(t=>t.date&&t.amount!==0);
};
