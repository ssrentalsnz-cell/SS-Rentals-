*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --bg:#FFFFFF;--bg2:#F8F5FF;--bg3:#F0EBF8;--bg4:#E8E0F5;
  --card:#FFFFFF;--card2:#F8F5FF;
  --border:rgba(106,27,154,0.12);--border2:rgba(106,27,154,0.22);
  --text:#1a0533;--text2:#5c3d7a;--text3:#9b7ab5;
  --sidebar:#FFFFFF;--sidebar-text:#1a0533;--sidebar-active:rgba(106,27,154,0.08);
  --shadow:0 2px 12px rgba(106,27,154,0.12);
}
body.light{
  --bg:#F2F2F7;--bg2:#FFFFFF;--bg3:#E8E8ED;--bg4:#D8D8DC;
  --card:#FFFFFF;--card2:#F5F5F5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1A1A;--text2:#555;--text3:#999;
  --sidebar:#1A1A1A;--sidebar-text:#C8C8C8;--sidebar-active:rgba(217,43,43,0.2);
  --shadow:0 2px 12px rgba(0,0,0,0.1);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#root{height:100%}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:#FFFFFF;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(106,27,154,0.15);overflow-y:auto;overflow-x:hidden}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(106,27,154,0.12)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:55px;height:55px;background:#FFFFFF;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#6A1B9A;flex-shrink:0}
.logo-text{color:#1a0533;font-weight:700;font-size:15px;line-height:1.2}
.logo-sub{color:#9b7ab5;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.sidebar-section{padding:8px 10px 4px;margin-top:8px}
.sidebar-section-label{color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:#6A1B9A;font-size:13.5px;font-weight:500;transition:all .15s;margin-bottom:1px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(106,27,154,0.06);color:#4A148C}
.nav-item.active{background:rgba(255,111,0,0.10);color:#FF6F00;border:1px solid rgba(255,111,0,0.25)}
.nav-item .nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.8}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:#FF6F00;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.06)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header-title{font-size:17px;font-weight:700;flex:1}
.header-sub{font-size:12px;color:var(--text2);font-weight:400}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-light)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.icon-btn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-sub{font-size:12px;color:var(--text2)}
/* GRID */
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
/* KPI CARDS */
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--red))}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:12px;color:var(--text2);margin-top:6px}
.kpi-trend{font-size:11px;font-weight:600;margin-top:4px}
.kpi-trend.up{color:var(--green)}
.kpi-trend.down{color:var(--red-light)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge-green{background:rgba(39,174,96,.15);color:#4ade80;border:1px solid rgba(39,174,96,.3)}
.badge-red{background:rgba(217,43,43,.15);color:#ff6b6b;border:1px solid rgba(217,43,43,.3)}
.badge-orange{background:rgba(230,126,34,.15);color:#ffa756;border:1px solid rgba(230,126,34,.3)}
.badge-blue{background:rgba(41,128,185,.15);color:#5dade2;border:1px solid rgba(41,128,185,.3)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
/* TABLES */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 14px;border-top:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.tr-link{cursor:pointer}
/* ALERTS */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:9px;border-left:3px solid;margin-bottom:8px;font-size:13px}
.alert-red{background:rgba(217,43,43,.1);border-color:var(--red);color:#ff8585}
.alert-orange{background:rgba(230,126,34,.1);border-color:var(--orange);color:#ffc785}
.alert-green{background:rgba(39,174,96,.1);border-color:var(--green);color:#6fcf97}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;width:90%;max-width:760px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal-lg{max-width:920px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}

.modal-body{overflow-y:auto;padding:24px;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

.tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}

.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-orange{background:var(--orange)}
.dot-gray{background:var(--text3)}
/* MISC */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.text-right{text-align:right}.text-center{text-align:center}
.fw-700{font-weight:700}.fw-600{font-weight:600}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.text-red{color:var(--red-light)}.text-green{color:#4ade80}.text-orange{color:#ffa756}.text-muted{color:var(--text2)}

.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.w-full{width:100%}
.divider{height:1px;background:var(--border);margin:16px 0}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

.chart-wrap{position:relative;height:220px}
.chart-wrap-sm{height:160px}
/* PROGRESS BAR */
.progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;transition:width .3s}
/* COMPLIANCE METER */
.compliance-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.compliance-row:last-child{border-bottom:none}
/* NOTIFICATION */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:4px;right:4px}
/* AVATAR */
.avatar{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}
/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:60px}.logo-text,.sidebar-section-label,.nav-item span,.sidebar-footer{display:none}
  .nav-item{justify-content:center;padding:10px}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}
}
</style>

/* ─── GOOGLE SHEETS SYNC ENGINE ──────────────────── */
const SHEETS_CONFIG_KEY = 'ss_rentals_sheets_config';

const loadSheetsConfig = () => {
  try { return JSON.parse(localStorage.getItem(SHEETS_CONFIG_KEY) || 'null'); } catch { return null; }
};
const saveSheetsConfig = cfg => localStorage.setItem(SHEETS_CONFIG_KEY, JSON.stringify(cfg));

// Silently refresh Google access token when expired (no popup if already consented)
const refreshSheetsToken = (clientId, callback) => {
  if (!window.google?.accounts?.oauth2) { callback(null); return; }
  const client = window.google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    prompt: '',  // empty string = no consent prompt if already granted
    callback: (resp) => {
      if (resp.error || !resp.access_token) { callback(null); return; }
      const cfg = loadSheetsConfig();
      if (!cfg) { callback(null); return; }
      const updated = { ...cfg, accessToken: resp.access_token, tokenExpiry: Date.now() + (resp.expires_in||3600)*1000 };
      saveSheetsConfig(updated);
      callback(updated);
    },
    error_callback: () => callback(null),
  });
  client.requestAccessToken();
};

// Get a valid Sheets config — refreshes token silently if within 5 min of expiry
const getValidSheetsConfig = (cfg, callback) => {
  if (!cfg?.clientId || !cfg?.spreadsheetId) { callback(null); return; }
  const fiveMin = 5 * 60 * 1000;
  const needsRefresh = !cfg.accessToken || !cfg.tokenExpiry || Date.now() > cfg.tokenExpiry - fiveMin;
  if (!needsRefresh) { callback(cfg); return; }
  refreshSheetsToken(cfg.clientId, (refreshed) => callback(refreshed || cfg));
};

const syncSheetTab = async (accessToken, spreadsheetId, sheetName, rows) => {
  // Clear then write
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}:clear`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
  });
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?valueInputOption=RAW`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: rows }),
  });
  if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || 'Sheets write failed'); }
};

const ensureSheets = async (accessToken, spreadsheetId, neededSheets) => {
  const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties.title`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await meta.json();
  const existing = (data.sheets || []).map(s => s.properties.title);
  const toAdd = neededSheets.filter(n => !existing.includes(n));
  if (toAdd.length === 0) return;
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: toAdd.map(t => ({ addSheet: { properties: { title: t } } })) }),
  });
};

// Read a sheet tab back from Google Sheets
const readSheetTab = async (accessToken, spreadsheetId, sheetName) => {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!res.ok) return null;
  const data = await res.json();
  return data.values || [];
};

// Pull hire changes from Google Sheets back into app data
const pullHiresFromSheet = (rows) => {
  if (!rows || rows.length < 2) return 0;
  const headers = rows[0];
  const idIdx = headers.indexOf('Hire ID');
  const endIdx = headers.indexOf('End');
  const statusIdx = headers.indexOf('Status');
  const weeklyIdx = headers.indexOf('Weekly Rate');
  const notesIdx = headers.indexOf('Notes');
  if (idIdx === -1) return 0;
  let updated = 0;
  rows.slice(1).forEach(row => {
    const id = row[idIdx];
    const hire = HIRES.find(h => h.id === id);
    if (!hire) return;
    if (endIdx !== -1 && row[endIdx] && row[endIdx] !== hire.end) { hire.end = row[endIdx]; updated++; }
    if (statusIdx !== -1 && row[statusIdx] && row[statusIdx] !== hire.status) { hire.status = row[statusIdx]; updated++; }
    if (weeklyIdx !== -1 && row[weeklyIdx]) {
      const rate = parseFloat(row[weeklyIdx]);
      if (!isNaN(rate) && rate !== hire.weekly_truck + hire.weekly_trailer) { hire.weekly_truck = rate; updated++; }
    }
    if (notesIdx !== -1 && row[notesIdx] !== undefined) hire.notes = row[notesIdx];
  });
  return updated;
};

// Pull customer changes from Google Sheets
const pullCustomersFromSheet = (rows) => {
  if (!rows || rows.length < 2) return 0;
  const headers = rows[0].map(h => (h||'').trim());
  const col = (name) => {
    // Try exact match first, then case-insensitive
    let i = headers.findIndex(h => h === name);
    if (i === -1) i = headers.findIndex(h => h.toLowerCase() === name.toLowerCase());
    return i;
  };
  const idIdx      = col('ID');
  const compIdx    = col('Company');
  const contIdx    = col('Contact');
  const phoneIdx   = col('Phone');
  const emailIdx   = col('Email');
  const addressIdx = col('Address');
  const statusIdx  = col('Status');
  const outIdx     = col('Outstanding');
  const notesIdx   = col('Notes');

  // Build a fresh map of all known companies (lowercase) -> customer
  const allCusts = getAllCustomers();
  const byCompany = {};
  allCusts.forEach(c => { byCompany[c.company.toLowerCase().trim()] = c; });
  const byId = {};
  allCusts.forEach(c => { if (c.id) byId[c.id] = c; });

  const existingNewCusts = loadNewCustomers();
  let updated = 0;
  let addedNew = 0;

  rows.slice(1).forEach((row, rowIdx) => {
    if (!row || row.every(c => !c)) return;
    const id      = idIdx  >= 0 ? (row[idIdx]||'').toString().trim()  : '';
    const company = compIdx >= 0 ? (row[compIdx]||'').toString().trim() : '';
    if (!company) return;
    console.log('[Sync row]', rowIdx+1, '| id:', JSON.stringify(id), '| company:', company);

    const compKey = company.toLowerCase().trim();
    const existingById = id ? byId[id] : null;
    const existingByName = byCompany[compKey];
    const existing = existingById || existingByName;

    if (existing) {
      // Update fields on existing customer
      if (outIdx >= 0 && row[outIdx] !== undefined && row[outIdx] !== '') {
        const v = parseFloat(row[outIdx]); if (!isNaN(v)) existing.outstanding = v;
      }
      if (notesIdx >= 0 && row[notesIdx] !== undefined) existing.notes = row[notesIdx];
      if (statusIdx >= 0 && row[statusIdx]) existing.status = row[statusIdx].toLowerCase().trim();
      updated++;
    } else {
      // Genuinely new customer — not in app at all
      const newId = id || ('CS' + String(Date.now() + rowIdx).slice(-6));
      const newCust = {
        id: newId, company,
        contact:  contIdx  >= 0 ? (row[contIdx]||'').toString().trim()  : '',
        phone:    phoneIdx >= 0 ? (row[phoneIdx]||'').toString().trim()  : '',
        email:    emailIdx >= 0 ? (row[emailIdx]||'').toString().trim()  : '',
        address:  addressIdx >= 0 ? (row[addressIdx]||'').toString().trim() : '',
        status:   statusIdx >= 0 && row[statusIdx] ? row[statusIdx].toString().toLowerCase().trim() : 'active',
        outstanding: outIdx >= 0 ? (parseFloat(row[outIdx])||0) : 0,
        notes:    notesIdx >= 0 ? (row[notesIdx]||'').toString().trim() : '',
        credit_rating:'B+', ytd_revenue:0, weekly_truck:0, weekly_trailer:0,
        payment_terms:'Weekly', joined: new Date().toISOString().slice(0,10),
        _fromSheet: true,
      };
      existingNewCusts.push(newCust);
      byCompany[compKey] = newCust;
      byId[newId] = newCust;
      addedNew++;
    }
  });

  if (addedNew > 0) {
    saveNewCustomers(existingNewCusts);
    console.log('[Customers Sync] Added', addedNew, 'new customer(s) from sheet');
  }
  return updated + addedNew;
};

// Parse NZ date formats like "27/04/26", "27/4/2026"
const parseNZDate = (str) => {
  if (!str) return null;
  str = str.trim();
  // Try dd/mm/yy or dd/mm/yyyy
  const m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (!m) return null;
  let [,d,mo,y] = m;
  if (y.length===2) y = '20'+y;
  return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
};

// Parse hire period string like "27/04/26 till 27/10/26" or "25/5/26 to 31/5/26"
const parseHirePeriod = (str) => {
  if (!str) return null;
  str = str.trim();
  // Split on "till", "to", "-", "–"
  const parts = str.split(/\s+(?:till|to|–|-)\s+/i);
  if (parts.length === 2) {
    const start = parseNZDate(parts[0].trim());
    const end = parseNZDate(parts[1].trim());
    if (start && end) return { start, end };
  }
  return null;
};

// Pull hire data from Sheet1 (the original customer sheet with Hire period column)
const pullHiresFromSheet1 = (rows, extLog) => {
  if (!rows || rows.length < 2) return 0;
  // Find header row (contains "Hire period")
  let headerIdx = -1;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    if (rows[i].some(c => typeof c === 'string' && c.toLowerCase().includes('hire period'))) {
      headerIdx = i; break;
    }
  }
  if (headerIdx === -1) return 0;
  const headers = rows[headerIdx].map(h => (h||'').toLowerCase().trim());
  // Detect column indexes — with fallbacks matching actual sheet structure
  // Sheet structure: A(blank), B(Company), C(Contact), D(Phone), E(Hire period), F(Description), G(Rego), H(Weekly charges)
  let compIdx = headers.findIndex(h => h.includes('company')); if (compIdx === -1) compIdx = 1;
  let periodIdx = headers.findIndex(h => h.includes('hire period')); if (periodIdx === -1) periodIdx = 4;
  let regoIdx = headers.findIndex(h => h.includes('rego')); if (regoIdx === -1) regoIdx = 6;
  let rateIdx = headers.findIndex(h => h.includes('weekly charge') || h.includes('weekly charges')); if (rateIdx === -1) rateIdx = 7;

  let updated = 0;
  rows.slice(headerIdx + 1).forEach(row => {
    const company = (row[compIdx] || '').trim();
    const periodStr = (row[periodIdx] || '').trim();
    const regoStr = (row[regoIdx] || '').trim();
    const rateStr = (row[rateIdx] || '').toString().trim();
    if (!company || !periodStr || periodStr.toLowerCase().includes('didn') || periodStr.toLowerCase() === 'n/a') return;
    // Skip entries where period is very old (more than 60 days ago) to avoid re-matching old hires
    const testPeriod = parseHirePeriod(periodStr);
    if (testPeriod) {
      const endCheck = new Date(testPeriod.end + 'T23:59:59');
      const sixtyDaysAgo = new Date(); sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);
      if (endCheck < sixtyDaysAgo) return; // Skip very old hires
    }

    const period = parseHirePeriod(periodStr);
    if (!period) return;

    // Find matching customer — normalize & and spaces for comparison
    const normalize = s => s.toLowerCase().replace(/\s+/g,' ').replace(/&/g,'and').trim();
    const compNorm = normalize(company);
    const cust = CUSTOMERS.find(c => {
      const cNorm = normalize(c.company);
      return cNorm === compNorm ||
        cNorm.includes(compNorm) ||
        compNorm.includes(cNorm) ||
        cNorm.split(' ')[0] === compNorm.split(' ')[0];
    });
    if (!cust) return;

    // Find best matching hire — most recent for this customer
    const hire = HIRES.filter(h => h.customer === cust.id)
      .sort((a,b) => new Date(b.start) - new Date(a.start))[0];
    if (!hire) return;

    // Always update end date and start date from sheet
    let changed = false;
    if (hire.end !== period.end) { hire.end = period.end; changed = true; }
    if (hire.start !== period.start) { hire.start = period.start; changed = true; }

    // Parse weekly rate
    if (rateStr) {
      const rateNum = parseFloat(rateStr.replace(/[^0-9.]/g,''));
      if (!isNaN(rateNum) && rateNum > 0 && rateNum !== hire.weekly_truck) {
        hire.weekly_truck = rateNum; changed = true;
      }
    }

    // Save overrides to localStorage so they persist across renders
    const truck = TRUCKS.find(t => t.id === hire.truck);
    const endDate = new Date(period.end + 'T23:59:59');
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    const newStatus = endDate >= todayStart ? 'active' : 'completed';
    const override = { end: period.end, start: period.start, status: newStatus };
    if (rateStr) {
      // Handle formats: "$2590.58 per week", "2590.58", "$2,590.58/wk"
      const cleaned = rateStr.replace(/[$,]/g,'').replace(/per week|per wk|\/wk|\/week/gi,'').trim();
      const r = parseFloat(cleaned);
      if (!isNaN(r) && r > 0) override.weekly_truck = r;
    }
    saveHireOverride(hire.id, override);
    if (truck) {
      if (newStatus === 'active') { truck.status = 'on_hire'; truck.hirer = cust.id; }
      else if (truck.hirer === cust.id) { truck.status = 'available'; truck.hirer = null; }
    }
    updated++;
  });
  return updated;
};

const runFullSync = async (config, onProgress, onDone, onError) => {
  try {
    const { accessToken, spreadsheetId } = config;

    // STEP 1: Pull changes FROM Sheets INTO app
    onProgress('Reading changes from Sheets…', 0);
    let pullUpdates = 0;
    try {
      // Read Sheet1 (original customer hire period tab)
      const sheet1Rows = await readSheetTab(accessToken, spreadsheetId, 'Sheet1');
      if (sheet1Rows) pullUpdates += pullHiresFromSheet1(sheet1Rows, []);
      // Read Hire Management tab
      const hireRows = await readSheetTab(accessToken, spreadsheetId, 'Hire Management');
      if (hireRows) pullUpdates += pullHiresFromSheet(hireRows);
      // Read Customers tab
      const custRows = await readSheetTab(accessToken, spreadsheetId, 'Customers');
      if (custRows) pullUpdates += pullCustomersFromSheet(custRows);
    } catch(e) { console.error('Sheet pull error:', e.message); }

    // STEP 2: Push all current app data TO Sheets
    const allRows = buildSheetRows();
    const bankTxnsForSheet = loadBankTxns();
    const bankRows = bankTxnsForSheet.length > 0 ? [
      ['Date','ID','Payee','Memo','Amount','Type','Category','Source','Imported At'],
      ...bankTxnsForSheet.map(t=>[t.date,t.id,t.payee,t.memo,t.amount,t.type,t.category,t.source||'csv',t.importedAt||''])
    ] : [['Date','ID','Payee','Memo','Amount','Type','Category','Source','Imported At']];
    const tabMap = {
      'Fleet & Trailers': allRows.fleet,
      'Customers': allRows.customers,
      'Hire Management': allRows.hires,
      'Invoices': allRows.invoices,
      'Maintenance': allRows.maintenance,
      'P&L Detail': allRows.pnl,
      'Bank Transactions': bankRows,
    };
    onProgress('Checking sheets…', 15);
    await ensureSheets(accessToken, spreadsheetId, Object.keys(tabMap));
    const tabs = Object.entries(tabMap);
    for (let i = 0; i < tabs.length; i++) {
      const [name, rows] = tabs[i];
      onProgress(`Syncing ${name}…`, Math.round(15 + ((i) / tabs.length) * 85));
      await syncSheetTab(accessToken, spreadsheetId, name, rows);
    }
    onDone(new Date(), pullUpdates);
  } catch (e) { onError(e.message || 'Unknown sync error'); }
};

const XERO_CLIENT_ID = '4FB523DA93F24256BBD50A07CA9E9C9A';

// Cloudflare Worker proxy URL — handles token exchange to avoid CORS

const loadXeroConfig = () => { try { return JSON.parse(localStorage.getItem(XERO_CONFIG_KEY)||'null'); } catch { return null; } };
const saveXeroConfig = cfg => localStorage.setItem(XERO_CONFIG_KEY, JSON.stringify(cfg));

// PKCE helpers
const generateCodeVerifier = () => {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  const b64 = btoa(String.fromCharCode(...arr));
  return b64.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/[=]/g,'');
};
const generateCodeChallenge = async (verifier) => {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  const b64 = btoa(String.fromCharCode(...new Uint8Array(digest)));
  return b64.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/[=]/g,'');
};

const startXeroAuth = async () => {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('xero_verifier', verifier);
  localStorage.setItem('xero_verifier_backup', verifier);
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('xero_state', state);
  localStorage.setItem('xero_state_backup', state);
  const url = 'https://login.xero.com/identity/connect/authorize'
    + '?response_type=code'
    + '&client_id=' + encodeURIComponent(XERO_CLIENT_ID)
    + '&redirect_uri=' + encodeURIComponent(XERO_REDIRECT_URI)
    + '&scope=' + encodeURIComponent(XERO_SCOPES)
    + '&state=' + state
    + '&code_challenge=' + challenge
    + '&code_challenge_method=S256';
  window.location.href = url;
};

// Token exchange via proxy to avoid CORS
const exchangeXeroCode = async (code) => {
  const verifier = sessionStorage.getItem('xero_verifier') || localStorage.getItem('xero_verifier_backup');
  if (!verifier) throw new Error('No code verifier found — please try connecting again');
  localStorage.removeItem('xero_verifier_backup');
  // Try direct first (Xero may allow it), fall back to proxy
  const body = new URLSearchParams({
    grant_type:'authorization_code', code,
    redirect_uri:XERO_REDIRECT_URI,
    client_id:XERO_CLIENT_ID,
    code_verifier:verifier
  });
  let res = await fetch('https://identity.xero.com/connect/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  }).catch(()=>null);
  if (!res || !res.ok) {
    // Fall back to proxy
    res = await fetch(XERO_PROXY + '/token', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ grant_type:'authorization_code', code, redirect_uri:XERO_REDIRECT_URI, client_id:XERO_CLIENT_ID, code_verifier:verifier })
    });
  }
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error_description || e.error || 'Token exchange failed — CORS issue. A proxy server is needed.');
  }
  const data = await res.json();
  sessionStorage.removeItem('xero_verifier');
  sessionStorage.removeItem('xero_state');
  return { accessToken:data.access_token, refreshToken:data.refresh_token, tokenExpiry:Date.now()+(data.expires_in||1800)*1000 };
};

const refreshXeroToken = async (refreshToken) => {
  const body = new URLSearchParams({ grant_type:'refresh_token', refresh_token:refreshToken, client_id:XERO_CLIENT_ID });
  let res = await fetch('https://identity.xero.com/connect/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  }).catch(()=>null);
  if (!res || !res.ok) {
    res = await fetch(XERO_PROXY + '/token', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ grant_type:'refresh_token', refresh_token:refreshToken, client_id:XERO_CLIENT_ID })
    });
  }
  if (!res.ok) throw new Error('Session expired — please reconnect Xero');
  const data = await res.json();
  return { accessToken:data.access_token, refreshToken:data.refresh_token||refreshToken, tokenExpiry:Date.now()+(data.expires_in||1800)*1000 };
};

const getXeroTenantId = async (accessToken) => {
  // Route through proxy to avoid CORS
  const res = await fetch(XERO_PROXY + '/xero-api/connections', {
    headers:{ Authorization:'Bearer '+accessToken }
  });
  if (!res.ok) {
    const txt = await res.text().catch(()=>'');
    throw new Error('Cannot reach Xero API (' + res.status + '). ' + (txt.slice(0,200)||'Check your connection.'));
  }
  const tenants = await res.json();
  if (!Array.isArray(tenants) || !tenants.length) throw new Error('No Xero organisations found — make sure you approved access during login');
  return tenants[0].tenantId;
};

// Paginate through ALL Xero invoices (100 per page)
const fetchXeroInvoices = async (accessToken, tenantId, onPageProgress) => {
  const all = [];
  let page = 1;
  while (true) {
    // pageSize=100 is the Xero default; some proxies strip it so we include it anyway
    const url = XERO_PROXY + '/xero-api/api.xro/2.0/Invoices?Type=ACCREC&Statuses=DRAFT,SUBMITTED,AUTHORISED,PAID,VOIDED&page=' + page + '&pageSize=100&summaryOnly=false';
    const res = await fetch(url, { headers:{ Authorization:'Bearer '+accessToken, 'Xero-tenant-id':tenantId } });
    if (!res.ok) {
      // On page 2+ a non-OK response means we hit the end or an error — stop gracefully
      if (page > 1) { console.warn('Xero page '+page+' returned '+res.status+', stopping pagination'); break; }
      const txt = await res.text().catch(()=>'');
      throw new Error('Invoice fetch failed (page '+page+', '+res.status+'): '+txt.slice(0,200));
    }
    const data = await res.json();
    const batch = data.Invoices || [];
    all.push(...batch);
    if (onPageProgress) onPageProgress('Fetching invoices... page '+page+' ('+all.length+' so far)');
    // Stop if: fewer than 100 returned, OR Xero pagination says we are on the last page
    const pagination = data.pagination || {};
    const hasMore = pagination.pageCount ? page < pagination.pageCount : batch.length >= 100;
    if (!hasMore) break;
    page++;
    if (page > 50) break; // safety cap: 5,000 invoices
  }
  return all;
};

// Detect OVERDUE from DueDate+AmountDue (Xero has no OVERDUE status)
const mapXeroStatus = xi => {
  const s = xi.Status;
  if (s === 'PAID') return 'paid';
  if (s === 'VOIDED') return 'void';
  if (s === 'DRAFT') return 'draft';
  if (s === 'SUBMITTED') return 'sent';
  if (s === 'AUTHORISED') {
    if (xi.DueDate && xi.AmountDue > 0) {
      const m = String(xi.DueDate).match(/Date\((\d+)/);
      if (m && parseInt(m[1]) < Date.now()) return 'overdue';
    }
    return 'sent';
  }
  return 'draft';
};

// Xero "/Date(ms+tz)/" -> "YYYY-MM-DD"
const xeroDateToStr = d => {
  if (!d) return '';
  const m = String(d).match(/Date\((\d+)/);
  return m ? new Date(parseInt(m[1])).toISOString().slice(0,10) : '';
};

// localStorage store for all Xero-imported invoices
const XERO_INVOICES_KEY = 'ss_rentals_xero_invoices';
const loadXeroImportedInvoices = () => { try { return JSON.parse(localStorage.getItem(XERO_INVOICES_KEY)||'[]'); } catch { return []; } };
const saveXeroImportedInvoices = invs => localStorage.setItem(XERO_INVOICES_KEY, JSON.stringify(invs));

// Return merged list: hardcoded INVOICES + all Xero-imported ones
const getInvoices = () => {
  const imported = loadXeroImportedInvoices();
  if (!imported.length) return [...INVOICES];
  const xMap = {};
  imported.forEach(i => { xMap[i.id] = i; });
  const merged = INVOICES.map(i => xMap[i.id] ? {...i, ...xMap[i.id]} : {...i});
  const seen = new Set(merged.map(i => i.id));
  imported.forEach(i => { if (!seen.has(i.id)) merged.push({...i}); });
  merged.sort((a,b) => b.id.localeCompare(a.id));
  return merged;
};

const syncXeroToApp = async (config, onProgress, onDone, onError) => {
  try {
    let { accessToken, refreshToken, tokenExpiry, tenantId } = config;
    onProgress('Connecting to Xero...', 10);
    if (Date.now() > tokenExpiry - 60000) {
      onProgress('Refreshing session...', 15);
      try {
        const refreshed = await refreshXeroToken(refreshToken);
        accessToken = refreshed.accessToken;
        refreshToken = refreshed.refreshToken;
        tokenExpiry = refreshed.tokenExpiry;
        saveXeroConfig({ ...config, accessToken, refreshToken, tokenExpiry });
      } catch(e) {
        onError('Session expired: ' + e.message + ' - click Disconnect and reconnect Xero.'); return;
      }
    }
    if (!tenantId) {
      onProgress('Finding Xero organisation...', 25);
      tenantId = await getXeroTenantId(accessToken);
      saveXeroConfig({ ...config, accessToken, refreshToken, tokenExpiry, tenantId });
    }
    onProgress('Fetching all invoices from Xero...', 35);
    const xeroInvs = await fetchXeroInvoices(accessToken, tenantId, msg => onProgress(msg, 50));
    onProgress('Importing ' + xeroInvs.length + ' invoices...', 82);
    // Build customer name lookup
    const custByName = {};
    CUSTOMERS.forEach(c => { custByName[c.company.toLowerCase().trim()] = c.id; });
    // Map every Xero invoice to app format
    const xeroImported = xeroInvs.map(xi => {
      const contactName = (xi.Contact && xi.Contact.Name) ? xi.Contact.Name : '';
      const custId = custByName[contactName.toLowerCase().trim()] || null;
      return {
        id: xi.InvoiceNumber || xi.InvoiceID,
        xero_id: xi.InvoiceID,
        customer: custId,
        customer_name: contactName,
        date: xeroDateToStr(xi.Date),
        due: xeroDateToStr(xi.DueDate),
        period: xi.Reference || '',
        total: xi.Total || 0,
        amount_due: xi.AmountDue || 0,
        amount_paid: xi.AmountPaid || 0,
        status: mapXeroStatus(xi),
        source: 'xero',
        truck_hire:0, trailer_hire:0, mileage:0, ruc:0, damage:0, extras:0,
      };
    });
    saveXeroImportedInvoices(xeroImported);
    // Also patch hardcoded INVOICES for immediate UI match
    const statusMap = {};
    xeroInvs.forEach(xi => { if (xi.InvoiceNumber) statusMap[xi.InvoiceNumber] = { status:mapXeroStatus(xi), xeroId:xi.InvoiceID }; });
    const updates = [];
    INVOICES.forEach(inv => {
      const match = statusMap[inv.id];
      if (match && (match.status !== inv.status || match.xeroId !== inv.xero_id)) {
        updates.push({ id:inv.id, oldStatus:inv.status, newStatus:match.status });
        inv.status = match.status; inv.xero_id = match.xeroId;
      }
    });
    onDone(new Date(), updates, xeroInvs.length, xeroImported.length);
  } catch(e) { onError(e.message||'Xero sync failed'); }
};

// ── Notification read-state ─────────────────────────────────────
const NAV_READ_KEY = 'ss_rentals_nav_read';
const loadReadState = () => { try { return JSON.parse(localStorage.getItem(NAV_READ_KEY)||'{}'); } catch { return {}; } };
const saveReadState = s => localStorage.setItem(NAV_READ_KEY, JSON.stringify(s));

// Mark a page as read — stores the current alert count + timestamp
const markPageRead = (pageId, count) => {
  const s = loadReadState();
  s[pageId] = { count, readAt: Date.now() };
  saveReadState(s);
};

// Returns raw alert counts (what actually needs attention)
const getRawAlerts = () => {
  const allV = [...TRUCKS,...TRAILERS];
  const effectiveH = getEffectiveHires();
  const invoices = getInvoices();
  // Fleet: COF/rego expiring within 30 days
  const fleet = allV.filter(v=>daysDiff(v.cof_expiry)<=30||daysDiff(v.rego_expiry)<=30).length;
  // Invoicing: ONLY overdue invoices (not drafts — those are expected)
  const invoicing = invoices.filter(i=>i.status==='overdue').length;
  // Maintenance: scheduled within 30 days
  const maintenance = MAINTENANCE.filter(m=>m.status==='scheduled'&&daysDiff(m.date)<=30).length;
  // Hires: active hires expiring within 7 days
  const hires = effectiveH.filter(h=>h.status==='active'&&daysDiff(h.end)<=7&&daysDiff(h.end)>=0).length;
  // Communications: ONLY genuinely overdue (same as invoicing overdue, not a duplicate count)
  // Show only if there are overdue invoices that haven't been actioned (30+ days overdue)
  const communications = invoices.filter(i=>i.status==='overdue'&&Math.abs(daysDiff(i.due))>14).length;
  return { fleet, invoicing, maintenance, hires, communications };
};

// Returns badges to show — suppresses badge if user has already seen this count
const getNavBadges = () => {
  const raw = getRawAlerts();
  const readState = loadReadState();
  const badges = {};
  Object.entries(raw).forEach(([page, count]) => {
    if (!count) return;
    const read = readState[page];
    // Show badge if: never read, OR count increased since last read
    if (!read || read.count < count) {
      badges[page] = count;
    }
  });
  return badges;
};

/* ─── CHART: REVENUE BAR ──────────────────────────── */
const RevenueChart = ({theme}) => {
  const ref = useRef(); const inst = useRef();
  useEffect(()=>{
    if(inst.current) inst.current.destroy();
    const isDark = theme==='dark';
    const grid = isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)';
    const tick = isDark?'#888':'#999';
    inst.current = new Chart(ref.current,{
      type:'bar',
      data:{
        labels:MONTHLY_REVENUE.map(r=>r.month),
        datasets:[
          {label:'Revenue',data:MONTHLY_REVENUE.map(r=>r.amount),backgroundColor:'rgba(217,43,43,0.8)',borderRadius:5,borderSkipped:false},
          {label:'Expenses',data:MONTHLY_REVENUE.map(r=>r.expenses),backgroundColor:'rgba(230,126,34,0.6)',borderRadius:5,borderSkipped:false},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:isDark?'#aaa':'#555',font:{size:11}}},tooltip:{callbacks:{label:c=>' '+fmtCur(c.parsed.y)}}},scales:{x:{grid:{color:grid},ticks:{color:tick}},y:{grid:{color:grid},ticks:{color:tick,callback:v=>'$'+v/1000+'k'}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

          <strong style={{color:'var(--text)'}}>Revenue Alert:</strong> May 2026 revenue is $64,345 (from Xero) — best month since October 2025. Net profit of $14,632 is the strongest 2026 result. INV-0268 ($6,363.87) from Chardikala Limited is overdue — call Gurpinder Singh: 027 510 0233. <br/>
          <strong style={{color:'var(--text)'}}>Compliance:</strong> All COF and Rego dates are current — no overdue items. Next due: SSRENT COF 19 Aug, MRU490 COF 13 Aug. Book renewals by mid-July. <br/>

const DashboardPnl = () => {
  const months = PNL_DETAIL.slice(-12);
  const [selMonth, setSelMonth] = React.useState(months[months.length-1].month);
  const d = months.find(m=>m.month===selMonth) || months[months.length-1];
  const fmtMonth = m => { const [y,mo] = m.split('-'); return new Date(+y,+mo-1,1).toLocaleDateString('en-NZ',{month:'short',year:'2-digit'}); };
  const isProfit = d.net >= 0;
  const expenseRows = [
    {label:'Insurance',value:d.insurance},{label:'Navman / RUC Purchase',value:d.navman_ruc},
    {label:'RUC Charges',value:d.ruc},{label:'Other Expenses',value:d.other},
    {label:'Repairs & Maintenance',value:d.repairs},{label:'Flexi Finance',value:d.flexi},
    {label:'Heartland Finance',value:d.heartland},{label:'Advertising',value:d.advertising},
    {label:'GST / Other Tax',value:d.gst},
  ].filter(r=>r.value>0);
  return (
    <div className="card mb-4" style={{padding:0,overflow:'hidden'}}>
      <div style={{padding:'16px 20px 0',borderBottom:'1px solid var(--border)'}}>
        <div className="card-header" style={{marginBottom:12}}>
          <span className="card-title">Monthly P&amp;L</span>
          <span className="badge badge-blue">Last {months.length} Months</span>
        </div>
        <div style={{display:'flex',gap:4,overflowX:'auto',flexWrap:'wrap'}}>
          {months.map(m=>{
            const active = m.month===selMonth;
            const profit = m.net>=0;
            return (
              <button key={m.month} onClick={()=>setSelMonth(m.month)} style={{
                padding:'6px 12px',borderRadius:'7px 7px 0 0',border:'none',cursor:'pointer',
                fontSize:12,fontWeight:active?700:500,whiteSpace:'nowrap',
                background:active?'var(--card)':'var(--bg3)',
                color:active?(profit?'#27AE60':'#FF6F00'):'var(--text2)',
                borderBottom:active?'2px solid '+(profit?'#27AE60':'#FF6F00'):'2px solid transparent',
              }}>
                {fmtMonth(m.month)}
                <span style={{display:'block',fontSize:10,fontWeight:600,color:profit?'#27AE60':'#FF6F00'}}>{profit?'+':''}{fmtCur(m.net)}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{padding:20}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--text)',margin:0}}>
            {new Date(selMonth+'-01').toLocaleDateString('en-NZ',{month:'long',year:'numeric'})}
          </h3>
          <span className={`badge ${isProfit?'badge-green':'badge-orange'}`}>
            {isProfit?'Profit':'Loss'}: {fmtCur(Math.abs(d.net))}
          </span>
        </div>
        <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
          <div style={{background:'rgba(39,174,96,0.07)',border:'1px solid rgba(39,174,96,0.2)',borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#27AE60',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Total Revenue</div>
            <div style={{fontSize:24,fontWeight:800,color:'var(--text)'}}>{fmtCur(d.revenue)}</div>
          </div>
          <div style={{background:'rgba(255,111,0,0.07)',border:'1px solid rgba(255,111,0,0.2)',borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#FF6F00',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Total Expenses</div>
            <div style={{fontSize:24,fontWeight:800,color:'var(--text)'}}>{fmtCur(d.expenses)}</div>
          </div>
          <div style={{background:isProfit?'rgba(39,174,96,0.07)':'rgba(255,111,0,0.07)',border:`1px solid ${isProfit?'rgba(39,174,96,0.2)':'rgba(255,111,0,0.2)'}`,borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:11,fontWeight:700,color:isProfit?'#27AE60':'#FF6F00',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Net {isProfit?'Profit':'Loss'}</div>
            <div style={{fontSize:24,fontWeight:800,color:isProfit?'#27AE60':'#FF6F00'}}>{isProfit?'':'-'}{fmtCur(Math.abs(d.net))}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>Margin: {d.revenue>0?Math.round((d.net/d.revenue)*100):0}%</div>
          </div>
        </div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:10}}>Expense Breakdown</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'2px 24px'}}>
          {expenseRows.map(r=>(
            <div key={r.label} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:13,color:'var(--text2)'}}>{r.label}</span>
              <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{fmtCur(r.value)}</span>
            </div>
          ))}
        </div>
        {d.revenue>0&&(
          <div style={{marginTop:16}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text2)',marginBottom:4}}>
              <span>Expenses as % of Revenue</span><span>{Math.round((d.expenses/d.revenue)*100)}%</span>
            </div>
            <div className="progress">
              <div className="progress-bar" style={{width:`${Math.min(100,Math.round((d.expenses/d.revenue)*100))}%`,background:d.expenses/d.revenue>1?'#FF6F00':d.expenses/d.revenue>0.85?'#F39C12':'#27AE60'}}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};


const FleetPage = ({theme}) => {
  const [tab,setTab]=useState('trucks');
  const [sel,setSel]=useState(null);
  const [search,setSearch]=useState('');
  const effectiveHires = getEffectiveHires().filter(h=>h.status==='active');
  const getVehicleStatus = (v) => {
    const onHire = effectiveHires.some(h=>h.truck===v.id||h.trailer===v.id);
    return onHire ? 'on_hire' : v.status==='on_hire' ? 'available' : v.status;
  };
  const vehicles = tab==='trucks' ? TRUCKS : TRAILERS;
  const filtered = vehicles.filter(v=>
    v.rego.toLowerCase().includes(search.toLowerCase())||
    v.make.toLowerCase().includes(search.toLowerCase())||
    v.model.toLowerCase().includes(search.toLowerCase())
  );

  const VehicleModal = ({v,onClose}) => {
    const [vtab,setVtab]=useState('overview');
    if(!v) return null;
    const cof=complianceStatus(v.cof_expiry);
    const rego=complianceStatus(v.rego_expiry);
    const svc=v.service_due_km?complianceStatus(v.next_service):'green';
    const hirer = CUSTOMERS.find(c=>c.id===v.hirer);
    return (
      <Modal open onClose={onClose} title={`${v.rego} — ${v.make} ${v.model} ${v.year}`} size="modal-lg"
        footer={<><button className="btn btn-ghost" onClick={onClose}>Close</button><button className="btn btn-primary"><Icon name="edit" size={14}/> Edit Vehicle</button></>}>
        <div className="tabs">
          {['overview','compliance','financials','maintenance'].map(t=>(
            <button key={t} className={`tab ${vtab===t?'active':''}`} onClick={()=>setVtab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>
          ))}
        </div>
        {vtab==='overview'&&(
          <div>
            <div className="grid" style={{gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
              {[
                ['Status',<span className={statusBadge(v.status)}>{statusLabel(v.status)}</span>],
                ['Type',v.type],['Odometer',`${v.odometer.toLocaleString()} km`],['Vehicle Value',fmtCur(v.value)],
                ['Current Hirer',hirer?hirer.company:'—'],['Location',v.location],
                ['Weekly KM',`${v.weekly_km.toLocaleString()} km`],['RUC Balance',`${v.ruc_balance.toLocaleString()} km`],
                ['Hire Start',v.hire_start?fmt(v.hire_start):'—'],['Weekly Rate',v.weekly_rate?fmtCur(v.weekly_rate)+'/wk':'—'],
              ].map(([l,val])=>(
                <div key={l} style={{padding:'10px 14px',background:'var(--bg3)',borderRadius:8}}>
                  <div style={{fontSize:11,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',marginBottom:4}}>{l}</div>
                  <div style={{fontSize:14,fontWeight:600}}>{val}</div>
                </div>
              ))}
            </div>
            {v.weekly_km>0&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',marginBottom:8}}>Weekly KM Progress vs Target (3,000km)</div>
                <div className="progress"><div className="progress-bar" style={{width:`${Math.min(100,(v.weekly_km/3000)*100)}%`,background:'var(--red)'}}/></div>
                <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>{v.weekly_km.toLocaleString()} / 3,000 km ({Math.round((v.weekly_km/3000)*100)}%)</div>
              </div>
            )}
          </div>
        )}
        {vtab==='compliance'&&(
          <div>
            {[
              {label:'Certificate of Fitness (COF)',date:v.cof_expiry,status:cof},
              {label:'Vehicle Registration',date:v.rego_expiry,status:rego},
              {label:'Next Service Due',date:v.next_service,status:svc},
              {label:'Insurance Expiry',date:v.insurance_expiry,status:complianceStatus(v.insurance_expiry)},
            ].map(r=>(
              <div key={r.label} className="compliance-row">
                <span className={`dot dot-${r.status}`}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{r.label}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>{fmt(r.date)} ({daysDiff(r.date)<0?`${Math.abs(daysDiff(r.date))} days overdue`:daysDiff(r.date)===0?'Today':`${daysDiff(r.date)} days`})</div>
                </div>
                <span className={`badge badge-${r.status}`}>{r.status==='red'?'OVERDUE':r.status==='orange'?'DUE SOON':'COMPLIANT'}</span>
              </div>
            ))}
          </div>
        )}
        {vtab==='financials'&&(
          <div>
            <div className="grid grid-3 mb-4">
              {[['Revenue YTD',fmtCur(v.rev_ytd||0)],['Maint Cost YTD',fmtCur(v.maint_ytd||0)],['Profit YTD',fmtCur((v.rev_ytd||0)-(v.maint_ytd||0))]].map(([l,val])=>(
                <div key={l} style={{padding:'14px',background:'var(--bg3)',borderRadius:8,textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',marginBottom:6}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800}}>{val}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:12,color:'var(--text2)'}}>Downtime: <strong style={{color:'var(--text)'}}>{v.downtime||0} days YTD</strong> &nbsp;·&nbsp; Utilisation: <strong style={{color:'var(--text)'}}>{v.status==='on_hire'?'Active':'Inactive'}</strong></div>
          </div>
        )}
        {vtab==='maintenance'&&(
          <div>
            {MAINTENANCE.filter(m=>m.vehicle===v.id).length===0&&<p style={{color:'var(--text2)',fontSize:13}}>No maintenance records for this vehicle.</p>}
            {MAINTENANCE.filter(m=>m.vehicle===v.id).map(m=>(
              <div key={m.id} style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontWeight:700,fontSize:13}}>{m.type}</span>
                  <span className={statusBadge(m.status)}>{statusLabel(m.status)}</span>
                </div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:4}}>{m.description}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{fmt(m.date)} · {m.workshop} {m.cost?`· ${fmtCur(m.cost)}`:''}</div>
              </div>
            ))}
          </div>
        )}
      </Modal>
    );
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div className="tabs" style={{marginBottom:0}}>
          <button className={`tab ${tab==='trucks'?'active':''}`} onClick={()=>setTab('trucks')}>Trucks ({TRUCKS.length})</button>
          <button className={`tab ${tab==='trailers'?'active':''}`} onClick={()=>setTab('trailers')}>Trailers ({TRAILERS.length})</button>
        </div>
        <div className="flex gap-2">
          <input style={{width:200}} placeholder="Search fleet…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <button className="btn btn-primary"><Icon name="plus" size={14}/> Add Vehicle</button>
        </div>
      </div>

      {/* Compliance summary */}
      <div className="grid grid-4 mb-4">
        {[
          {label:'On Hire',count:vehicles.filter(v=>getVehicleStatus(v)==='on_hire').length,color:'var(--blue)'},
          {label:'Available',count:vehicles.filter(v=>getVehicleStatus(v)==='available').length,color:'var(--green)'},
          {label:'Maintenance',count:vehicles.filter(v=>getVehicleStatus(v)==='maintenance').length,color:'var(--orange)'},
          {label:'COF Alerts',count:vehicles.filter(v=>complianceStatus(v.cof_expiry)!=='green').length,color:'var(--red)'},
        ].map(s=>(
          <div key={s.label} className="card card-sm flex items-center gap-3">
            <div style={{width:40,height:40,borderRadius:10,background:s.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800,color:s.color}}>{s.count}</div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div className="table-wrap">
        <table>
          <thead><tr><th>Rego</th><th>Make / Model</th><th>Year</th><th>Status</th><th>Odometer</th><th>COF Expiry</th><th>Rego Expiry</th><th>Current Hirer</th><th>Weekly Rate</th><th></th></tr></thead>
          <tbody>
            {filtered.map(v=>{
              const cof=complianceStatus(v.cof_expiry);
              const reg=complianceStatus(v.rego_expiry);
              return (
                <tr key={v.id} className="tr-link" onClick={()=>setSel(v)}>
                  <td style={{fontWeight:700}}>{v.rego}</td>
                  <td>{v.make} {v.model}</td>
                  <td>{v.year}</td>
                  <td><span className={statusBadge(getVehicleStatus(v))}>{statusLabel(getVehicleStatus(v))}</span></td>
                  <td>{v.odometer?(v.odometer.toLocaleString()+' km'):'—'}</td>
                  <td><span style={{color:cof==='red'?'var(--red-light)':cof==='orange'?'var(--orange)':'var(--green)',fontWeight:600,fontSize:12}}>{fmt(v.cof_expiry)}</span></td>

const CUST_OVERRIDES_KEY = 'ss_rentals_cust_overrides';
const loadCustOverrides = () => { try { return JSON.parse(localStorage.getItem(CUST_OVERRIDES_KEY)||'{}'); } catch { return {}; } };
const saveCustOverride = (id, data) => {
  const all = loadCustOverrides();
  all[id] = {...(all[id]||{}), ...data};
  localStorage.setItem(CUST_OVERRIDES_KEY, JSON.stringify(all));
};
const CUST_NEW_KEY = 'ss_rentals_cust_new';
const loadNewCustomers = () => { try { return JSON.parse(localStorage.getItem(CUST_NEW_KEY)||'[]'); } catch { return []; } };
const saveNewCustomers = list => localStorage.setItem(CUST_NEW_KEY, JSON.stringify(list));
const getAllCustomers = () => {
  const overrides = loadCustOverrides();
  const base = CUSTOMERS.map(c => overrides[c.id] ? {...c,...overrides[c.id]} : {...c});
  const newCusts = loadNewCustomers();
  return [...base, ...newCusts];
};
const createNewCustomer = (data) => {
  const id = 'C' + String(Date.now()).slice(-6);
  const cust = {
    id, status:'active', credit_rating:'B+', outstanding:0, ytd_revenue:0,
    weekly_truck:0, weekly_trailer:0, payment_terms:'Weekly',
    joined: new Date().toISOString().slice(0,10),
    notes:'', nzbn:'', truck:'', trailer:'',
    ...data
  };
  const list = loadNewCustomers();
  list.push(cust);
  saveNewCustomers(list);
  return cust;
};

                          {tpl.chargeType==='weekly'?'Weekly':'Monthly'} · {tpl.type==='truck_only'?'Truck Only':tpl.type==='trailer_only'?'Trailer Only':'Truck & Trailer'}

                            onClick={()=>{if(window.confirm('Delete this quote?'))deleteQuote(q.id);}}>✕</button>

                        <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>{q.form.vehicleType==='truck_only'?'🚛 Truck Only':q.form.vehicleType==='trailer_only'?'🔗 Trailer Only':'🚛 Truck & Trailer'}</div>

          {/* Step 2 — Quote builder (full form) */}

                <button className="btn btn-ghost btn-sm" onClick={()=>setQuoteStep(0)}>← Templates</button>
                <span style={{color:'var(--text3)'}}>/</span>

                        <label className="form-label">Valid For (days)</label>
                        <input className="form-control" type="number" value={quoteForm.validDays} onChange={e=>setQF('validDays',e.target.value)}/>
                      </div>
                    </div>
                  </div>

                  {/* Customer */}
                  <div className="card" style={{padding:'14px 16px'}}>
                    <div style={{fontWeight:700,fontSize:11,marginBottom:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Customer / Hirer</div>

                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      <div className="form-group" style={{marginBottom:0}}>

                        <input className="form-control" value={quoteForm.companyName} onChange={e=>setQF('companyName',e.target.value)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">Contact Person</label>
                        <input className="form-control" value={quoteForm.contactName} onChange={e=>setQF('contactName',e.target.value)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">Phone</label>
                        <input className="form-control" value={quoteForm.contactPhone} onChange={e=>setQF('contactPhone',e.target.value)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">Email</label>
                        <input className="form-control" type="email" value={quoteForm.contactEmail} onChange={e=>setQF('contactEmail',e.target.value)}/>
                      </div>
                    </div>
                  </div>

                  {/* Hire details */}
                  <div className="card" style={{padding:'14px 16px'}}>

                      </div>
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">Unit</label>
                        <select className="form-control" value={quoteForm.hireDurationUnit} onChange={e=>setQF('hireDurationUnit',e.target.value)}>

                          <option value="months">Months</option>
                          <option value="years">Years</option>

                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">Start Date</label>
                        <input className="form-control" type="date" value={quoteForm.startDate} onChange={e=>setQF('startDate',e.target.value)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">End Date</label>
                        <input className="form-control" type="date" value={quoteForm.endDate} onChange={e=>setQF('endDate',e.target.value)}/>
                      </div>
                    </div>
                  </div>
                </div>

                {/* RIGHT COLUMN */}
                <div style={{display:'flex',flexDirection:'column',gap:14}}>

                  {/* Vehicle details */}
                  <div className="card" style={{padding:'14px 16px'}}>
                    <div style={{fontWeight:700,fontSize:11,marginBottom:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Vehicle Description</div>
                    {(quoteForm.vehicleType==='truck_only'||quoteForm.vehicleType==='truck_trailer')&&(
                      <div className="form-group" style={{marginBottom:10}}>
                        <label className="form-label">Truck</label>
                        <select className="form-control" value={quoteForm.truckDesc} onChange={e=>setQF('truckDesc',e.target.value)}>
                          <option value="">— Select truck or type below —</option>
                          {TRUCKS.map(t=><option key={t.id} value={`${t.year} ${t.make} ${t.model}`}>{t.rego} — {t.year} {t.make} {t.model}</option>)}
                          <option value="2019 Volvo 8x4 Curtainside Truck">2019 Volvo 8x4 Curtainside Truck</option>
                          <option value="2022 Volvo 8x4 Sleeper-Cab Tractor Unit">2022 Volvo 8x4 Sleeper-Cab Tractor Unit</option>
                          <option value="2018 Hino 8x4 Curtainside Truck with Tail Lift">2018 Hino 8x4 Curtainside Truck with Tail Lift</option>
                        </select>
                        <input className="form-control" style={{marginTop:6}} placeholder="Or type custom description…" value={quoteForm.truckDesc} onChange={e=>setQF('truckDesc',e.target.value)}/>
                      </div>
                    )}
                    {(quoteForm.vehicleType==='trailer_only'||quoteForm.vehicleType==='truck_trailer')&&(
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">Trailer</label>
                        <select className="form-control" value={quoteForm.trailerDesc} onChange={e=>setQF('trailerDesc',e.target.value)}>
                          <option value="">— Select trailer or type below —</option>
                          {TRAILERS.map(t=><option key={t.id} value={`${t.year} ${t.make} ${t.model}`}>{t.rego} — {t.year||''} {t.make} {t.model}</option>)}

                          <option value="2022 22-Pallet TMC 5-Axle Curtainside Pull Trailer">2022 22-Pallet TMC 5-Axle Curtainside Pull Trailer</option>
                          <option value="2011 Fruehauf 4-Axle Curtainside Pull Trailer">2011 Fruehauf 4-Axle Curtainside Pull Trailer</option>
                          <option value="2026 Patchell Quad-Axle Swinglift Trailer">2026 Patchell Quad-Axle Swinglift Trailer</option>
                        </select>
                        <input className="form-control" style={{marginTop:6}} placeholder="Or type custom description…" value={quoteForm.trailerDesc} onChange={e=>setQF('trailerDesc',e.target.value)}/>
                      </div>
                    )}
                  </div>

                  {/* Charges */}
                  <div className="card" style={{padding:'14px 16px'}}>
                    <div style={{fontWeight:700,fontSize:11,marginBottom:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Hire Charges</div>
                    <div className="form-group" style={{marginBottom:10}}>
                      <label className="form-label">Primary Charge Type</label>
                      <select className="form-control" value={quoteForm.chargeType} onChange={e=>setQF('chargeType',e.target.value)}>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                      </select>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      {(quoteForm.chargeType==='daily'||true)&&(
                        <div className="form-group" style={{marginBottom:0,opacity:quoteForm.chargeType==='daily'?1:.55}}>
                          <label className="form-label">Daily Rate (NZD)</label>
                          <input className="form-control" type="number" step="0.01" value={quoteForm.dailyRate} onChange={e=>setQF('dailyRate',parseFloat(e.target.value)||0)}/>
                        </div>
                      )}
                      <div className="form-group" style={{marginBottom:0,opacity:quoteForm.chargeType==='weekly'?1:.55}}>
                        <label className="form-label">Weekly Rate (NZD)</label>
                        <input className="form-control" type="number" step="0.01" value={quoteForm.weeklyRate} onChange={e=>setQF('weeklyRate',parseFloat(e.target.value)||0)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0,opacity:quoteForm.chargeType==='monthly'?1:.55}}>
                        <label className="form-label">Monthly Rate (NZD)</label>
                        <input className="form-control" type="number" step="0.01" value={quoteForm.monthlyRate} onChange={e=>setQF('monthlyRate',parseFloat(e.target.value)||0)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">RUC Rate (¢/km)</label>
                        <input className="form-control" type="number" step="0.01" value={quoteForm.rucRate} onChange={e=>setQF('rucRate',parseFloat(e.target.value)||0)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0}}>
                        <label className="form-label">Mileage Rate (¢/km)</label>
                        <input className="form-control" type="number" step="0.01" value={quoteForm.mileageRate} onChange={e=>setQF('mileageRate',parseFloat(e.target.value)||0)}/>
                      </div>
                      <div className="form-group" style={{marginBottom:0,gridColumn:'span 2'}}>
                        <label className="form-label">Maximum Mileage Allowance</label>
                        <input className="form-control" placeholder="e.g. 130,000 km p.a. (10,833 km/month)" value={quoteForm.maxMileage} onChange={e=>setQF('maxMileage',e.target.value)}/>
                      </div>
                    </div>
                  </div>

                  {/* Notes */}
                  <div className="card" style={{padding:'14px 16px'}}>
                    <div style={{fontWeight:700,fontSize:11,marginBottom:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Notes & Conditions</div>
                    <textarea className="form-control" rows={6} value={quoteForm.notes} onChange={e=>setQF('notes',e.target.value)} style={{resize:'vertical',fontSize:12,fontFamily:'inherit'}}/>
                  </div>
                </div>
              </div>

              {/* Quote preview summary */}
              <div className="card" style={{padding:'14px 16px',marginTop:14,background:'rgba(106,27,154,0.04)',border:'1.5px solid rgba(106,27,154,0.15)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div style={{fontWeight:700,fontSize:13,color:'#6A1B9A'}}>📄 Quote Summary — {quoteForm.quoteNumber}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>Valid {quoteForm.validDays} days from issue</div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:12}}>
                  {[
                    ['Customer',quoteForm.companyName||'—'],
                    ['Contact',quoteForm.contactName||'—'],
                    ['Type',quoteForm.vehicleType==='truck_only'?'Truck Only':quoteForm.vehicleType==='trailer_only'?'Trailer Only':'Truck & Trailer'],
                    ['Duration',quoteForm.hireDuration?`${quoteForm.hireDuration} ${quoteForm.hireDurationUnit}`:'—'],
                  ].map(([l,v])=>(
                    <div key={l} style={{background:'var(--card)',borderRadius:7,padding:'8px 10px',border:'1px solid var(--border)'}}>
                      <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>{l}</div>
                      <div style={{fontWeight:700,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:10}}>
                  <button className="btn btn-primary" onClick={downloadQuotePDF} style={{justifyContent:'center',flex:1}}>
                    <Icon name="download" size={14}/> Download Quote PDF
                  </button>
                  <button className="btn btn-ghost" onClick={saveQuote} style={{justifyContent:'center',flex:1,borderColor:'#27AE60',color:'#27AE60'}}>
                    💾 Save Quote
                  </button>
                  <button className="btn btn-ghost" onClick={()=>{setQuoteForm(emptyQuote(selectedTemplate));}} style={{justifyContent:'center'}}>
                    🔄 Reset
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

/* ─── INVOICING PAGE ──────────────────────────────── */

// Dedup merge: only add txns whose id not already in store
const mergeTxns = (existing, incoming) => {
  const existingIds = new Set(existing.map(t=>t.id));
  const newOnly = incoming.filter(t=>!existingIds.has(t.id));
  return { merged: [...existing, ...newOnly].sort((a,b)=>b.date.localeCompare(a.date)), added: newOnly.length, duplicates: incoming.length - newOnly.length };
};

// ASB CSV parser — format: Date,Unique Id,Tran Type,Cheque Number,Payee,Memo,Amount
const parseASBCsv = (text) => {
  const lines = text.split('\n');
  const txns = [];
  let headerIdx = -1;
  for (let i=0; i<Math.min(12,lines.length); i++) {
    if (lines[i].startsWith('Date,') || lines[i].includes('Date,Unique Id')) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return [];
  for (let i=headerIdx+1; i<lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(',');
    if (cols.length < 7) continue;
    const dateStr = (cols[0]||'').replace(/"/g,'').trim();
    const uniqueId = (cols[1]||'').replace(/"/g,'').trim();
    const payee = (cols[4]||'').replace(/"/g,'').trim();
    const memo = (cols[5]||'').replace(/"/g,'').trim();
    const amtStr = (cols[6]||'').replace(/"/g,'').trim();
    const amount = parseFloat(amtStr);
    if (!dateStr || isNaN(amount) || amount === 0) continue;
    const date = dateStr.replace(/\//g, '-');
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
    txns.push({ id: uniqueId||date+'_'+i, date, payee, memo, amount, type:amount>0?'credit':'debit', category:categoriseTxn(payee,memo,amount), source:'csv', importedAt:new Date().toISOString() });
  }
  return txns;
};

  income:       { label:'Hire Income',          color:'var(--green)',    keywords:['gocardless','d/c from','truck rent','hire','inv','rental','chardikala','empire trucking','pangly','team freight','ss dhillon','reet invest','convoy','baaz','jatana','kahlon','satpal','shah transport','vertex haulage','dhillon','dhadda','s & z','s&z','s&s','pb48','cambridge diese','gsr transport','samra','sukh'] },

  insurance:    { label:'Insurance',             color:'var(--blue)',     keywords:['premium fund','insurance','vero','amic','nzi','zurich','tower'] },
  flexi:        { label:'Flexi Loan',            color:'#8E44AD',        keywords:['flexigroup','flexicommercial','flexicommerc','flexirent'] },
  heartland:    { label:'Heartland Loan',        color:'#9B59B6',        keywords:['heartland bank','heartland'] },
  navman:       { label:'Navman/GPS',            color:'#2980B9',        keywords:['navman wireless','teletracnavman','teletrac','navman'] },
  maintenance:  { label:'Repairs & Maintenance', color:'var(--red)',      keywords:['ss rentals','inv 3','inv 21','kiwiplates','vtnz','workshop','mechanic','parts'] },
  fuel:         { label:'Fuel',                  color:'#E67E22',        keywords:['bp ','z energy','gull','mobil fuel','diesel'] },

  software:     { label:'Software & Subscriptions', color:'#7F8C8D',    keywords:['xero nz','openai','chatgpt','godaddy','claude.ai','khalsa hosting','smartpay','paymark','spark','offshoremargin'] },
  other_expense:{ label:'Other Expense',         color:'var(--text3)',   keywords:[] },
};

const categoriseTxn = (payee, memo, amount) => {
  const text = (payee+' '+memo).toLowerCase();
  if (amount > 0) {
    for (const kw of CATEGORIES.income.keywords) { if (text.includes(kw)) return 'income'; }
    return 'income_other';
  }
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    if (key==='income'||key==='other_expense'||key==='income_other') continue;
    for (const kw of cat.keywords) { if (text.includes(kw)) return key; }
  }
  return 'other_expense';
};

const buildPnlFromTxns = (txns) => {
  const monthly = {};
  txns.forEach(t => {
    const mo = t.date.slice(0,7);
    if (!monthly[mo]) monthly[mo] = {month:mo,revenue:0,insurance:0,navman_ruc:0,ruc:0,other:0,repairs:0,flexi:0,heartland:0,fuel:0,advertising:0,gst:0,software:0,expenses:0,net:0,txnCount:0};
    const m = monthly[mo]; m.txnCount++;
    const amt = Math.abs(t.amount);
    if (t.amount>0) { m.revenue+=t.amount; }
    else {
      switch(t.category) {
        case 'insurance': m.insurance+=amt; break; case 'ruc': m.ruc+=amt; break;
        case 'navman': m.navman_ruc+=amt; break; case 'maintenance': m.repairs+=amt; break;
        case 'flexi': m.flexi+=amt; break; case 'heartland': m.heartland+=amt; break;
        case 'fuel': m.fuel+=amt; break; case 'advertising': m.advertising+=amt; break;
        case 'gst_tax': m.gst+=amt; break; case 'software': m.software+=amt; break;
        default: m.other+=amt;
      }
    }
  });
  Object.values(monthly).forEach(m=>{
    m.expenses=m.insurance+m.navman_ruc+m.ruc+m.other+m.repairs+m.flexi+m.heartland+m.fuel+m.advertising+m.gst+m.software;
    m.net=m.revenue-m.expenses;
  });
  return Object.values(monthly).sort((a,b)=>a.month.localeCompare(b.month));
};

  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent('Bank Transactions')}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values:rows})});
};

// Sheets: pull bank txns from Google Sheets (two-way)
const pullBankTxnsFromSheet = async (accessToken, spreadsheetId) => {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent('Bank Transactions')}`,{headers:{Authorization:'Bearer '+accessToken}});
  if (!res.ok) return [];
  const data = await res.json();
  const rows = data.values||[];
  if (rows.length<2) return [];
  // headers: Date,ID,Payee,Memo,Amount,Type,Category,Source,Imported At
  return rows.slice(1).map(r=>({
    date:r[0]||'', id:r[1]||r[0]+'_sheet', payee:r[2]||'', memo:r[3]||'',
    amount:parseFloat(r[4])||0, type:r[5]||'', category:categoriseTxn(r[2]||'',r[3]||'',parseFloat(r[4])||0),
    source:'sheets', importedAt:r[8]||new Date().toISOString()
  })).filter(t=>t.date&&t.amount!==0);
};
