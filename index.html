*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --bg:#0F0F0F;--bg2:#1A1A1A;--bg3:#242424;--bg4:#2E2E2E;
  --card:#1C1C1E;--card2:#262626;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#F0F0F0;--text2:#A8A8A8;--text3:#6B6B6B;
  --sidebar:#0A0A0A;--sidebar-text:#C8C8C8;--sidebar-active:rgba(217,43,43,0.15);
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}
body.light{
  --bg:#F2F2F7;--bg2:#FFFFFF;--bg3:#E8E8ED;--bg4:#D8D8DC;
  --card:#FFFFFF;--card2:#F5F5F5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1A1A;--text2:#555;--text3:#999;
  --sidebar:#1A1A1A;--sidebar-text:#C8C8C8;--sidebar-active:rgba(217,43,43,0.2);
  --shadow:0 2px 12px rgba(0,0,0,0.1);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#root{height:100%}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.06);overflow-y:auto;overflow-x:hidden}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.logo-text{color:#fff;font-weight:700;font-size:15px;line-height:1.2}
.logo-sub{color:var(--text3);font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.sidebar-section{padding:8px 10px 4px;margin-top:8px}
.sidebar-section-label{color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--sidebar-text);font-size:13.5px;font-weight:500;transition:all .15s;margin-bottom:1px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.nav-item.active{background:var(--sidebar-active);color:var(--red-light);border:1px solid rgba(217,43,43,0.25)}
.nav-item .nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.8}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.06)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header-title{font-size:17px;font-weight:700;flex:1}
.header-sub{font-size:12px;color:var(--text2);font-weight:400}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-light)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.icon-btn{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-sub{font-size:12px;color:var(--text2)}
/* GRID */
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
/* KPI CARDS */
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--red))}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.kpi-sub{font-size:12px;color:var(--text2);margin-top:6px}
.kpi-trend{font-size:11px;font-weight:600;margin-top:4px}
.kpi-trend.up{color:var(--green)}
.kpi-trend.down{color:var(--red-light)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge-green{background:rgba(39,174,96,.15);color:#4ade80;border:1px solid rgba(39,174,96,.3)}
.badge-red{background:rgba(217,43,43,.15);color:#ff6b6b;border:1px solid rgba(217,43,43,.3)}
.badge-orange{background:rgba(230,126,34,.15);color:#ffa756;border:1px solid rgba(230,126,34,.3)}
.badge-blue{background:rgba(41,128,185,.15);color:#5dade2;border:1px solid rgba(41,128,185,.3)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
/* TABLES */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 14px;border-top:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.tr-link{cursor:pointer}
/* ALERTS */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:9px;border-left:3px solid;margin-bottom:8px;font-size:13px}
.alert-red{background:rgba(217,43,43,.1);border-color:var(--red);color:#ff8585}
.alert-orange{background:rgba(230,126,34,.1);border-color:var(--orange);color:#ffc785}
.alert-green{background:rgba(39,174,96,.1);border-color:var(--green);color:#6fcf97}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;width:90%;max-width:760px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal-lg{max-width:920px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}

.modal-body{overflow-y:auto;padding:24px;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

.tabs{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:9px;margin-bottom:20px}

.tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}

.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border .15s}

textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-orange{background:var(--orange)}
.dot-gray{background:var(--text3)}
/* MISC */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.text-right{text-align:right}.text-center{text-align:center}
.fw-700{font-weight:700}.fw-600{font-weight:600}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.text-red{color:var(--red-light)}.text-green{color:#4ade80}.text-orange{color:#ffa756}.text-muted{color:var(--text2)}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.w-full{width:100%}
.divider{height:1px;background:var(--border);margin:16px 0}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
/* CHART CONTAINER */
.chart-wrap{position:relative;height:220px}
.chart-wrap-sm{height:160px}
/* PROGRESS BAR */
.progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;transition:width .3s}
/* COMPLIANCE METER */
.compliance-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.compliance-row:last-child{border-bottom:none}
/* NOTIFICATION */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:4px;right:4px}
/* AVATAR */
.avatar{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}
/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:60px}.logo-text,.sidebar-section-label,.nav-item span,.sidebar-footer{display:none}
  .nav-item{justify-content:center;padding:10px}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}
}
</style>

const syncSheetTab = async (accessToken, spreadsheetId, sheetName, rows) => {
  // Clear then write
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}:clear`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
  });
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?valueInputOption=RAW`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: rows }),
  });
  if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || 'Sheets write failed'); }
};

const ensureSheets = async (accessToken, spreadsheetId, neededSheets) => {
  const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties.title`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await meta.json();
  const existing = (data.sheets || []).map(s => s.properties.title);
  const toAdd = neededSheets.filter(n => !existing.includes(n));
  if (toAdd.length === 0) return;
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: toAdd.map(t => ({ addSheet: { properties: { title: t } } })) }),
  });
};

// Read a sheet tab back from Google Sheets
const readSheetTab = async (accessToken, spreadsheetId, sheetName) => {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!res.ok) return null;
  const data = await res.json();
  return data.values || [];
};

// Pull hire changes from Google Sheets back into app data
const pullHiresFromSheet = (rows) => {
  if (!rows || rows.length < 2) return 0;
  const headers = rows[0];
  const idIdx = headers.indexOf('Hire ID');
  const endIdx = headers.indexOf('End');
  const statusIdx = headers.indexOf('Status');
  const weeklyIdx = headers.indexOf('Weekly Rate');
  const notesIdx = headers.indexOf('Notes');
  if (idIdx === -1) return 0;
  let updated = 0;
  rows.slice(1).forEach(row => {
    const id = row[idIdx];
    const hire = HIRES.find(h => h.id === id);
    if (!hire) return;
    if (endIdx !== -1 && row[endIdx] && row[endIdx] !== hire.end) { hire.end = row[endIdx]; updated++; }
    if (statusIdx !== -1 && row[statusIdx] && row[statusIdx] !== hire.status) { hire.status = row[statusIdx]; updated++; }
    if (weeklyIdx !== -1 && row[weeklyIdx]) {
      const rate = parseFloat(row[weeklyIdx]);
      if (!isNaN(rate) && rate !== hire.weekly_truck + hire.weekly_trailer) { hire.weekly_truck = rate; updated++; }
    }
    if (notesIdx !== -1 && row[notesIdx] !== undefined) hire.notes = row[notesIdx];
  });
  return updated;
};

// Pull customer changes from Google Sheets
const pullCustomersFromSheet = (rows) => {
  if (!rows || rows.length < 2) return 0;
  const headers = rows[0];
  const idIdx = headers.indexOf('ID');
  const outIdx = headers.indexOf('Outstanding');
  const notesIdx = headers.indexOf('Notes');
  const statusIdx = headers.indexOf('Status');
  if (idIdx === -1) return 0;
  let updated = 0;
  rows.slice(1).forEach(row => {
    const id = row[idIdx];
    const cust = CUSTOMERS.find(c => c.id === id);
    if (!cust) return;
    if (outIdx !== -1 && row[outIdx] !== undefined) { const v = parseFloat(row[outIdx]); if (!isNaN(v)) cust.outstanding = v; }
    if (notesIdx !== -1 && row[notesIdx] !== undefined) cust.notes = row[notesIdx];
    if (statusIdx !== -1 && row[statusIdx]) cust.status = row[statusIdx];
    updated++;
  });
  return updated;
};

// Parse NZ date formats like "27/04/26", "27/4/2026"
const parseNZDate = (str) => {
  if (!str) return null;
  str = str.trim();
  // Try dd/mm/yy or dd/mm/yyyy
  const m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (!m) return null;
  let [,d,mo,y] = m;
  if (y.length===2) y = '20'+y;
  return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
};

// Parse hire period string like "27/04/26 till 27/10/26" or "25/5/26 to 31/5/26"
const parseHirePeriod = (str) => {
  if (!str) return null;
  str = str.trim();
  // Split on "till", "to", "-", "–"
  const parts = str.split(/\s+(?:till|to|–|-)\s+/i);
  if (parts.length === 2) {
    const start = parseNZDate(parts[0].trim());
    const end = parseNZDate(parts[1].trim());
    if (start && end) return { start, end };
  }
  return null;
};

// Pull hire data from Sheet1 (the original customer sheet with Hire period column)
const pullHiresFromSheet1 = (rows) => {
  if (!rows || rows.length < 2) return 0;
  // Find header row (row with "Company name" or "Hire period")
  let headerIdx = 0;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    if (rows[i].some(c => typeof c === 'string' && c.toLowerCase().includes('hire period'))) {
      headerIdx = i; break;
    }
  }
  const headers = rows[headerIdx].map(h => (h||'').toLowerCase().trim());
  const compIdx = headers.findIndex(h => h.includes('company'));
  const periodIdx = headers.findIndex(h => h.includes('hire period'));
  const regoIdx = headers.findIndex(h => h.includes('rego'));
  const rateIdx = headers.findIndex(h => h.includes('weekly') || h.includes('charge'));
  if (periodIdx === -1) return 0;

  let updated = 0;
  rows.slice(headerIdx + 1).forEach(row => {
    const company = (row[compIdx] || '').trim();
    const periodStr = (row[periodIdx] || '').trim();
    const regoStr = (row[regoIdx] || '').trim();
    const rateStr = (row[rateIdx] || '').toString().trim();
    if (!company || !periodStr || periodStr .toLowerCase().includes('didn')) return;

    const period = parseHirePeriod(periodStr);
    if (!period) return;

    // Find matching customer
    const cust = CUSTOMERS.find(c =>
      c.company.toLowerCase() === company.toLowerCase() ||
      c.company.toLowerCase().includes(company.toLowerCase()) ||
      company.toLowerCase().includes(c.company.toLowerCase().split(' ')[0])
    );
    if (!cust) return;

    // Find best matching hire for this customer — match by start date proximity
    const hire = HIRES.filter(h => h.customer === cust.id)
      .sort((a,b) => Math.abs(new Date(a.start)-new Date(period.start)) - Math.abs(new Date(b.start)-new Date(period.start)))[0];
    if (!hire) return;

    let changed = false;
    if (hire.end !== period.end) { hire.end = period.end; changed = true; }
    if (hire.start !== period.start) { hire.start = period.start; changed = true; }

    // Parse weekly rate
    if (rateStr) {
      const rateNum = parseFloat(rateStr.replace(/[$,\s]/g, ''));
      if (!isNaN(rateNum) && rateNum > 0 && rateNum !== hire.weekly_truck) {
        hire.weekly_truck = rateNum; changed = true;
      }
    }

    // Update hire status and truck status based on end date
    if (changed) {
      const truck = TRUCKS.find(t => t.id === hire.truck);
      const endDate = new Date(period.end);
      const today = new Date();
      if (endDate >= today) {
        // Extended — reactivate if was completed
        hire.status = 'active';
        if (truck) {
          truck.status = 'on_hire';
          truck.hirer = cust.id;
          truck.hire_end = period.end;
        }
      } else {
        // Past end date — mark completed
        hire.status = 'completed';
        if (truck && truck.hirer === cust.id) {
          truck.status = 'available';
          truck.hirer = null;
        }
      }
      updated++;
    }
  });
  return updated;
};

const runFullSync = async (config, onProgress, onDone, onError) => {
  try {
    const { accessToken, spreadsheetId } = config;

    // STEP 1: Pull changes FROM Sheets INTO app
    onProgress('Reading changes from Sheets…', 0);
    let pullUpdates = 0;
    let debugLog = [];
    try {
      // Read Sheet1 (original customer hire period tab)
      const sheet1Rows = await readSheetTab(accessToken, spreadsheetId, 'Sheet1');
      debugLog.push('Sheet1 rows: ' + (sheet1Rows ? sheet1Rows.length : 'null'));
      if (sheet1Rows && sheet1Rows.length > 0) {
        debugLog.push('Sheet1 headers: ' + JSON.stringify(sheet1Rows[0]));
        debugLog.push('Sheet1 row2: ' + JSON.stringify(sheet1Rows[1]));
        debugLog.push('Sheet1 row3: ' + JSON.stringify(sheet1Rows[2]));
      }
      if (sheet1Rows) pullUpdates += pullHiresFromSheet1(sheet1Rows);
      debugLog.push('After Sheet1 pull: ' + pullUpdates + ' updates');
      // Read Hire Management tab
      const hireRows = await readSheetTab(accessToken, spreadsheetId, 'Hire Management');
      if (hireRows) pullUpdates += pullHiresFromSheet(hireRows);
      // Read Customers tab
      const custRows = await readSheetTab(accessToken, spreadsheetId, 'Customers');
      if (custRows) pullUpdates += pullCustomersFromSheet(custRows);
    } catch(e) {
      debugLog.push('ERROR: ' + e.message);
    }
    if (debugLog.length) { console.log('SHEETS SYNC DEBUG:', debugLog.join(' | ')); alert('Sync Debug:\n' + debugLog.join('\n')); }

    // STEP 2: Push all current app data TO Sheets
    const allRows = buildSheetRows();
    const tabMap = {
      'Fleet & Trailers': allRows.fleet,
      'Customers': allRows.customers,
      'Hire Management': allRows.hires,
      'Invoices': allRows.invoices,
      'Maintenance': allRows.maintenance,
      'P&L Detail': allRows.pnl,
    };
    onProgress('Checking sheets…', 15);
    await ensureSheets(accessToken, spreadsheetId, Object.keys(tabMap));
    const tabs = Object.entries(tabMap);
    for (let i = 0; i < tabs.length; i++) {
      const [name, rows] = tabs[i];
      onProgress(`Syncing ${name}…`, Math.round(15 + ((i) / tabs.length) * 85));
      await syncSheetTab(accessToken, spreadsheetId, name, rows);
    }
    onDone(new Date(), pullUpdates);
  } catch (e) { onError(e.message || 'Unknown sync error'); }
};

const XERO_CLIENT_ID = '4FB523DA93F24256BBD50A07CA9E9C9A';
const XERO_REDIRECT_URI = 'https://ssrentalsnz-cell.github.io/SS-Rentals-/';
const XERO_SCOPES = 'openid profile email accounting.invoices.read accounting.contacts.read offline_access';
const XERO_CONFIG_KEY = 'ss_rentals_xero_config';
// Cloudflare Worker proxy URL — handles token exchange to avoid CORS
const XERO_PROXY = 'https://xero-proxy.ssrentalsnz.workers.dev';

const loadXeroConfig = () => { try { return JSON.parse(localStorage.getItem(XERO_CONFIG_KEY)||'null'); } catch { return null; } };
const saveXeroConfig = cfg => localStorage.setItem(XERO_CONFIG_KEY, JSON.stringify(cfg));
const clearXeroConfig = () => localStorage.removeItem(XERO_CONFIG_KEY);

// PKCE helpers
const generateCodeVerifier = () => {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  const b64 = btoa(String.fromCharCode(...arr));
  return b64.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/[=]/g,'');
};
const generateCodeChallenge = async (verifier) => {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  const b64 = btoa(String.fromCharCode(...new Uint8Array(digest)));
  return b64.replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/[=]/g,'');
};

const startXeroAuth = async () => {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('xero_verifier', verifier);
  localStorage.setItem('xero_verifier_backup', verifier);
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('xero_state', state);
  localStorage.setItem('xero_state_backup', state);
  const url = 'https://login.xero.com/identity/connect/authorize'
    + '?response_type=code'
    + '&client_id=' + encodeURIComponent(XERO_CLIENT_ID)
    + '&redirect_uri=' + encodeURIComponent(XERO_REDIRECT_URI)
    + '&scope=' + encodeURIComponent(XERO_SCOPES)
    + '&state=' + state
    + '&code_challenge=' + challenge
    + '&code_challenge_method=S256';
  window.location.href = url;
};

// Token exchange via proxy to avoid CORS
const exchangeXeroCode = async (code) => {
  const verifier = sessionStorage.getItem('xero_verifier') || localStorage.getItem('xero_verifier_backup');
  if (!verifier) throw new Error('No code verifier found — please try connecting again');
  localStorage.removeItem('xero_verifier_backup');
  // Try direct first (Xero may allow it), fall back to proxy
  const body = new URLSearchParams({
    grant_type:'authorization_code', code,
    redirect_uri:XERO_REDIRECT_URI,
    client_id:XERO_CLIENT_ID,
    code_verifier:verifier
  });
  let res = await fetch('https://identity.xero.com/connect/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  }).catch(()=>null);
  if (!res || !res.ok) {
    // Fall back to proxy
    res = await fetch(XERO_PROXY + '/token', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ grant_type:'authorization_code', code, redirect_uri:XERO_REDIRECT_URI, client_id:XERO_CLIENT_ID, code_verifier:verifier })
    });
  }
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error_description || e.error || 'Token exchange failed — CORS issue. A proxy server is needed.');
  }
  const data = await res.json();
  sessionStorage.removeItem('xero_verifier');
  sessionStorage.removeItem('xero_state');
  return { accessToken:data.access_token, refreshToken:data.refresh_token, tokenExpiry:Date.now()+(data.expires_in||1800)*1000 };
};

const refreshXeroToken = async (refreshToken) => {
  const body = new URLSearchParams({ grant_type:'refresh_token', refresh_token:refreshToken, client_id:XERO_CLIENT_ID });
  let res = await fetch('https://identity.xero.com/connect/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  }).catch(()=>null);
  if (!res || !res.ok) {
    res = await fetch(XERO_PROXY + '/token', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ grant_type:'refresh_token', refresh_token:refreshToken, client_id:XERO_CLIENT_ID })
    });
  }
  if (!res.ok) throw new Error('Session expired — please reconnect Xero');
  const data = await res.json();
  return { accessToken:data.access_token, refreshToken:data.refresh_token||refreshToken, tokenExpiry:Date.now()+(data.expires_in||1800)*1000 };
};

const getXeroTenantId = async (accessToken) => {
  // Route through proxy to avoid CORS
  const res = await fetch(XERO_PROXY + '/xero-api/connections', {
    headers:{ Authorization:'Bearer '+accessToken }
  });
  if (!res.ok) {
    const txt = await res.text().catch(()=>'');
    throw new Error('Cannot reach Xero API (' + res.status + '). ' + (txt.slice(0,200)||'Check your connection.'));
  }
  const tenants = await res.json();
  if (!Array.isArray(tenants) || !tenants.length) throw new Error('No Xero organisations found — make sure you approved access during login');
  return tenants[0].tenantId;
};

const fetchXeroInvoices = async (accessToken, tenantId) => {
  const res = await fetch(XERO_PROXY + '/xero-api/api.xro/2.0/Invoices?Type=ACCREC&Statuses=DRAFT,SUBMITTED,AUTHORISED,PAID&page=1', {
    headers:{ Authorization:'Bearer '+accessToken, 'Xero-tenant-id':tenantId }
  });
  if (!res.ok) {
    const txt = await res.text().catch(()=>'');
    throw new Error('Invoice fetch failed (' + res.status + '): ' + txt.slice(0,200));
  }
  const data = await res.json();
  return data.Invoices || [];
};

const mapXeroStatus = s => ({'DRAFT':'draft','SUBMITTED':'sent','AUTHORISED':'sent','PAID':'paid','VOIDED':'void'}[s]||'draft');

const syncXeroToApp = async (config, onProgress, onDone, onError) => {
  try {
    let { accessToken, refreshToken, tokenExpiry, tenantId } = config;
    onProgress('Connecting to Xero…', 10);
    if (Date.now() > tokenExpiry - 60000) {
      onProgress('Refreshing session…', 15);
      try {
        const refreshed = await refreshXeroToken(refreshToken);
        accessToken = refreshed.accessToken;
        refreshToken = refreshed.refreshToken;
        tokenExpiry = refreshed.tokenExpiry;
        saveXeroConfig({ ...config, accessToken, refreshToken, tokenExpiry });
      } catch(e) {
        onError('Session expired: ' + e.message + ' — click Disconnect and reconnect Xero.');
        return;
      }
    }
    if (!tenantId) {
      onProgress('Finding Xero organisation…', 25);
      tenantId = await getXeroTenantId(accessToken);
      saveXeroConfig({ ...config, accessToken, refreshToken, tokenExpiry, tenantId });
    }
    onProgress('Fetching invoices from Xero…', 45);
    const xeroInvs = await fetchXeroInvoices(accessToken, tenantId);
    onProgress('Matching ' + xeroInvs.length + ' invoices…', 75);
    const statusMap = {};
    xeroInvs.forEach(xi => {
      if (xi.InvoiceNumber) statusMap[xi.InvoiceNumber] = { status:mapXeroStatus(xi.Status), xeroId:xi.InvoiceID };
    });
    const updates = [];
    INVOICES.forEach(inv => {
      const match = statusMap[inv.id];
      if (match) {
        if (match.status !== inv.status || match.xeroId !== inv.xero_id) {
          updates.push({ id:inv.id, oldStatus:inv.status, newStatus:match.status });
          inv.status = match.status;
          inv.xero_id = match.xeroId;
        }
      }
    });
    onDone(new Date(), updates, xeroInvs.length);
  } catch(e) { onError(e.message||'Xero sync failed'); }
};

const Modal = ({open,onClose,title,children,footer,size=''}) => {

    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

        <div className="modal-header">

          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">{children}</div>
        {footer&&<div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
};

/* ─── CHART: REVENUE BAR ──────────────────────────── */
const RevenueChart = ({theme}) => {
  const ref = useRef(); const inst = useRef();
  useEffect(()=>{
    if(inst.current) inst.current.destroy();
    const isDark = theme==='dark';
    const grid = isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)';
    const tick = isDark?'#888':'#999';
    inst.current = new Chart(ref.current,{
      type:'bar',
      data:{
        labels:MONTHLY_REVENUE.map(r=>r.month),
        datasets:[
          {label:'Revenue',data:MONTHLY_REVENUE.map(r=>r.amount),backgroundColor:'rgba(217,43,43,0.8)',borderRadius:5,borderSkipped:false},
          {label:'Expenses',data:MONTHLY_REVENUE.map(r=>r.expenses),backgroundColor:'rgba(230,126,34,0.6)',borderRadius:5,borderSkipped:false},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:isDark?'#aaa':'#555',font:{size:11}}},tooltip:{callbacks:{label:c=>' '+fmtCur(c.parsed.y)}}},scales:{x:{grid:{color:grid},ticks:{color:tick}},y:{grid:{color:grid},ticks:{color:tick,callback:v=>'$'+v/1000+'k'}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

/* ─── CHART: FLEET STATUS DONUT ──────────────────── */
const FleetDonut = ({theme}) => {
  const ref = useRef(); const inst = useRef();
  useEffect(()=>{
    if(inst.current) inst.current.destroy();
    const allV = [...TRUCKS,...TRAILERS];
    const hired = allV.filter(v=>v.status==='on_hire').length;
    const avail = allV.filter(v=>v.status==='available').length;
    const maint = allV.filter(v=>v.status==='maintenance').length;
    inst.current = new Chart(ref.current,{
      type:'doughnut',
      data:{labels:['On Hire','Available','Maintenance'],datasets:[{data:[hired,avail,maint],backgroundColor:['#2980B9','#27AE60','#E67E22'],borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{position:'bottom',labels:{color:theme==='dark'?'#aaa':'#555',padding:12,font:{size:11}}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

/* ─── CHART: WEEKLY TREND ─────────────────────────── */
const WeeklyChart = ({theme}) => {
  const ref = useRef(); const inst = useRef();
  useEffect(()=>{
    if(inst.current) inst.current.destroy();
    const isDark = theme==='dark';
    inst.current = new Chart(ref.current,{
      type:'line',
      data:{
        labels:WEEKLY_REVENUE.map(r=>r.week),
        datasets:[{label:'Weekly Revenue',data:WEEKLY_REVENUE.map(r=>r.amount),borderColor:'#D92B2B',backgroundColor:'rgba(217,43,43,0.1)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#D92B2B'}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtCur(c.parsed.y)}}},scales:{x:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)'},ticks:{color:isDark?'#888':'#999'}},y:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)'},ticks:{color:isDark?'#888':'#999',callback:v=>'$'+v/1000+'k'}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

/* ─── DASHBOARD PAGE ──────────────────────────────── */
const Dashboard = ({theme,setPage}) => {
  const allV = [...TRUCKS,...TRAILERS];
  const onHire = TRUCKS.filter(t=>t.status==='on_hire').length;
  const avail = TRUCKS.filter(t=>t.status==='available').length;
  const maint = TRUCKS.filter(t=>t.status==='maintenance').length;
  const util = Math.round((onHire/TRUCKS.length)*100);
  const weekRev = WEEKLY_REVENUE[WEEKLY_REVENUE.length-1].amount;
  const monthRev = MONTHLY_REVENUE[MONTHLY_REVENUE.length-1].amount;
  const monthNet = MONTHLY_REVENUE[MONTHLY_REVENUE.length-1].net;
  const outstanding = INVOICES.filter(i=>i.status!=='paid').reduce((a,b)=>a+b.total,0);
  const overdue = INVOICES.filter(i=>i.status==='overdue');
  const overdueAmt = overdue.reduce((a,b)=>a+b.total,0);
  const weeklyKm = TRUCKS.reduce((a,t)=>a+t.weekly_km,0);
  const rucCost = weeklyKm*0.062;

  // Compliance alerts
  const cofAlerts = allV.filter(v=>daysDiff(v.cof_expiry)<=30).sort((a,b)=>daysDiff(a.cof_expiry)-daysDiff(b.cof_expiry));
  const regoAlerts = allV.filter(v=>daysDiff(v.rego_expiry)<=30).sort((a,b)=>daysDiff(a.rego_expiry)-daysDiff(b.rego_expiry));

  return (
    <div>
      {/* KPI row 1 */}
      <div className="grid grid-4 mb-4">
        {[
          {label:'Active Hires',value:onHire,sub:`${avail} available · ${maint} in workshop`,accent:'var(--blue)',trend:'↑ 1 from last week',up:true},
          {label:'Fleet Utilisation',value:`${util}%`,sub:`${TRUCKS.length} trucks · ${TRAILERS.length} trailers`,accent:'var(--green)',trend:'On target (>70%)',up:true},
          {label:'Weekly Revenue',value:fmtCur(weekRev),sub:'Week ending 31 May 2026',accent:'var(--red)',trend:'↑ 10.3% vs last week',up:true},
          {label:'Monthly Revenue',value:fmtCur(monthRev),sub:`May 2026 — Net ${fmtCur(monthNet)}`,accent:'#8E44AD',trend:'Best month since Oct 2025',up:true},
        ].map(k=>(
          <div key={k.label} className="kpi-card" style={{'--accent':k.accent}}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
            <div className={`kpi-trend ${k.up?'up':'down'}`}>{k.trend}</div>
          </div>
        ))}
      </div>
      {/* KPI row 2 */}
      <div className="grid grid-4 mb-4">
        {[
          {label:'Outstanding Invoices',value:fmtCur(outstanding),sub:`${INVOICES.filter(i=>i.status!=='paid').length} invoices pending`,accent:'var(--orange)'},
          {label:'Overdue Payments',value:fmtCur(overdueAmt),sub:`${overdue.length} invoices overdue`,accent:'var(--red)'},
          {label:'Weekly Mileage Total',value:`${weeklyKm.toLocaleString()} km`,sub:'All trucks combined',accent:'var(--blue)'},
          {label:'RUC Cost This Week',value:fmtCur(rucCost),sub:'@ $0.062/km avg',accent:'var(--text3)'},
        ].map(k=>(
          <div key={k.label} className="kpi-card" style={{'--accent':k.accent}}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Charts row */}
      <div className="grid grid-3 mb-4" style={{gridTemplateColumns:'2fr 1fr'}}>
        <div className="card">
          <div className="card-header"><span className="card-title">Monthly Revenue — 2026</span><span className="badge badge-green">↑ YTD</span></div>
          <div className="chart-wrap"><RevenueChart theme={theme}/></div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Fleet Status</span></div>
          <div className="chart-wrap"><FleetDonut theme={theme}/></div>
        </div>
      </div>

      {/* Weekly trend + Compliance */}
      <div className="grid mb-4" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="card">
          <div className="card-header"><span className="card-title">Weekly Revenue Trend</span></div>
          <div className="chart-wrap-sm" style={{height:160}}><WeeklyChart theme={theme}/></div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Compliance Alerts</span><button className="btn btn-ghost btn-sm" onClick={()=>setPage('fleet')}>View All</button></div>
          <div>
            {cofAlerts.slice(0,3).map(v=>{
              const d=daysDiff(v.cof_expiry); const s=complianceStatus(v.cof_expiry);
              return <div key={v.id} className={`alert alert-${s}`}><Icon name="warning" size={15}/><div><strong>{v.rego}</strong> — COF {d<0?`overdue ${Math.abs(d)} days`:`expires in ${d} days`} ({fmt(v.cof_expiry)})</div></div>;
            })}
            {regoAlerts.slice(0,2).map(v=>{
              const d=daysDiff(v.rego_expiry); const s=complianceStatus(v.rego_expiry);
              return <div key={v.id+'-r'} className={`alert alert-${s}`}><Icon name="info" size={15}/><div><strong>{v.rego}</strong> — Rego {d<0?`overdue ${Math.abs(d)} days`:`expires in ${d} days`} ({fmt(v.rego_expiry)})</div></div>;
            })}
          </div>
        </div>
      </div>

      {/* Recent invoices + Active hires */}

const VehicleRevenueChart = ({theme}) => {
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(inst.current)inst.current.destroy();
    const isDark=theme==='dark';
    inst.current=new Chart(ref.current,{
      type:'bar',
      data:{
        labels:TRUCKS.map(t=>t.rego),
        datasets:[{label:'Revenue',data:TRUCKS.map(t=>t.rev_ytd),backgroundColor:'rgba(217,43,43,0.75)',borderRadius:5},{label:'Maint Cost',data:TRUCKS.map(t=>t.maint_ytd),backgroundColor:'rgba(230,126,34,0.75)',borderRadius:5}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:isDark?'#aaa':'#555'}}},scales:{x:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)'},ticks:{color:isDark?'#888':'#999'}},y:{grid:{color:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)'},ticks:{color:isDark?'#888':'#999',callback:v=>'$'+v/1000+'k'}}}}
    });
    return ()=>{if(inst.current)inst.current.destroy()};
  },[theme]);
  return <canvas ref={ref}/>;
};

/* ─── NAVMAN PAGE ─────────────────────────────────── */
const NAVMAN_DATA_KEY = 'ss_rentals_navman_data';
const loadNavmanData = () => { try { return JSON.parse(localStorage.getItem(NAVMAN_DATA_KEY)||'null'); } catch { return null; } };
const saveNavmanData = d => localStorage.setItem(NAVMAN_DATA_KEY, JSON.stringify(d));

const NavmanPage = () => {
  const initKm = () => {
    const saved = loadNavmanData();
    const defaults = {};
    TRUCKS.forEach(t => { defaults[t.id] = { weekly_km: t.weekly_km, odometer: t.odometer, location: t.location, updated: null }; });
    return saved ? { ...defaults, ...saved } : defaults;
  };
  const [kmData, setKmData] = useState(initKm);
  const [editing, setEditing] = useState(false);
  const [editVals, setEditVals] = useState({});
  const [saved, setSaved] = useState(false);
  const [tab, setTab] = useState('weekly');
  const [history] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ss_rentals_navman_history')||'[]'); } catch { return []; }
  });

  const totalKm = Object.values(kmData).reduce((a,v)=>a+(v.weekly_km||0),0);
  const totalRUC = TRUCKS.reduce((a,t)=>{
    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
    const rate = h?.ruc_rate||0.062;
    return a + (kmData[t.id]?.weekly_km||0)*rate;
  },0);
  const totalMileage = TRUCKS.reduce((a,t)=>{
    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
    const rate = h?.mileage_rate||0;
    return a + (kmData[t.id]?.weekly_km||0)*rate;
  },0);

  const startEdit = () => {
    const vals = {};
    TRUCKS.forEach(t => { vals[t.id] = { weekly_km: kmData[t.id]?.weekly_km||0, odometer: kmData[t.id]?.odometer||t.odometer, location: kmData[t.id]?.location||t.location }; });
    setEditVals(vals);
    setEditing(true);
  };

  const saveEdit = () => {
    const now = new Date().toISOString();
    const updated = {};
    TRUCKS.forEach(t => { updated[t.id] = { ...editVals[t.id], updated: now }; });
    setKmData(updated);
    saveNavmanData(updated);
    // Save to history
    const hist = JSON.parse(localStorage.getItem('ss_rentals_navman_history')||'[]');
    hist.unshift({ date: now, entries: updated });
    if (hist.length > 12) hist.pop();
    localStorage.setItem('ss_rentals_navman_history', JSON.stringify(hist));
    setEditing(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const weekStr = () => {
    const now = new Date();
    const mon = new Date(now); mon.setDate(now.getDate() - now.getDay() + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return `${mon.toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})} – ${sun.toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'})}`;
  };

  return (
    <div>
      {/* Status bar */}
      <div className="card card-sm mb-4" style={{borderLeft:'3px solid var(--orange)',display:'flex',alignItems:'center',gap:16}}>
        <Icon name="navman" size={22} color="var(--orange)"/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13}}>Teletrac Navman — Manual Entry Mode</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>API key requested — awaiting Teletrac Navman approval. Enter weekly km manually below. Will auto-upgrade to live data once API key arrives.</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {saved&&<span className="badge badge-green">✓ Saved</span>}
          <button className="btn btn-primary btn-sm" onClick={startEdit}><Icon name="edit" size={13}/> Update This Week</button>
        </div>
      </div>

      {/* KPI row */}
      <div className="grid grid-4 mb-4">
        {[
          {l:'Active Vehicles',v:TRUCKS.filter(t=>t.status==='on_hire').length+' of '+TRUCKS.length},
          {l:'Total KM This Week',v:totalKm.toLocaleString()+' km'},

                          </div>
                          <div className="form-group" style={{marginBottom:0}}>
                            <label>Current Location</label>

                  )}
                  {d.updated&&<div style={{fontSize:10,color:'var(--text3)',marginTop:8}}>Last updated: {new Date(d.updated).toLocaleString('en-NZ')}</div>}

          </div>

          {editing&&(
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginBottom:20}}>
              <button className="btn btn-ghost" onClick={()=>setEditing(false)}>Cancel</button>

          )}

          {/* Weekly summary */}
          <div className="card" style={{borderLeft:'3px solid var(--green)'}}>

                  {TRUCKS.filter(t=>t.status==='on_hire').map(t=>{
                    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
                    const km = kmData[t.id]?.weekly_km||0;
                    const milCharge = km*(h?.mileage_rate||0);
                    const rucCharge = km*(h?.ruc_rate||0.062);
                    const total = (h?.weekly_truck||0)+(h?.weekly_trailer||0)+milCharge+rucCharge;
                    return (
                      <tr key={t.id}>
                        <td style={{fontWeight:700}}>{t.rego}</td>
                        <td>{custName(t.hirer)}</td>
                        <td style={{fontWeight:700}}>{fmtCur((h?.weekly_truck||0)+(h?.weekly_trailer||0))}</td>
                        <td style={{fontWeight:700}}>{km.toLocaleString()} km</td>
                        <td style={{color:'var(--orange)'}}>{milCharge>0?fmtCur(milCharge):'—'}</td>
                        <td style={{color:'var(--red-light)'}}>{fmtCur(rucCharge)}</td>
                        <td style={{fontWeight:800,fontSize:15}}>{fmtCur(total)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==='history'&&(
        <div>

};

            <div className="form-group"><label>Invoice Prefix</label><input defaultValue="INV-2026-"/></div>
            <div className="form-group"><label>Default Payment Terms (days)</label><input defaultValue="7" type="number"/></div>
            <div className="form-group"><label>Invoice Day</label><select><option>Monday (weekly)</option><option>Sunday</option></select></div>
            <div className="form-group"><label>GST Rate (%)</label><input defaultValue="15" type="number"/></div>
            <button className="btn btn-primary btn-sm">Save Changes</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ─── GOOGLE SHEETS SETUP MODAL ───────────────────── */
const SheetsSetupModal = ({open, onClose, onSave, initialConfig}) => {
  const [clientId, setClientId] = useState(initialConfig?.clientId||'');
  const [spreadsheetId, setSpreadsheetId] = useState(initialConfig?.spreadsheetId||'');
  const [step, setStep] = useState(1);
  const [status, setStatus] = useState(null); // {ok, msg}
  const [authing, setAuthing] = useState(false);

  const handleAuth = () => {
    if (!clientId || !spreadsheetId) { setStatus({ok:false,msg:'Please fill in both fields first.'}); return; }
    if (!window.google?.accounts?.oauth2) {
      setStatus({ok:false,msg:'Google Identity Services not loaded yet. Wait a moment and try again.'}); return;
    }
    setAuthing(true);
    setStatus(null);
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      callback: (resp) => {
        setAuthing(false);
        if (resp.error) {
          setStatus({ok:false, msg:`Auth error: ${resp.error} — ${resp.error_description||''}`});
          return;
        }
        onSave({
          clientId,
          spreadsheetId,
          accessToken: resp.access_token,
          tokenExpiry: Date.now() + (resp.expires_in||3600)*1000
        });
        onClose();
      },
      error_callback: (err) => {
        setAuthing(false);
        setStatus({ok:false, msg: err.type==='popup_closed' ? 'Popup was closed — please try again.' : `Error: ${err.type}`});
      }
    });
    client.requestAccessToken({prompt:'consent'});
  };

  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:600}}>
        <div className="modal-header">
          <span className="modal-title" style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon name="sheets" size={20} color="#34A853"/> Google Sheets Live Sync
          </span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">
          <div style={{background:'rgba(52,168,83,0.08)',border:'1px solid rgba(52,168,83,0.25)',borderRadius:10,padding:'14px 16px',marginBottom:20,fontSize:13,lineHeight:1.7}}>
            <strong style={{color:'#34A853'}}>What gets synced (6 tabs):</strong><br/>
            Fleet &amp; Trailers &nbsp;·&nbsp; Customers &nbsp;·&nbsp; Hire Management &nbsp;·&nbsp; Invoices &nbsp;·&nbsp; Maintenance &nbsp;·&nbsp; P&amp;L Detail<br/>
            <span style={{color:'var(--text3)'}}>Auto-syncs every 5 minutes. Manual trigger available anytime.</span>
          </div>

          <div style={{display:'flex',gap:0,borderRadius:8,overflow:'hidden',border:'1px solid var(--border2)',marginBottom:20}}>
            {['1. Credentials','2. Authorise'].map((s,i)=>(
              <div key={s} style={{flex:1,padding:'10px',textAlign:'center',background:step===i+1?'var(--red)':'var(--bg3)',color:step===i+1?'#fff':'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}} onClick={()=>setStep(i+1)}>{s}</div>
            ))}
          </div>

          {step===1&&(
            <div>
              <div className="form-group">
                <label>Google OAuth 2.0 Client ID</label>
                <input value={clientId} onChange={e=>setClientId(e.target.value)} placeholder="123456789-abc...apps.googleusercontent.com"/>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>
                  <strong>console.cloud.google.com</strong> → APIs &amp; Services → Enable <em>Google Sheets API</em> → Credentials → Create OAuth 2.0 Client ID (Web Application type).
                </div>
              </div>
              <div className="form-group">
                <label>Google Spreadsheet ID</label>
                <input value={spreadsheetId} onChange={e=>setSpreadsheetId(e.target.value)} placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"/>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>
                  From your Google Sheet URL: docs.google.com/spreadsheets/d/<strong style={{color:'var(--text)'}}>THIS_PART</strong>/edit
                </div>
              </div>
              <div style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:16,fontSize:12,lineHeight:1.8,borderLeft:'3px solid var(--orange)'}}>
                <strong>Required setup in Google Cloud Console:</strong><br/>
                1. OAuth consent screen → App name: <em>SS Rentals</em> → User type: <em>External</em><br/>
                2. OAuth Client → Authorised JavaScript Origins → add: <code style={{background:'var(--bg4)',padding:'1px 6px',borderRadius:3}}>{window.location.origin}</code><br/>
                3. Make sure your Google account has <strong>edit access</strong> to the spreadsheet
              </div>
              <button className="btn btn-primary" onClick={()=>setStep(2)} disabled={!clientId||!spreadsheetId}>Continue →</button>
            </div>
          )}

          {step===2&&(
            <div>
              <div className="alert alert-green" style={{marginBottom:16}}>
                <Icon name="info" size={15}/>
                <div>Uses Google Identity Services (GIS) — Google&apos;s current secure auth method. A consent popup will appear. Your token stays in your browser only.</div>
              </div>
              <div style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:16,fontSize:12,lineHeight:1.8}}>
                <strong>Client ID:</strong> <code style={{fontSize:11,wordBreak:'break-all'}}>{clientId}</code><br/>
                <strong>Spreadsheet:</strong> <code style={{fontSize:11}}>{spreadsheetId}</code>
              </div>
              {status&&(
                <div className={`alert alert-${status.ok?'green':'red'}`} style={{marginBottom:14}}>
                  <Icon name={status.ok?'check':'warning'} size={15}/>
                  <span>{status.msg}</span>
                </div>
              )}
              <button className="btn btn-primary" onClick={handleAuth} disabled={authing} style={{background:'#34A853'}}>
                {authing
                  ? <><div style={{width:14,height:14,border:'2px solid #fff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/> Waiting for Google…</>
                  : <><Icon name="sheets" size={15}/> Sign in with Google &amp; Authorise</>
                }
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ─── SYNC STATUS BAR (header widget) ─────────────── */
const SyncStatusBar = ({syncState, onManualSync, onOpenSetup}) => {
  const [countdown, setCountdown] = useState(300);
  useEffect(()=>{
    if (!syncState.configured) return;
    const iv = setInterval(()=>{
      const elapsed = syncState.lastSync ? Math.floor((Date.now()-syncState.lastSync.getTime())/1000) : 300;
      setCountdown(Math.max(0,300-elapsed));
    },1000);
    return ()=>clearInterval(iv);
  },[syncState.lastSync, syncState.configured]);

  const mm = String(Math.floor(countdown/60)).padStart(2,'0');
  const ss2 = String(countdown%60).padStart(2,'0');
  const pct = (countdown/300)*100;

  if (!syncState.configured) {
    return (
      <button className="btn btn-ghost btn-sm" onClick={onOpenSetup} style={{gap:6,borderColor:'rgba(52,168,83,0.4)',color:'#34A853'}}>
        <Icon name="sheets" size={14} color="#34A853"/> Connect Sheets
      </button>
    );
  }
  return (
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      {syncState.syncing ? (
        <div style={{display:'flex',alignItems:'center',gap:7,padding:'5px 12px',background:'rgba(52,168,83,0.1)',border:'1px solid rgba(52,168,83,0.3)',borderRadius:7}}>
          <div style={{width:14,height:14,border:'2px solid #34A853',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
          <span style={{fontSize:12,fontWeight:600,color:'#34A853'}}>{syncState.syncMsg||'Syncing…'}</span>
          {syncState.syncPct>0&&<span style={{fontSize:11,color:'var(--text3)'}}>{syncState.syncPct}%</span>}
        </div>
      ) : (
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,cursor:'pointer'}} onClick={onManualSync} title="Click to sync now">
          <div style={{width:7,height:7,borderRadius:'50%',background:'#34A853',boxShadow:'0 0 0 3px rgba(52,168,83,0.2)'}}/>
          <span style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>Sheets</span>
          {syncState.lastSync&&<span style={{fontSize:11,color:'var(--text3)'}}>synced {syncState.lastSync.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})}</span>}
          <span style={{fontSize:11,color:'var(--text3)',fontFamily:'monospace'}}>{mm}:{ss2}</span>
          <div style={{width:28,height:3,background:'var(--border2)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${100-pct}%`,background:'#34A853',borderRadius:2,transition:'width 1s linear'}}/>
          </div>
        </div>
      )}
      {syncState.error&&<span style={{fontSize:11,color:'var(--red-light)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={syncState.error}>⚠ {syncState.error}</span>}
    </div>
  );
};

/* ─── MAIN APP ────────────────────────────────────── */
const App = () => {
  const [theme,setTheme]=useState('dark');
  const [page,setPage]=useState('dashboard');
  const [sheetsSetupOpen, setSheetsSetupOpen] = useState(false);
  const [sheetsConfig, setSheetsConfig] = useState(()=>loadSheetsConfig());
  const [syncState, setSyncState] = useState({configured:false,syncing:false,lastSync:null,error:null,syncMsg:'',syncPct:0});
  const autoSyncTimer = useRef(null);
  const syncInProgress = useRef(false);
  // Xero state
  const [xeroConfig, setXeroConfig] = useState(()=>loadXeroConfig());
  const [xeroSyncState, setXeroSyncState] = useState({configured:false,syncing:false,lastSync:null,error:null,syncMsg:'',updates:[]});
  const xeroSyncInProgress = useRef(false);

  useEffect(()=>{document.body.className=theme==='light'?'light':'';},[theme]);

  // Handle Xero OAuth callback (PKCE redirect back to app)
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const savedState = sessionStorage.getItem('xero_state') || localStorage.getItem('xero_state_backup');
    localStorage.removeItem('xero_state_backup');
    if (code && state && state === savedState) {
      window.history.replaceState({}, '', window.location.pathname);
      exchangeXeroCode(code).then(tokens => {
        const cfg = { ...tokens, tenantId: null };
        saveXeroConfig(cfg);
        setXeroConfig(cfg);
        setXeroSyncState(s=>({...s, error:null, configured:true}));
      }).catch(e => {
        const msg = 'Token exchange failed: ' + e.message;
        setXeroSyncState(s=>({...s, error:msg}));
        alert('Xero auth error: ' + e.message + '\n\nPlease go to Settings → Integrations and try Disconnect then Connect Xero again.');
      });
    }
  }, []);

  useEffect(()=>{
    setXeroSyncState(s=>({...s, configured:!!(xeroConfig?.accessToken)}));
  },[xeroConfig]);

  const doXeroSync = useCallback(async () => {
    if (xeroSyncInProgress.current) return;
    if (!xeroConfig?.accessToken) { alert('Xero not connected — please connect first.'); return; }
    xeroSyncInProgress.current = true;
    setXeroSyncState(s=>({...s,syncing:true,error:null,syncMsg:'Starting…'}));
    await syncXeroToApp(
      xeroConfig,
      (msg,pct)=>setXeroSyncState(s=>({...s,syncMsg:msg})),
      (ts,updates,total)=>{
        setXeroSyncState(s=>({...s,syncing:false,lastSync:ts,syncMsg:'',updates}));
        xeroSyncInProgress.current=false;
        if(updates.length>0) alert('Xero sync complete! Updated '+updates.length+' invoice(s): '+updates.map(u=>u.id+' → '+u.newStatus).join(', '));
        else alert('Xero sync complete — '+total+' invoices checked, no status changes found.\n\nNote: invoices must have matching numbers in both Xero and this app (e.g. INV-0268).');
      },
      (err)=>{
        setXeroSyncState(s=>({...s,syncing:false,error:err,syncMsg:''}));
        xeroSyncInProgress.current=false;
        alert('Xero sync failed: '+err);
      }
    );
  },[xeroConfig]);

  useEffect(()=>{
    setSyncState(s=>({...s,configured:!!(sheetsConfig?.accessToken&&sheetsConfig?.spreadsheetId)}));
  },[sheetsConfig]);

  const doSync = useCallback(async (cfg) => {
    if (syncInProgress.current) return;
    const config = cfg || sheetsConfig;
    if (!config?.accessToken || !config?.spreadsheetId) return;
    syncInProgress.current = true;
    setSyncState(s=>({...s,syncing:true,error:null,syncMsg:'Starting…',syncPct:0}));
    await runFullSync(
      config,
      (msg,pct)=>setSyncState(s=>({...s,syncMsg:msg,syncPct:pct})),
      (ts)=>{setSyncState(s=>({...s,syncing:false,lastSync:ts,syncMsg:'',syncPct:0}));syncInProgress.current=false;},
      (err)=>{setSyncState(s=>({...s,syncing:false,error:err,syncMsg:'',syncPct:0}));syncInProgress.current=false;}
    );
  },[sheetsConfig]);

  // 5-minute auto-sync trigger
  useEffect(()=>{
    if (!sheetsConfig?.accessToken) return;
    if (autoSyncTimer.current) clearInterval(autoSyncTimer.current);
    doSync(sheetsConfig);
    autoSyncTimer.current = setInterval(()=>doSync(), 5*60*1000);
    return ()=>clearInterval(autoSyncTimer.current);
  },[sheetsConfig]);

  const handleSaveConfig = (cfg) => { saveSheetsConfig(cfg); setSheetsConfig(cfg); };

  const pages={
    dashboard:<Dashboard theme={theme} setPage={setPage}/>,
    fleet:<FleetPage theme={theme}/>,
    customers:<CustomersPage/>,
    hires:<HiresPage/>,
    invoicing:<InvoicingPage/>,
    maintenance:<MaintenancePage/>,
    reports:<ReportsPage theme={theme}/>,
    documents:<DocumentsPage/>,
    navman:<NavmanPage/>,
    settings:<SettingsPage sheetsConfig={sheetsConfig} syncState={syncState} onSheetsSetup={()=>setSheetsSetupOpen(true)} onManualSync={()=>doSync()} xeroConfig={xeroConfig} xeroSyncState={xeroSyncState} onXeroConnect={startXeroAuth} onXeroSync={doXeroSync} onXeroDisconnect={()=>{clearXeroConfig();setXeroConfig(null);}} onXeroDiag={async()=>{ try { const t=xeroConfig?.accessToken; if(!t){alert('Not connected');return;} const r=await fetch('https://xero-proxy.ssrentalsnz.workers.dev/xero-api/connections',{headers:{Authorization:'Bearer '+t}}); const d=await r.json(); alert('Connection OK! Orgs: '+JSON.stringify(d.map(x=>x.tenantName))); } catch(e){alert('Error: '+e.message);}}}/>,
  };

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage}/>
      <div className="main">
        <Header page={page} theme={theme} toggleTheme={()=>setTheme(t=>t==='dark'?'light':'dark')}
          syncState={syncState} onManualSync={()=>doSync()} onOpenSetup={()=>setSheetsSetupOpen(true)}
          xeroSyncState={xeroSyncState} onXeroSync={doXeroSync}/>
        <div className="content">{pages[page]||<Dashboard theme={theme} setPage={setPage}/>}</div>
      </div>
      <SheetsSetupModal open={sheetsSetupOpen} onClose={()=>setSheetsSetupOpen(false)} onSave={handleSaveConfig} initialConfig={sheetsConfig}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
