/* ─── NEW HIRE WIZARD ────────────────────────────── */
const NewHireWizard = ({onClose, onCreated}) => {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    customer: '', customCustomer: '', isNewCustomer: false,
    startDate: '', endDate: '', hireType: 'weekly',
    truck: '', trailer: '', noTrailer: false,
    weeklyTruck: 0, weeklyTrailer: 0, mileageRate: 0.18, rucRate: 0.062,
    bond: 5000, bondPaid: false, signed: false, insuranceVerified: false, checklistDone: false,
    notes: '',
  });
  const [confirmed, setConfirmed] = useState(false);
  const [newHireId, setNewHireId] = useState('');

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  // Calculate hire duration and cost
  const calcDuration = () => {
    if (!form.startDate || !form.endDate) return {days:0, weeks:0, months:0, label:'—'};
    const diff = Math.ceil((new Date(form.endDate) - new Date(form.startDate)) / 86400000);
    const weeks = Math.ceil(diff / 7);
    const months = Math.ceil(diff / 30);
    return {days:diff, weeks, months, label: diff===1?'1 day':`${diff} days (${weeks} week${weeks!==1?'s':''})`};
  };

  const calcCost = () => {
    const dur = calcDuration();
    if (!dur.weeks) return 0;
    const total = (form.weeklyTruck + form.weeklyTrailer) * dur.weeks;
    return total;
  };

  // Get available trucks for selected dates
  const getAvailableTrucks = () => {
    if (!form.startDate || !form.endDate) return TRUCKS;
    const effHires = getEffectiveHires().filter(h => h.status === 'active');
    return TRUCKS.filter(t => {
      if (t.status === 'maintenance') return false;
      const conflict = effHires.find(h => {
        if (h.truck !== t.id) return false;
        const hStart = new Date(h.start), hEnd = new Date(h.end);
        const rStart = new Date(form.startDate), rEnd = new Date(form.endDate);
        return rStart <= hEnd && rEnd >= hStart;
      });
      return !conflict;
    });
  };

  const getAvailableTrailers = () => {
    if (!form.startDate || !form.endDate) return TRAILERS;
    const effHires = getEffectiveHires().filter(h => h.status === 'active');
    return TRAILERS.filter(t => {
      if (t.status === 'maintenance') return false;
      const conflict = effHires.find(h => {
        if (h.trailer !== t.id) return false;
        const hStart = new Date(h.start), hEnd = new Date(h.end);
        const rStart = new Date(form.startDate), rEnd = new Date(form.endDate);
        return rStart <= hEnd && rEnd >= hStart;
      });
      return !conflict;
    });
  };

  const availTrucks = getAvailableTrucks();
  const availTrailers = getAvailableTrailers();
  const dur = calcDuration();
  const totalCost = calcCost();

  // Auto-fill rate when truck selected
  const handleTruckSelect = (truckId) => {
    set('truck', truckId);
    const cust = CUSTOMERS.find(c => c.id === form.customer);
    if (cust && cust.weekly_truck) set('weeklyTruck', cust.weekly_truck);
    else {
      const t = TRUCKS.find(t => t.id === truckId);
      set('weeklyTruck', t?.weekly_rate || 2650);
    }
  };

  const handleTrailerSelect = (trailerId) => {
    set('trailer', trailerId);
    const cust = CUSTOMERS.find(c => c.id === form.customer);
    if (cust && cust.weekly_trailer) set('weeklyTrailer', cust.weekly_trailer);
    else set('weeklyTrailer', 550);
  };

  const handleCustomerSelect = (custId) => {
    set('customer', custId);
    const cust = CUSTOMERS.find(c => c.id === custId);
    if (cust) {
      if (cust.weekly_truck) set('weeklyTruck', cust.weekly_truck);
      if (cust.weekly_trailer) set('weeklyTrailer', cust.weekly_trailer);
    }
  };

  const handleConfirm = () => {
    // Create new customer if needed
    let custId = form.customer;
    if (form.customerMode === 'new' && form.newCompany) {
      const newCust = createNewCustomer({
        company: form.newCompany, director: form.newDirector||'',
        contact: form.newContact||form.newDirector||'', phone: form.newPhone||'',
        email: form.newEmail||'', address: form.newAddress||'',
        weekly_truck: form.weeklyTruck, weekly_trailer: form.weeklyTrailer,
      });
      custId = newCust.id;
      set('customer', custId);
    }
    const id = 'H' + String(HIRES.length + 1).padStart(3, '0');
    const newHire = {
      id, customer: custId||form.customer, truck: form.truck,
      trailer: form.noTrailer ? '' : form.trailer,
      start: form.startDate, end: form.endDate,
      status: 'active', hireType: form.hireType,
      weekly_truck: form.weeklyTruck, weekly_trailer: form.noTrailer ? 0 : form.weeklyTrailer,
      mileage_rate: form.mileageRate, ruc_rate: form.rucRate,
      bond: form.bond, bond_paid: form.bondPaid,
      signed: form.signed, insurance_verified: form.insuranceVerified,
      checklist_done: form.checklistDone,
      invoiced_to: form.startDate, next_invoice: form.startDate,
      notes: form.notes,
    };
    HIRES.unshift(newHire);
    // Update truck status
    const truck = TRUCKS.find(t => t.id === form.truck);
    if (truck) { truck.status = 'on_hire'; truck.hirer = form.customer; }
    const trailer = TRAILERS.find(t => t.id === form.trailer);
    if (trailer && !form.noTrailer) { trailer.status = 'on_hire'; trailer.hirer = form.customer; }
    // Save override
    saveHireOverride(id, {status:'active', end: form.endDate, start: form.startDate, weekly_truck: form.weeklyTruck});
    setNewHireId(id);
    setConfirmed(true);
  };

  const canProceed = () => {
    if (step === 1) return form.startDate && form.endDate && new Date(form.endDate) > new Date(form.startDate);
    if (step === 2) return form.truck;
    if (step === 3) return form.customer || (form.customerMode==='new' && form.newCompany && form.newPhone);
    if (step === 4) return form.weeklyTruck > 0;
    return true;
  };

  const steps = ['Dates & Type', 'Select Units', 'Customer', 'Rates & Terms', 'Confirm'];

  if (confirmed) {
    const cust = CUSTOMERS.find(c => c.id === form.customer);
    const truck = TRUCKS.find(t => t.id === form.truck);
    const trailer = TRAILERS.find(t => t.id === form.trailer);
    return (
      <div className="modal-overlay">
        <div className="modal" style={{maxWidth:560, textAlign:'center'}}>
          <div style={{padding:'32px 24px'}}>
            <div style={{fontSize:56, marginBottom:16}}>✅</div>
            <div style={{fontSize:22, fontWeight:800, marginBottom:8, color:'var(--green)'}}>Booking Confirmed!</div>
            <div style={{fontSize:14, color:'var(--text2)', marginBottom:24}}>Hire agreement <strong style={{color:'var(--text)'}}>{newHireId}</strong> has been created successfully.</div>
            <div style={{background:'var(--bg3)', borderRadius:12, padding:'16px 20px', marginBottom:24, textAlign:'left'}}>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                {[
                  ['Customer', cust?.company],
                  ['Truck', truck ? truck.rego+' '+truck.make+' '+truck.model : '—'],
                  ['Trailer', trailer&&!form.noTrailer ? trailer.rego+' '+trailer.make : 'None'],
                  ['Start Date', fmt(form.startDate)],
                  ['End Date', fmt(form.endDate)],
                  ['Duration', dur.label],
                  ['Weekly Rate', fmtCur(form.weeklyTruck + (form.noTrailer?0:form.weeklyTrailer))+'/wk'],
                  ['Est. Total', fmtCur(totalCost)],
                ].map(([l,v])=>(
                  <div key={l} style={{padding:'8px 10px', background:'var(--bg4)', borderRadius:8}}>
                    <div style={{fontSize:10, color:'var(--text3)', textTransform:'uppercase', marginBottom:2}}>{l}</div>
                    <div style={{fontSize:13, fontWeight:700}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'center'}}>
              <button className="btn btn-ghost" onClick={onClose}>Close</button>
              <button className="btn btn-primary" onClick={()=>{onCreated();}}>
                <Icon name="check" size={14}/> View Hire Management
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:680}}>
        <div className="modal-header">
          <span className="modal-title" style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon name="plus" size={18} color="var(--red)"/> New Hire Agreement
          </span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>

        {/* Step indicator */}
        <div style={{display:'flex', padding:'0 24px', borderBottom:'1px solid var(--border)', background:'var(--bg3)'}}>
          {steps.map((s,i)=>(
            <div key={s} onClick={()=>i+1<step&&setStep(i+1)}
              style={{flex:1, padding:'12px 4px', textAlign:'center', fontSize:11, fontWeight:700,
                color: step===i+1?'var(--red)':i+1<step?'var(--green)':'var(--text3)',
                borderBottom: step===i+1?'2px solid var(--red)':i+1<step?'2px solid var(--green)':'2px solid transparent',
                cursor: i+1<step?'pointer':'default', transition:'all 0.2s'}}>
              <div style={{fontSize:16, marginBottom:2}}>{i+1<step?'✓':i+1}</div>
              <div style={{textTransform:'uppercase', letterSpacing:.5}}>{s}</div>
            </div>
          ))}
        </div>

        <div className="modal-body">

          {/* STEP 1: Dates & Hire Type */}
          {step===1&&(
            <div>
              <div style={{marginBottom:20}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>When is the hire?</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>Select hire start and end dates to see available units.</div>
              </div>
              <div className="form-row mb-4">
                <div className="form-group">
                  <label>Hire Start Date</label>
                  <input type="date" value={form.startDate} min={new Date().toISOString().slice(0,10)}
                    onChange={e=>{set('startDate',e.target.value); if(form.endDate&&e.target.value>=form.endDate) set('endDate','');}}/>
                </div>
                <div className="form-group">
                  <label>Hire End Date</label>
                  <input type="date" value={form.endDate} min={form.startDate||new Date().toISOString().slice(0,10)}
                    onChange={e=>set('endDate',e.target.value)}/>
                </div>
              </div>
              {dur.days>0&&(
                <div style={{padding:'12px 16px', background:'rgba(39,174,96,0.08)', border:'1px solid rgba(39,174,96,0.2)', borderRadius:8, marginBottom:20, fontSize:13}}>
                  <strong style={{color:'var(--green)'}}>Duration: {dur.label}</strong>
                </div>
              )}
              <div className="form-group mb-4">
                <label>Hire Type</label>
                <div style={{display:'flex', gap:10}}>
                  {[['daily','Daily Hire'],['weekly','Weekly Hire'],['monthly','Monthly Hire']].map(([v,l])=>(
                    <button key={v} className={`btn btn-sm ${form.hireType===v?'btn-primary':'btn-ghost'}`}
                      onClick={()=>set('hireType',v)}
                      style={{flex:1, justifyContent:'center'}}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{padding:'12px 14px', background:'var(--bg3)', borderRadius:8, fontSize:12, color:'var(--text2)'}}>
                <strong>Available units will be shown after selecting dates.</strong><br/>
                Units with conflicting bookings are automatically excluded.
              </div>
            </div>
          )}

          {/* STEP 2: Select Units */}
          {step===2&&(
            <div>
              <div style={{marginBottom:16}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Select Units</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>Showing units available for {fmt(form.startDate)} — {fmt(form.endDate)}</div>
              </div>

              {/* Trucks */}
              <div style={{marginBottom:20}}>
                <div style={{fontWeight:700, fontSize:13, marginBottom:10, display:'flex', alignItems:'center', gap:8}}>
                  Trucks <span style={{fontSize:11, color:'var(--green)', fontWeight:400}}>{availTrucks.length} available</span>
                </div>
                {availTrucks.length===0&&<div style={{padding:16, background:'var(--bg3)', borderRadius:8, color:'var(--text3)', fontSize:13, textAlign:'center'}}>No trucks available for these dates</div>}
                <div style={{display:'grid', gap:8}}>
                  {availTrucks.map(t=>(
                    <div key={t.id} onClick={()=>handleTruckSelect(t.id)}
                      style={{padding:'12px 16px', border:`2px solid ${form.truck===t.id?'var(--red)':'var(--border)'}`,
                        borderRadius:10, cursor:'pointer', background:form.truck===t.id?'rgba(217,43,43,0.06)':'var(--card)',
                        display:'flex', alignItems:'center', gap:14, transition:'all 0.15s'}}>
                      <div style={{width:20, height:20, borderRadius:'50%', border:`2px solid ${form.truck===t.id?'var(--red)':'var(--border2)'}`,
                        background:form.truck===t.id?'var(--red)':'transparent', flexShrink:0}}/>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:800, fontSize:14}}>{t.rego} <span style={{fontWeight:400, color:'var(--text2)', fontSize:12}}>— {t.make} {t.model} {t.year}</span></div>
                        <div style={{fontSize:11, color:'var(--text3)', marginTop:2}}>Odometer: {t.odometer.toLocaleString()} km · COF: {fmt(t.cof_expiry)} · {statusLabel(t.status)}</div>
                      </div>
                      {t.weekly_rate>0&&<div style={{fontSize:13, fontWeight:700, color:'var(--green)'}}>{fmtCur(t.weekly_rate)}/wk</div>}
                    </div>
                  ))}
                </div>
              </div>

              {/* Trailers */}
              <div>
                <div style={{fontWeight:700, fontSize:13, marginBottom:10, display:'flex', alignItems:'center', gap:8, justifyContent:'space-between'}}>
                  <span>Trailers <span style={{fontSize:11, color:'var(--green)', fontWeight:400}}>{availTrailers.length} available</span></span>
                  <label style={{display:'flex', alignItems:'center', gap:6, fontSize:12, cursor:'pointer', textTransform:'none', marginBottom:0, fontWeight:400}}>
                    <input type="checkbox" checked={form.noTrailer} onChange={e=>set('noTrailer',e.target.checked)} style={{width:'auto'}}/>
                    No trailer needed
                  </label>
                </div>
                {!form.noTrailer&&(
                  <div style={{display:'grid', gap:8}}>
                    {availTrailers.map(t=>(
                      <div key={t.id} onClick={()=>handleTrailerSelect(t.id)}
                        style={{padding:'12px 16px', border:`2px solid ${form.trailer===t.id?'var(--blue)':'var(--border)'}`,
                          borderRadius:10, cursor:'pointer', background:form.trailer===t.id?'rgba(41,128,185,0.06)':'var(--card)',
                          display:'flex', alignItems:'center', gap:14, transition:'all 0.15s'}}>
                        <div style={{width:20, height:20, borderRadius:'50%', border:`2px solid ${form.trailer===t.id?'var(--blue)':'var(--border2)'}`,
                          background:form.trailer===t.id?'var(--blue)':'transparent', flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:800, fontSize:14}}>{t.rego} <span style={{fontWeight:400, color:'var(--text2)', fontSize:12}}>— {t.make} {t.model}</span></div>
                          <div style={{fontSize:11, color:'var(--text3)', marginTop:2}}>COF: {fmt(t.cof_expiry)} · {statusLabel(t.status)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* STEP 3: Customer */}
          {step===3&&(
            <div>
              <div style={{marginBottom:16}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Customer Details</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>Select an existing customer or add a new one.</div>
              </div>

              {/* Toggle: existing vs new */}
              <div style={{display:'flex',gap:0,borderRadius:8,overflow:'hidden',border:'1px solid var(--border2)',marginBottom:16}}>
                {[['existing','Select Existing Customer'],['new','Add New Customer']].map(([v,l])=>(
                  <div key={v} style={{flex:1,padding:'10px',textAlign:'center',background:form.customerMode===v||(!form.customerMode&&v==='existing')?'var(--red)':'var(--bg3)',color:form.customerMode===v||(!form.customerMode&&v==='existing')?'#fff':'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}
                    onClick={()=>{set('customerMode',v); if(v==='new') set('customer','');}}>
                    {l}
                  </div>
                ))}
              </div>

              {/* Existing customer */}
              {(form.customerMode==='existing'||!form.customerMode)&&(
                <div>
                  <div className="form-group mb-3">
                    <label>Search & Select Customer</label>
                    <select value={form.customer} onChange={e=>handleCustomerSelect(e.target.value)}>
                      <option value="">Select customer…</option>
                      {getAllCustomers().sort((a,b)=>a.company.localeCompare(b.company)).map(c=>(
                        <option key={c.id} value={c.id}>{c.company}{c.director?' — '+c.director:''}{c.status!=='active'?' ('+c.status+')':''}</option>
                      ))}
                    </select>
                  </div>
                  {form.customer&&(()=>{
                    const c = getAllCustomers().find(x=>x.id===form.customer);
                    return c ? (
                      <div style={{padding:'12px 16px', background:'var(--bg3)', borderRadius:10, marginBottom:16}}>
                        <div style={{fontWeight:700, marginBottom:8, fontSize:14}}>{c.company}</div>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, fontSize:12}}>
                          {[['Director',c.director||'—'],['Contact',c.contact],['Phone',c.phone],['Email',c.email||'—'],['Address',c.address||'—'],['Credit Rating',c.credit_rating],['Payment Terms',c.payment_terms],['YTD Revenue',fmtCur(c.ytd_revenue||0)]].map(([l,v])=>(
                            <div key={l} style={{padding:'6px 8px',background:'var(--bg4)',borderRadius:6}}>
                              <div style={{fontSize:10,color:'var(--text3)',marginBottom:1}}>{l}</div>
                              <div style={{fontWeight:600,fontSize:12}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        {(c.outstanding||0)>0&&<div style={{marginTop:8, padding:'6px 10px', background:'rgba(217,43,43,0.1)', borderRadius:6, fontSize:12, color:'var(--red-light)'}}>⚠ Outstanding balance: {fmtCur(c.outstanding)}</div>}
                      </div>
                    ) : null;
                  })()}
                </div>
              )}

              {/* New customer */}
              {form.customerMode==='new'&&(
                <div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Company Name <span style={{color:'var(--red)'}}>*</span></label>
                      <input value={form.newCompany||''} onChange={e=>set('newCompany',e.target.value)} placeholder="e.g. Chardikala Limited"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Director Name</label>
                      <input value={form.newDirector||''} onChange={e=>set('newDirector',e.target.value)} placeholder="e.g. Gurpinder Singh"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Contact Person</label>
                      <input value={form.newContact||''} onChange={e=>set('newContact',e.target.value)} placeholder="Contact name"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Cellphone <span style={{color:'var(--red)'}}>*</span></label>
                      <input value={form.newPhone||''} onChange={e=>set('newPhone',e.target.value)} placeholder="e.g. 027 510 0233"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Email Address</label>
                      <input type="email" value={form.newEmail||''} onChange={e=>set('newEmail',e.target.value)} placeholder="email@company.co.nz"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Physical Address</label>
                      <input value={form.newAddress||''} onChange={e=>set('newAddress',e.target.value)} placeholder="e.g. 123 Main St, Auckland"/>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:'var(--text3)',background:'var(--bg3)',padding:'8px 12px',borderRadius:6}}>
                    The new customer will be saved to your customer database when the hire is confirmed.
                  </div>
                </div>
              )}

              <div className="form-group mt-3">
                <label>Notes / Special Conditions (optional)</label>
                <textarea value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Any special hire conditions, agreements, or notes…" rows={3}/>
              </div>
            </div>
          )}

          {/* STEP 4: Rates & Terms */}
          {step===4&&(()=>{
            const selTruck = TRUCKS.find(t=>t.id===form.truck);
            const selCust = getAllCustomers().find(c=>c.id===form.customer);
            const prevHire = HIRES.filter(h=>h.customer===form.customer&&h.truck===form.truck).sort((a,b)=>new Date(b.start)-new Date(a.start))[0];
            return (
            <div>
              <div style={{marginBottom:12}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Rates & Terms</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>All rates are editable for this booking — changes only apply to this hire agreement.</div>
              </div>

              {/* Smart suggestions bar */}
              {(selCust||selTruck||prevHire)&&(
                <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:12}}>
                  <div style={{fontWeight:700,marginBottom:8,color:'var(--text)',fontSize:13}}>💡 Suggested Rates</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {prevHire&&(
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:'var(--blue)',color:'var(--blue)'}}
                        onClick={()=>{set('weeklyTruck',prevHire.weekly_truck);set('weeklyTrailer',prevHire.weekly_trailer||0);set('mileageRate',prevHire.mileage_rate);set('rucRate',prevHire.ruc_rate);}}>
                        Use last hire rates ({fmtCur(prevHire.weekly_truck+prevHire.weekly_trailer)}/wk)
                      </button>
                    )}
                    {selCust&&selCust.weekly_truck>0&&(
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:'var(--green)',color:'var(--green)'}}
                        onClick={()=>{set('weeklyTruck',selCust.weekly_truck);set('weeklyTrailer',selCust.weekly_trailer||0);}}>
                        Use customer profile ({fmtCur(selCust.weekly_truck)}/wk)
                      </button>
                    )}
                    {selTruck&&selTruck.weekly_rate>0&&(
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:'var(--orange)',color:'var(--orange)'}}
                        onClick={()=>set('weeklyTruck',selTruck.weekly_rate)}>
                        Use truck standard rate ({fmtCur(selTruck.weekly_rate)}/wk)
                      </button>
                    )}
                  </div>
                  {prevHire&&<div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>Last hire: {fmt(prevHire.start)} — {fmt(prevHire.end)} · {truckRego(prevHire.truck)}</div>}
                </div>
              )}

              {/* Hire type pricing selector */}
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--text3)',marginBottom:8,display:'block'}}>Pricing Structure</label>
                <div style={{display:'flex',gap:8}}>
                  {[['daily','Daily'],['weekly','Weekly'],['monthly','Monthly'],['lease','Lease/Contract']].map(([v,l])=>(
                    <button key={v} className={`btn btn-sm ${form.hireType===v?'btn-primary':'btn-ghost'}`}
                      style={{flex:1,justifyContent:'center',fontSize:12}}
                      onClick={()=>{set('hireType',v);
                        if(v==='daily'&&selCust) { set('weeklyTruck',(selCust.weekly_truck||0)/7*1); }
                        if(v==='monthly'&&selCust) { set('weeklyTruck',(selCust.weekly_truck||0)*4); }
                      }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <div className="form-group" style={{marginBottom:0}}>
                  <label style={{display:'flex',justifyContent:'space-between'}}>
                    <span>{form.hireType==='daily'?'Daily':'Weekly'} Truck Rate (NZD) <span style={{color:'var(--red)'}}>*</span></span>
                    {selTruck&&<span style={{color:'var(--text3)',fontWeight:400,fontSize:10}}>{selTruck.rego}</span>}
                  </label>
                  <input type="number" step="0.01" value={form.weeklyTruck} onChange={e=>set('weeklyTruck',parseFloat(e.target.value)||0)}
                    style={{borderColor:form.weeklyTruck>0?'var(--green)':'var(--red)'}}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>
                    {form.hireType==='daily'&&form.weeklyTruck>0&&`≈ ${fmtCur(form.weeklyTruck*7)}/week`}
                    {form.hireType==='monthly'&&form.weeklyTruck>0&&`≈ ${fmtCur(form.weeklyTruck/4)}/week`}
                    {form.hireType==='weekly'&&form.weeklyTruck>0&&`≈ ${fmtCur(form.weeklyTruck/7)}/day`}
                  </div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label>{form.hireType==='daily'?'Daily':'Weekly'} Trailer Rate (NZD)</label>
                  <input type="number" step="0.01" value={form.weeklyTrailer} onChange={e=>set('weeklyTrailer',parseFloat(e.target.value)||0)} disabled={form.noTrailer}
                    style={{opacity:form.noTrailer?0.5:1}}/>
                  {form.noTrailer&&<div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>No trailer selected</div>}
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label style={{display:'flex',justifyContent:'space-between'}}>
                    <span>Mileage Rate ($/km)</span>
                    <span style={{color:'var(--text3)',fontWeight:400,fontSize:10}}>charged to hirer</span>
                  </label>
                  <input type="number" step="0.001" value={form.mileageRate} onChange={e=>set('mileageRate',parseFloat(e.target.value)||0)}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>e.g. 0.18 = 18 cents/km</div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label style={{display:'flex',justifyContent:'space-between'}}>
                    <span>RUC Rate ($/km)</span>
                    <span style={{color:'var(--text3)',fontWeight:400,fontSize:10}}>road user charges</span>
                  </label>
                  <input type="number" step="0.001" value={form.rucRate} onChange={e=>set('rucRate',parseFloat(e.target.value)||0)}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>e.g. 0.062 = standard RUC</div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label>Bond Amount (NZD)</label>
                  <input type="number" value={form.bond} onChange={e=>set('bond',parseFloat(e.target.value)||0)}/>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label>Maintenance Charge ($/km)</label>
                  <input type="number" step="0.001" value={form.maintRate||0} onChange={e=>set('maintRate',parseFloat(e.target.value)||0)}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>Optional — leave 0 if not applicable</div>
                </div>
              </div>

              {/* Live cost summary */}
              <div style={{padding:'12px 16px', background:'rgba(39,174,96,0.08)', border:'1px solid rgba(39,174,96,0.2)', borderRadius:8, marginBottom:16}}>
                <div style={{fontWeight:700, color:'var(--green)', marginBottom:8, fontSize:13}}>Estimated Cost Summary</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12,marginBottom:8}}>
                  <div><span style={{color:'var(--text3)'}}>Truck hire:</span> <strong>{fmtCur(form.weeklyTruck)}/{form.hireType==='daily'?'day':'wk'}</strong></div>
                  {!form.noTrailer&&<div><span style={{color:'var(--text3)'}}>Trailer hire:</span> <strong>{fmtCur(form.weeklyTrailer)}/{form.hireType==='daily'?'day':'wk'}</strong></div>}
                  <div><span style={{color:'var(--text3)'}}>Mileage rate:</span> <strong>${form.mileageRate}/km</strong></div>
                  <div><span style={{color:'var(--text3)'}}>RUC rate:</span> <strong>${form.rucRate}/km</strong></div>
                  <div><span style={{color:'var(--text3)'}}>Duration:</span> <strong>{dur.label}</strong></div>
                  <div><span style={{color:'var(--text3)'}}>Bond:</span> <strong>{fmtCur(form.bond)}</strong></div>
                </div>
                <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid rgba(39,174,96,0.2)', paddingTop:8}}>
                  <span style={{fontWeight:700}}>Est. hire total (excl. mileage/RUC):</span>
                  <strong style={{fontSize:16, color:'var(--green)'}}>{fmtCur(totalCost)}</strong>
                </div>
              </div>

              <div style={{marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',color:'var(--text3)',marginBottom:8,letterSpacing:.5}}>
                  Pre-Hire Checklist
                  {(!form.bondPaid||!form.signed||!form.insuranceVerified||!form.checklistDone)&&
                    <span style={{marginLeft:8,color:'var(--orange)',fontWeight:700,textTransform:'none',fontSize:11}}>
                      ⚠ {[!form.bondPaid,!form.signed,!form.insuranceVerified,!form.checklistDone].filter(Boolean).length} item(s) pending
                    </span>
                  }
                  {(form.bondPaid&&form.signed&&form.insuranceVerified&&form.checklistDone)&&
                    <span style={{marginLeft:8,color:'var(--green)',fontWeight:700,textTransform:'none',fontSize:11}}>✓ All complete</span>
                  }
                </div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
                  {[
                    ['bondPaid','💰 Bond payment received','Collect bond before handover'],
                    ['signed','✍ Digital signature obtained','Get hire agreement signed'],
                    ['insuranceVerified','🛡 Insurance verified','Confirm hirer has valid insurance'],
                    ['checklistDone','📋 Pre-handover checklist done','Complete vehicle condition report'],
                  ].map(([k,l,hint])=>(
                    <label key={k} onClick={()=>set(k,!form[k])}
                      style={{display:'flex',alignItems:'flex-start',gap:10,fontSize:13,textTransform:'none',
                        marginBottom:0,cursor:'pointer',padding:'10px 12px',borderRadius:8,
                        background:form[k]?'rgba(39,174,96,0.08)':'rgba(230,126,34,0.06)',
                        border:`1px solid ${form[k]?'rgba(39,174,96,0.3)':'rgba(230,126,34,0.3)'}`,
                        transition:'all 0.15s'}}>
                      <div style={{width:20,height:20,borderRadius:4,flexShrink:0,marginTop:1,
                        background:form[k]?'var(--green)':'transparent',
                        border:`2px solid ${form[k]?'var(--green)':'var(--orange)'}`,
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {form[k]&&<Icon name="check" size={12} color="#fff"/>}
                      </div>
                      <div>
                        <div style={{fontWeight:600,color:form[k]?'var(--text)':'var(--text2)'}}>{l}</div>
                        {!form[k]&&<div style={{fontSize:11,color:'var(--orange)',marginTop:2}}>{hint}</div>}
                      </div>
                    </label>
                  ))}
                </div>
                {(!form.bondPaid||!form.signed||!form.insuranceVerified||!form.checklistDone)&&(
                  <div style={{marginTop:10,padding:'8px 12px',background:'rgba(230,126,34,0.08)',border:'1px solid rgba(230,126,34,0.25)',borderRadius:8,fontSize:12,color:'var(--orange)'}}>
                    ⚠ Some checklist items are not completed. You can still proceed — items can be completed at time of handover.
                  </div>
                )}
              </div>
            </div>
            );
          })()}

          {/* STEP 5: Confirm */}
          {step===5&&(()=>{
            const cust = CUSTOMERS.find(c=>c.id===form.customer);
            const truck = TRUCKS.find(t=>t.id===form.truck);
            const trailer = TRAILERS.find(t=>t.id===form.trailer);
            return (
              <div>
                <div style={{marginBottom:16}}>
                  <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Review & Confirm</div>
                  <div style={{fontSize:12, color:'var(--text2)'}}>Review all details before creating the hire agreement.</div>
                </div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20}}>
                  {[
                    ['Customer', cust?.company||'—'],
                    ['Hire Type', form.hireType.charAt(0).toUpperCase()+form.hireType.slice(1)],
                    ['Start Date', fmt(form.startDate)],
                    ['End Date', fmt(form.endDate)],
                    ['Duration', dur.label],
                    ['Truck', truck?`${truck.rego} ${truck.make} ${truck.model}`:'—'],
                    ['Trailer', trailer&&!form.noTrailer?`${trailer.rego} ${trailer.make}`:'None'],
                    ['Weekly Rate', fmtCur(form.weeklyTruck+(form.noTrailer?0:form.weeklyTrailer))+'/wk'],
                    ['Mileage Rate', '$'+form.mileageRate+'/km'],
                    ['RUC Rate', '$'+form.rucRate+'/km'],
                    ['Bond', fmtCur(form.bond)],
                    ['Est. Total', fmtCur(totalCost)],
                  ].map(([l,v])=>(
                    <div key={l} style={{padding:'10px 12px', background:'var(--bg3)', borderRadius:8}}>
                      <div style={{fontSize:10, color:'var(--text3)', textTransform:'uppercase', marginBottom:3}}>{l}</div>
                      <div style={{fontSize:13, fontWeight:700}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--text3)',marginBottom:8}}>Pre-Hire Checklist</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                    {[['bondPaid','Bond Paid'],['signed','Agreement Signed'],['insuranceVerified','Insurance Verified'],['checklistDone','Handover Checklist Done']].map(([k,l])=>(
                      <div key={k} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,
                        background:form[k]?'rgba(39,174,96,0.08)':'rgba(230,126,34,0.06)',

    </div>
  );
};

const fillTemplate = (template, vars) => {
  let text = template;
  Object.entries(vars).forEach(([k,v])=>{ text = text.replace(new RegExp('{{'+k+'}}','g'), v||''); });
  return text;
};

const logMessage = (entry) => {
  const log = loadCommLog();
  log.unshift({...entry, id:'MSG'+Date.now(), sentAt: new Date().toISOString()});
  if (log.length > 500) log.pop();
  saveCommLog(log);
  return log;
};

const SMS_PROXY = 'https://xero-proxy.ssrentalsnz.workers.dev';

// Format NZ phone number to E.164 international format
const formatNZPhone = (phone) => {
  if (!phone) return '';
  let p = phone.replace(/[\s\-().]/g, ''); // remove spaces, dashes, brackets
  if (p.startsWith('+64')) return p;        // already international
  if (p.startsWith('64')) return '+' + p;   // missing plus
  if (p.startsWith('0')) return '+64' + p.slice(1); // local format 0xx -> +64xx
  return '+64' + p;                          // no prefix at all
};

// Send SMS via ClickSend through Cloudflare Worker
const sendSMSReal = async (phone, message) => {
  try {
    const res = await fetch(SMS_PROXY + '/sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: phone, message, from_name: 'SS Rentals' })
    });
    const data = await res.json();
    const msgStatus = data?.data?.messages?.[0]?.status;
    if (msgStatus === 'SUCCESS' || res.ok) return { status: 'sent', messageId: data?.data?.messages?.[0]?.message_id };
    return { status: 'failed', error: data?.data?.messages?.[0]?.status || 'Unknown error' };
  } catch(e) { return { status: 'failed', error: e.message }; }
};

// Send bulk SMS via ClickSend
const sendBulkSMSReal = async (messages) => {
  try {
    // Format all phone numbers before sending
    const formatted = messages.map(m => ({ ...m, to: formatNZPhone(m.to) }));
    console.log('Sending SMS to:', formatted.map(m=>m.to));
    const res = await fetch(SMS_PROXY + '/sms/bulk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: formatted })
    });
    const data = await res.json();
    console.log('ClickSend response:', JSON.stringify(data));
    return data?.data?.messages || [];
  } catch(e) { console.error('SMS error:', e); return []; }
};

// Fetch SMS delivery history from ClickSend
const fetchSMSHistory = async () => {
  try {
    const res = await fetch(SMS_PROXY + '/sms/history');
    const data = await res.json();
    return data?.data?.data || [];
  } catch(e) { return []; }
};

// Email via mailto (no email API yet)
const sendEmail = (email, subject, body) => {
  const url = 'mailto:'+email+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  window.open(url, '_blank');
  return {status:'opened', channel:'email'};
};

const CommunicationsPage = () => {
  const [tab,setTab]=useState('compose');
  const [commLog,setCommLog]=useState(()=>loadCommLog());
  const [templates,setTemplates]=useState(()=>loadTemplates());
  const [schedule,setSchedule]=useState(()=>loadSchedule());
  const [selectedCustomers,setSelectedCustomers]=useState([]);
  const [selectedTemplate,setSelectedTemplate]=useState('t001');
  const [channel,setChannel]=useState('both');
  const [customMsg,setCustomMsg]=useState({subject:'',sms:'',email:''});
  const [useCustom,setUseCustom]=useState(false);
  const [sending,setSending]=useState(false);
  const [sendResult,setSendResult]=useState(null);
  const [editingTemplate,setEditingTemplate]=useState(null);
  const [filterStatus,setFilterStatus]=useState('overdue');

  // Get customers with outstanding balances
  const overdueCustomers = CUSTOMERS.filter(c=>c.status==='active'&&INVOICES.some(i=>i.customer===c.id&&i.status==='overdue'));
  const activeCustomers = CUSTOMERS.filter(c=>c.status==='active');
  const displayCustomers = filterStatus==='overdue'?overdueCustomers:filterStatus==='active'?activeCustomers:CUSTOMERS;

  const getCustomerInvoices = (custId) => INVOICES.filter(i=>i.customer===custId&&(i.status==='overdue'||i.status==='draft'));
  const getCustomerOverdue = (custId) => INVOICES.filter(i=>i.customer===custId&&i.status==='overdue').reduce((a,i)=>a+i.total,0);

  const buildVars = (cust) => {
    const invs = getCustomerInvoices(cust.id);
    const overdue = invs.filter(i=>i.status==='overdue');
    const latest = overdue[0]||invs[0];
    const hire = getEffectiveHires().find(h=>h.customer===cust.id&&h.status==='active');
    const truck = hire ? TRUCKS.find(t=>t.id===hire.truck) : null;
    return {
      company: cust.company,
      contact: cust.contact.split(' ')[0],
      phone: cust.phone,
      email: cust.email,
      invoice_id: latest?.id||'—',
      amount: latest?fmtCur(latest.total):'—',
      due_date: latest?fmt(latest.due):'—',
      days_overdue: latest?Math.max(0,Math.abs(daysDiff(latest.due)))+'':'0',
      period: latest?.period||'—',
      total_outstanding: fmtCur(getCustomerOverdue(cust.id)),
      vehicle: truck?`${truck.rego} ${truck.make} ${truck.model}`:'—',
      end_date: hire?fmt(hire.end):'—',
    };
  };

  const tpl = templates.find(t=>t.id===selectedTemplate)||templates[0];

  const handleSelectAll = () => {
    if (selectedCustomers.length===displayCustomers.length) setSelectedCustomers([]);
    else setSelectedCustomers(displayCustomers.map(c=>c.id));
  };

  const handleSend = async () => {
    if (selectedCustomers.length===0) { alert('Select at least one customer.'); return; }
    setSending(true); setSendResult(null);
    const msg = useCustom ? customMsg : tpl;

    // Build all messages first
    const allMessages = selectedCustomers.map(custId => {
      const cust = CUSTOMERS.find(c=>c.id===custId);
      if (!cust) return null;
      const vars = buildVars(cust);
      return {
        custId, cust,
        smsText: fillTemplate(msg.sms||'', vars),
        emailSubj: fillTemplate(msg.subject||'', vars),
        emailBody: fillTemplate(msg.email||'', vars),
      };
    }).filter(Boolean);

    const results = [];

    // Send SMS via ClickSend API (bulk for efficiency)
    if (channel==='sms'||channel==='both') {
      const smsMessages = allMessages.filter(m=>m.cust.phone).map(m=>({ to: m.cust.phone, body: m.smsText }));
      if (smsMessages.length > 0) {
        setSendResult({sending:true, msg:'Sending '+smsMessages.length+' SMS via ClickSend…'});
        const bulkResults = await sendBulkSMSReal(smsMessages);
        allMessages.forEach((m,i) => {
          const r = bulkResults[i];
          console.log('Result for', m.cust.company, ':', JSON.stringify(r));
          // Kudosity: success = no error OR error.code === 0
          const kudoSuccess = r && (r.error === null || r.error === undefined || r.error?.code === 0 || r.status === 'SUCCESS');
          const status = kudoSuccess ? 'sent' : m.cust.phone ? 'failed' : 'no_phone';
          results.push({
            custId:m.custId, customerName:m.cust.company, channel:'sms',
            templateId:useCustom?'custom':selectedTemplate,
            templateName:useCustom?'Custom Message':tpl.name,
            subject:m.emailSubj, preview:m.smsText.slice(0,80)+'…',
            status, phone:m.cust.phone, messageId:r?.message_id,
            deliveryStatus:r?.status,
          });
        });
        allMessages.filter(m=>!m.cust.phone).forEach(m=>{
          results.push({custId:m.custId,customerName:m.cust.company,channel:'sms',status:'no_phone',phone:'',preview:m.smsText.slice(0,60)+'…',templateName:useCustom?'Custom':tpl.name});
        });
      }
    }

    // Send email via mailto
    if (channel==='email'||channel==='both') {
      for (const m of allMessages) {
        if (m.cust.email) {
          sendEmail(m.cust.email, m.emailSubj, m.emailBody);
          if (!results.find(r=>r.custId===m.custId&&r.channel==='email')) {
            results.push({custId:m.custId,customerName:m.cust.company,channel:'email',templateName:useCustom?'Custom':tpl.name,subject:m.emailSubj,preview:m.emailSubj,status:'opened',email:m.cust.email});
          }
        }
      }
    }

    // Log all
    results.forEach(r=>logMessage(r));
    setCommLog(loadCommLog());
    const sent = results.filter(r=>r.status==='sent'||r.status==='opened').length;
    const failed = results.filter(r=>r.status==='failed').length;
    const noContact = results.filter(r=>r.status==='no_phone'||r.status==='no_email').length;
    setSendResult({sent, failed, noContact, total:results.length});
    setSending(false);
    setSelectedCustomers([]);
  };

  const StatusBadge = ({status}) => {
    const map = {sent:{l:'Sent',c:'badge-green'},opened:{l:'Opened',c:'badge-blue'},failed:{l:'Failed',c:'badge-red'},no_phone:{l:'No Phone',c:'badge-gray'},no_email:{l:'No Email',c:'badge-gray'}};
    const s = map[status]||{l:status,c:'badge-gray'};
    return <span className={`badge ${s.c}`}>{s.l}</span>;

  return (
    <div>
      <div className="tabs mb-4">
        {['compose','log','delivery','templates','schedule'].map(t=>(
          <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>

          </button>

      </div>

      {/* ── COMPOSE TAB ── */}
      {tab==='compose'&&(
        <div className="grid" style={{gridTemplateColumns:'1fr 1.4fr',gap:16,alignItems:'start'}}>
          {/* Left: Customer selector */}

            <div className="card" style={{padding:0,overflow:'hidden'}}>
              <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>

                <div style={{marginLeft:'auto',display:'flex',gap:6}}>
                  <select style={{fontSize:12,padding:'3px 8px'}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
                    <option value="overdue">Overdue Only ({overdueCustomers.length})</option>

/* ─── DOCUMENT GENERATION ENGINE ────────────────── */
const DOC_LOG_KEY = 'ss_rentals_doc_log';
const loadDocLog = () => { try { return JSON.parse(localStorage.getItem(DOC_LOG_KEY)||'[]'); } catch { return []; } };
const saveDocLog = log => localStorage.setItem(DOC_LOG_KEY, JSON.stringify(log));

const generateDocData = (hire) => {
  const cust = getAllCustomers().find(c=>c.id===hire.customer) || {};
  const truck = TRUCKS.find(t=>t.id===hire.truck) || {};
  const trailer = TRAILERS.find(t=>t.id===hire.trailer);
  const now = new Date();
  const day = now.getDate();
  const suffix = day===1?'st':day===2?'nd':day===3?'rd':'th';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const agreementDate = `${day}${suffix} ${months[now.getMonth()]} ${now.getFullYear()}`;
  const fmtDoc = d => { if(!d) return ''; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; };

  return {
    hireId: hire.id,
    agreementDate,
    hirerCompany: cust.company || '',
    hirerContact: cust.contact || '',
    hirerDirector: cust.director || cust.contact || '',
    startDate: fmtDoc(hire.start),
    endDate: fmtDoc(hire.end),
    weeklyRate: (hire.weekly_truck||0).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}),
    weeklyTrailer: (hire.weekly_trailer||0).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}),
    mileageRate: (hire.mileage_rate||0.18).toString(),
    rucRate: (hire.ruc_rate||0.062).toString(),
    bond: (hire.bond||2500).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2}),
    truckMake: truck.make||'',
    truckModel: truck.model||'',
    truckYear: (truck.year||'').toString(),
    truckRego: truck.rego||'',
    truckVIN: truck.vin||'',
    truckDesc: truck.description||`${truck.make||''} ${truck.model||''}`,
    truckColour: truck.colour||'White',
    truckCOF: fmtDoc(truck.cof_expiry),
    truckRego2: fmtDoc(truck.rego_expiry),
    trailerMake: trailer?.make||'',
    trailerModel: trailer?.model||'',
    trailerYear: (trailer?.year||'').toString(),
    trailerRego: trailer?.rego||'',
    trailerDesc: trailer?`${trailer.make||''} ${trailer.model||''}`:'',
    trailerColour: trailer?.colour||'White',
    trailerCOF: fmtDoc(trailer?.cof_expiry),
    trailerRegoExp: fmtDoc(trailer?.rego_expiry),
  };
};

/* ─── HIRE AGREEMENT GENERATOR MODAL ─────────────────── */
const HireDocModal = ({hire, onClose}) => {
  const [generating, setGenerating] = useState(false);
  const [generated, setGenerated] = useState(false);
  const [docData, setDocData] = useState(() => generateDocData(hire));
  const [editMode, setEditMode] = useState(false);
  const cust = getAllCustomers().find(c=>c.id===hire.customer);
  const truck = TRUCKS.find(t=>t.id===hire.truck);
  const trailer = TRAILERS.find(t=>t.id===hire.trailer);

  const sv = (k,v) => setDocData(p=>({...p,[k]:v}));

  const handleGenerate = async () => {
    setGenerating(true);
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 100,
          messages: [{ role: 'user', content: 'Reply with only: {"status":"ok"}' }]
        })
      });
      // Documents are generated client-side using the in-browser approach
      // Log the document generation
      const log = loadDocLog();
      log.unshift({ id: 'DOC'+Date.now(), hireId: hire.id, customer: cust?.company, type: 'both', generatedAt: new Date().toISOString(), data: docData });
      saveDocLog(log);
      setGenerated(true);
    } catch(e) {}
    setGenerating(false);
  };

  const downloadHTML = (type) => {
    const d = docData;
    let html = '';
    if (type === 'schedule') {
      html = generateScheduleHTML(d);
    } else {
      html = generateAgreementHTML(d);
    }
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${type==='schedule'?'Schedule':'Agreement'}_${d.hireId}_${d.hirerCompany.replace(/\s+/g,'_')}.html`;
    a.click();
    URL.revokeObjectURL(url);
    // Log download
    const log = loadDocLog();
    log.unshift({ id: 'DOC'+Date.now(), hireId: hire.id, customer: cust?.company, type, generatedAt: new Date().toISOString(), downloaded: true });
    saveDocLog(log);
  };

  const copyForDocuSign = () => {
    const d = docData;
    const text = `Hire Agreement ${d.hireId}\nCustomer: ${d.hirerCompany}\nContact: ${d.hirerContact}\nTruck: ${d.truckRego} ${d.truckMake} ${d.truckModel}\n${d.trailerRego?'Trailer: '+d.trailerRego+'\n':''}Start: ${d.startDate}\nEnd: ${d.endDate}\nWeekly Rate: $${d.weeklyRate}\nRUC: $${d.rucRate}/km\nMileage: $${d.mileageRate}/km\nBond: $${d.bond}`;
    navigator.clipboard.writeText(text).then(()=>alert('Hire details copied — paste into DocuSign template'));
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:720}}>
        <div className="modal-header">
          <span className="modal-title"><Icon name="template" size={18}/> Generate Hire Documents — {hire.id}</span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">
          {/* Summary card */}
          <div style={{background:'var(--bg3)',borderRadius:10,padding:'14px 16px',marginBottom:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
            {[
              ['Customer', cust?.company||'—'],
              ['Truck', truck?`${truck.rego} ${truck.make} ${truck.model}`:'—'],
              ['Trailer', trailer?`${trailer.rego} ${trailer.make}`:'None'],
              ['Period', `${docData.startDate} — ${docData.endDate}`],
              ['Weekly Rate', `$${docData.weeklyRate}/wk`],
              ['Bond', `$${docData.bond}`],
            ].map(([l,v])=>(
              <div key={l} style={{padding:'6px 10px',background:'var(--bg4)',borderRadius:6}}>
                <div style={{fontSize:10,color:'var(--text3)',marginBottom:1}}>{l}</div>
                <div style={{fontWeight:700}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Edit toggle */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13}}>Document Details</div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setEditMode(e=>!e)}>
              <Icon name="edit" size={13}/> {editMode?'Done Editing':'Edit Fields'}
            </button>
          </div>

          {editMode ? (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {[
                ['agreementDate','Agreement Date'],['hirerCompany','Hirer Company'],['hirerContact','Hirer Contact'],
                ['startDate','Start Date (dd/mm/yyyy)'],['endDate','End Date (dd/mm/yyyy)'],
                ['weeklyRate','Weekly Rate ($)'],['mileageRate','Mileage Rate ($/km)'],
                ['rucRate','RUC Rate ($/km)'],['bond','Bond Amount ($)'],
                ['truckRego','Truck Rego'],['truckMake','Truck Make'],['truckModel','Truck Model'],
                ['truckYear','Truck Year'],['truckCOF','Truck COF Expiry'],['truckRego2','Truck Rego Expiry'],
                ['trailerRego','Trailer Rego (blank if none)'],['trailerMake','Trailer Make'],['trailerCOF','Trailer COF Expiry'],
              ].map(([k,l])=>(
                <div key={k} className="form-group" style={{marginBottom:0}}>
                  <label style={{fontSize:11}}>{l}</label>
                  <input value={docData[k]||''} onChange={e=>sv(k,e.target.value)} style={{fontSize:12,padding:'6px 8px'}}/>

            </button>
            <button className="btn btn-primary" onClick={()=>downloadHTML('agreement')} style={{justifyContent:'center'}}>
              <Icon name="download" size={14}/> Download Agreement

          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button className="btn btn-ghost" onClick={copyForDocuSign} style={{justifyContent:'center',borderColor:'#F9A825',color:'#F9A825'}}>
              📋 Copy for DocuSign

<h1>TRUCK AND TRAILER SUPPLY AGREEMENT</h1>
<hr style="border:2px solid #1a1a2e;margin-bottom:16px">
<p class="intro"><strong>THIS AGREEMENT</strong> is made on the <strong>${d.agreementDate}</strong></p>
<div class="parties">
<p><strong>BETWEEN:</strong></p>
<p><strong>SS Rentals</strong> (the "<strong>OWNER</strong>") <strong>AND:</strong></p>
<br>
<p><strong>${d.hirerCompany}</strong> (the "<strong>HIRER</strong>")</p>
</div>
<hr style="border:1px solid #1a1a2e">

<h2>1. Agreement to Supply Truck &amp; Trailer</h2>
<p>SS Rentals as a truck rental and lease company hire out trucks and trailers. This Agreement sets out the terms and conditions under which SS Rentals shall provide such a hire, maintenance and repair service. The specification and configuration of the Truck is set out in the Schedule(s) to this Agreement as agreed between the parties from time to time.</p>

<h2>2. Ownership</h2>
<p><strong>2.1</strong> The HIRER acknowledges that title to the Truck and Trailer remains with the OWNER at all times.</p>
<p><strong>2.2</strong> Hire of the equipment will create a security interest in the Truck and Trailer.</p>
<p><strong>2.3</strong> On request of the OWNER, the HIRER shall promptly execute any documents required to ensure the security interest is perfected.</p>
<p><strong>2.4</strong> The HIRER will pay all fees and expenses for filing any financing statements.</p>
<p><strong>2.5</strong> The HIRER waives its rights under sections 114(1)(a), 116, 117, 119, 120(2), 121, 125, 129, 131, 132, 133, 134 and 148 of the PPSA.</p>

<h2>3. Hirer's Responsibility</h2>
<p><strong>3.1</strong> The HIRER shall ensure the Truck and Trailer are: operated only by qualified, licensed personnel; operated per the OWNER's instructions and manufacturer's specification; and used only at the Operating Location specified in the Schedule(s).</p>
<p><strong>3.2</strong> The HIRER shall insure the Truck and Trailer for full replacement value, with OWNER noted as an interested party.</p>
<p><strong>3.3</strong> A copy of the insurance policy shall be provided before the Commencement Date.</p>
<p><strong>3.4</strong> Daily checks must be performed by the HIRER, including tyres and lights.</p>
<p><strong>3.5</strong> The HIRER is responsible for punctures, tyre repairs, and excessive wear.</p>
<p><strong>3.6</strong> The HIRER must purchase Road User Charges during the Agreement term.</p>
<p><strong>3.7</strong> All required certificates (registration, RUC, COF) must be displayed.</p>
<p><strong>3.8</strong> Defects must be reported immediately, and use suspended if unsafe.</p>
<p><strong>3.9</strong> The OWNER has the right to access the Truck and Trailer for maintenance.</p>
<p><strong>3.10</strong> The HIRER acknowledges the equipment is of merchantable quality at delivery.</p>

<h2>4. Rental Charges</h2>
<p><strong>4.1</strong> Charges are set out in the Schedule(s).</p>
<p><strong>4.2</strong> "Payment will be deducted automatically from nominated account via direct debit after sending the invoice."</p>
<p><strong>4.3</strong> An additional $0.50 + GST per km applies for weekly use over 2,708 km.</p>
<p><strong>4.4</strong> Repair costs for damage beyond fair wear and tear are the HIRER's responsibility.</p>
<p><strong>4.5</strong> <strong>Direct Debit Failure Fee:</strong> If any scheduled direct debit payment is declined or dishonoured, SS Rentals reserves the right to charge an additional fee equal to 5% of the total invoice amount.</p>

<h2>5. Pickup and Delivery</h2>
<p><strong>5.1</strong> The Hirer will be picking up unit from Owner's premises before Commencement Date.</p>
<p><strong>5.2</strong> The HIRER shall return it to the OWNER's premises unless otherwise agreed.</p>

<h2>6. Owner's Responsibility</h2>
<p><strong>6.1</strong> The OWNER will maintain the Truck and Trailer unless otherwise agreed.</p>
<p><strong>6.2</strong> OWNER shall provide 500 kms of tare RUC credit at start; adjustments made at return.</p>
<p><strong>6.3</strong> Pre- and post-hire condition photographs will be signed by both parties.</p>

<h2>7. Maintenance, Repair, Liability, Insurance, and Fines Terms</h2>
<p><strong>7.1 General Maintenance:</strong> SS Rentals will deliver the truck in good working condition, roadworthy, and compliant with all applicable safety and regulatory standards.</p>
<p><strong>7.2 Hirer's Duty of Care:</strong> The Hirer agrees to operate the truck safely, in accordance with all traffic laws and manufacturer guidelines.</p>
<p><strong>7.3 Minor Repairs:</strong> The Hirer may undertake minor repairs (e.g., replacing bulbs, wipers, or topping up fluids) not exceeding $100 without prior approval.</p>
<p><strong>7.4 Major Repairs:</strong> The Hirer shall not authorise or undertake major repairs without prior written consent from SS Rentals.</p>
<p><strong>7.5 Damage Due to Negligence:</strong> Repairs required due to the Hirer's negligence, misuse, overloading, or violation of laws shall be the sole responsibility of the Hirer.</p>
<p><strong>7.6 Tires and Wheels:</strong> Normal tire wear is the SS Rentals responsibility. All blown-out and puncture repairs are on the Hirer's cost.</p>
<p><strong>7.7 Accident Repairs:</strong> In the event of an accident, the Hirer must immediately notify SS Rentals and comply with all reporting and insurance procedures.</p>

<h2>8. Liability and Insurance</h2>
<p><strong>8.1</strong> The truck will be covered by the Rental Company's insurance policy during the rental period, subject to the terms, conditions, and exclusions of such policy.</p>
<p><strong>8.2</strong> In the event of any damage or loss, the Hirer will be solely responsible for payment of the applicable insurance policy excess/deductible.</p>
<p><strong>8.3</strong> The Hirer may be required to provide proof of valid motor vehicle liability insurance prior to taking possession of the truck.</p>
<p><strong>8.4</strong> The Hirer shall be responsible for any deductibles under the Rental Company's insurance policy.</p>
<p><strong>8.5</strong> The Hirer agrees to indemnify and hold harmless the Rental Company from and against all claims, liabilities, losses, or expenses arising out of the Hirer's operation.</p>
<p><strong>8.6</strong> In case of an accident involving third parties, the Hirer shall promptly provide all necessary information to the Rental Company.</p>

<h2>9. Fines, Penalties, and Violations</h2>
<p>The Hirer will be solely responsible for the payment of all fines, penalties, and charges incurred during the rental period, including speeding tickets, overweight violations, parking fines, toll violations, and any other traffic or regulatory infractions.</p>

<h2>10. Bond Money</h2>
<p>The Hirer will pay a security bond in the amount of <strong>$${d.bond}</strong> prior to taking possession of the truck. The bond shall be held by SS Rentals as security against damage, loss, unpaid fines, cleaning charges, or any other costs incurred under this Agreement.</p>

<h2>11. Truck Cleanliness and Wash</h2>
<p>The Hirer shall be responsible for maintaining the truck in a clean and hygienic condition throughout the rental period. The truck must be returned washed, free of rubbish, dirt, stains, or debris.</p>
<p>The hirer must return the truck with the same level of Diesel and AdBlue as provided at commencement. If returned with lower levels, SS Rentals will refill and charge the full refill cost plus an additional 15% surcharge.</p>

<h2>12. Early Termination Prior to Pick-Up</h2>
<p>If the Hirer terminates or cancels the Agreement prior to the agreed pick-up date, the Hirer shall remain liable to pay an amount equivalent to four (4) weeks' rent.</p>

<h2>13. General</h2>
<p><strong>13.1</strong> The HIRER shall not assign, pledge, or part with possession of the equipment without consent.</p>
<p><strong>13.2</strong> The HIRER indemnifies the OWNER against all liabilities arising from use.</p>
<p><strong>13.3</strong> Variations must be agreed in writing (including via email).</p>

<h2>14. Termination</h2>
<p><strong>14.1</strong> OWNER may terminate if the HIRER breaches this Agreement, appears insolvent, or prejudices OWNER's rights in any way.</p>
<p><strong>14.2</strong> On early termination, all unpaid charges become immediately due.</p>
<p><strong>14.3</strong> Termination does not affect accrued rights.</p>
<p><strong>14.4</strong> The HIRER must immediately return the Truck and Trailer upon termination.</p>

<h2>15. Disputes</h2>
<p><strong>15.1</strong> In the event of a dispute, both parties agree to meet and negotiate in good faith.</p>

<h2>16. Debt Recovery Costs</h2>
<p><strong>16.1</strong> If the Hirer fails to make any payment due under this Agreement and the debt is referred to a debt collection agency or legal representative, SS Rentals shall be entitled to recover all reasonable costs incurred in recovering the outstanding amount.</p>

<h2>17. Early Termination by Hirer</h2>
<p>If the Hirer terminates this Agreement prior to the agreed rental period end date, the Renter will be liable to pay an early termination fee equal to <strong>Two (2) weeks' rent</strong>. This fee shall be payable immediately upon termination.</p>
