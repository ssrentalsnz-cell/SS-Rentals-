const CsvImportModal = ({open, onClose, parsed, onApprove}) => {
  if (!open||!parsed) return null;
  const existing = loadBankTxns();
  const existingIds = new Set(existing.map(t=>t.id));
  const newTxns = parsed.filter(t=>!existingIds.has(t.id));
  const dupes = parsed.length - newTxns.length;
  const incomeNew = newTxns.filter(t=>t.amount>0).reduce((a,t)=>a+t.amount,0);
  const expenseNew = newTxns.filter(t=>t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0);

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:620}}>
        <div className="modal-header">
          <span className="modal-title">Review CSV Import</span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">
          <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:20}}>
            {[
              {l:'Total in File',v:parsed.length,c:'var(--text)'},
              {l:'New Transactions',v:newTxns.length,c:'var(--green)'},
              {l:'Duplicates Skipped',v:dupes,c:'var(--orange)'},
              {l:'Already Stored',v:existing.length,c:'var(--blue)'},
            ].map(k=>(
              <div key={k.l} style={{padding:'12px',background:'var(--bg3)',borderRadius:8,textAlign:'center'}}>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>{k.l}</div>
                <div style={{fontSize:22,fontWeight:800,color:k.c}}>{k.v}</div>
              </div>
            ))}
          </div>
          {newTxns.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',gap:12,marginBottom:12}}>
                <div style={{flex:1,padding:'10px 14px',background:'rgba(39,174,96,0.1)',borderRadius:8,border:'1px solid rgba(39,174,96,0.3)'}}>
                  <div style={{fontSize:11,color:'var(--text3)'}}>New Income</div>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--green)'}}>{fmtCur(incomeNew)}</div>
                </div>
                <div style={{flex:1,padding:'10px 14px',background:'rgba(217,43,43,0.1)',borderRadius:8,border:'1px solid rgba(217,43,43,0.3)'}}>
                  <div style={{fontSize:11,color:'var(--text3)'}}>New Expenses</div>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--red-light)'}}>{fmtCur(expenseNew)}</div>
                </div>
              </div>
              <div style={{maxHeight:220,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8}}>
                <table style={{width:'100%',fontSize:12}}>
                  <thead><tr style={{background:'var(--bg3)'}}><th style={{padding:'8px 10px',textAlign:'left'}}>Date</th><th style={{padding:'8px 10px',textAlign:'left'}}>Payee</th><th style={{padding:'8px 10px',textAlign:'left'}}>Category</th><th style={{padding:'8px 10px',textAlign:'right'}}>Amount</th></tr></thead>
                  <tbody>
                    {newTxns.slice(0,50).map(t=>(
                      <tr key={t.id} style={{borderTop:'1px solid var(--border)'}}>
                        <td style={{padding:'6px 10px',color:'var(--text3)'}}>{t.date}</td>
                        <td style={{padding:'6px 10px',fontWeight:600,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.payee||t.memo}</td>
                        <td style={{padding:'6px 10px'}}><span style={{fontSize:10,color:CATEGORIES[t.category]?.color||'var(--text3)',background:'var(--bg4)',padding:'1px 6px',borderRadius:3}}>{CATEGORIES[t.category]?.label||t.category}</span></td>
                        <td style={{padding:'6px 10px',textAlign:'right',fontWeight:700,color:t.amount>0?'var(--green)':'var(--red-light)'}}>{t.amount>0?'+':''}{fmtCur(Math.abs(t.amount))}</td>
                      </tr>
                    ))}
                    {newTxns.length>50&&<tr><td colSpan={4} style={{padding:'8px 10px',textAlign:'center',color:'var(--text3)',fontSize:11}}>...and {newTxns.length-50} more</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          )}
          {dupes>0&&<div className="alert alert-green" style={{marginBottom:12}}><Icon name="check" size={14}/><span><strong>{dupes} duplicate transaction{dupes>1?'s':''}</strong> detected and skipped — existing data unchanged.</span></div>}
          {newTxns.length===0&&<div className="alert alert-green"><Icon name="check" size={14}/><span>All {parsed.length} transactions already exist — nothing new to import.</span></div>}
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',padding:'16px 24px',borderTop:'1px solid var(--border)'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel — Don&apos;t Import</button>
          <button className="btn btn-primary" disabled={newTxns.length===0} onClick={()=>onApprove(newTxns)}>
            <Icon name="check" size={14}/> Import {newTxns.length} New Transaction{newTxns.length!==1?'s':''}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ─── REPORTS PAGE ────────────────────────────────── */
const ReportsPage = ({theme, xeroConfig, sheetsConfig}) => {
  const [tab,setTab]=useState('pl');
  const [bankTxns,setBankTxns]=useState(()=>loadBankTxns());
  const [bankMeta,setBankMeta]=useState(()=>loadBankMeta());
  const [parsedCsv,setParsedCsv]=useState(null);
  const [showImportModal,setShowImportModal]=useState(false);
  const [xeroFetching,setXeroFetching]=useState(false);
  const [sheetsSyncing,setSheetsSyncing]=useState(false);
  const [statusMsg,setStatusMsg]=useState('');
  const [catFilter,setCatFilter]=useState('all');
  const [searchTxn,setSearchTxn]=useState('');
  const [dateFrom,setDateFrom]=useState('');
  const [dateTo,setDateTo]=useState('');
  const fileRef = useRef();

  const pnlData = bankTxns.length>0 ? buildPnlFromTxns(bankTxns) : PNL_DETAIL;
  const ytdMonths = pnlData.filter(m=>m.month.startsWith('2026'));
  const totalRev=ytdMonths.reduce((a,m)=>a+m.revenue,0);
  const totalExp=ytdMonths.reduce((a,m)=>a+m.expenses,0);
  const totalNet=ytdMonths.reduce((a,m)=>a+m.net,0);
  const totalMaint=ytdMonths.reduce((a,m)=>a+(m.repairs||0),0);
  const totalRUC=ytdMonths.reduce((a,m)=>a+(m.ruc||0)+(m.navman_ruc||0),0);
  const totalLoans=ytdMonths.reduce((a,m)=>a+(m.flexi||0)+(m.heartland||0),0);

  // Handle CSV file selection — parse and show preview modal
  const handleFileSelect = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setStatusMsg('Parsing CSV…');
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = parseASBCsv(ev.target.result);
        if (parsed.length===0) { setStatusMsg('No transactions found — check the file format.'); return; }
        setParsedCsv(parsed);
        setShowImportModal(true);
        setStatusMsg('');
      } catch(err) { setStatusMsg('Error reading file: '+err.message); }
    };
    reader.readAsText(file);
    e.target.value='';
  };

  // Approve import — merge with dedup
  const handleApproveImport = (newTxns) => {
    const existing = loadBankTxns();
    const merged = [...existing, ...newTxns].sort((a,b)=>b.date.localeCompare(a.date));
    saveBankTxns(merged);
    setBankTxns(merged);
    setBankMeta(loadBankMeta());
    setShowImportModal(false);
    setParsedCsv(null);
    setStatusMsg(`✓ Imported ${newTxns.length} new transactions. P&L updated.`);
    // Auto-push to Google Sheets if connected
    if (sheetsConfig?.accessToken && sheetsConfig?.spreadsheetId) {
      syncBankTxnsToSheet(sheetsConfig.accessToken, sheetsConfig.spreadsheetId, merged)
        .then(()=>setStatusMsg(s=>s+' Synced to Sheets.'))
        .catch(()=>{});
    }
  };

  // Pull from Xero bank transactions
  const handleXeroFetch = async () => {
    if (!xeroConfig?.accessToken) { alert('Connect Xero first in Settings → Integrations'); return; }
    setXeroFetching(true); setStatusMsg('Connecting to Xero…');
    try {
      const xeroTxns = await fetchXeroBankTxns(xeroConfig, msg=>setStatusMsg(msg));
      const existing = loadBankTxns();
      const {merged, added, duplicates} = mergeTxns(existing, xeroTxns);
      saveBankTxns(merged); setBankTxns(merged); setBankMeta(loadBankMeta());
      setStatusMsg(`✓ Xero: ${added} new, ${duplicates} duplicates skipped.`);
    } catch(e) { setStatusMsg('Xero error: '+e.message); }
    setXeroFetching(false);
  };

  // Pull from Google Sheets bank tab
  const handleSheetsPull = async () => {
    if (!sheetsConfig?.accessToken) { alert('Connect Google Sheets first'); return; }
    setSheetsSyncing(true); setStatusMsg('Reading from Google Sheets…');
    try {
      const sheetTxns = await pullBankTxnsFromSheet(sheetsConfig.accessToken, sheetsConfig.spreadsheetId);
      const existing = loadBankTxns();
      const {merged, added, duplicates} = mergeTxns(existing, sheetTxns);
      saveBankTxns(merged); setBankTxns(merged); setBankMeta(loadBankMeta());
      setStatusMsg(`✓ Sheets: ${added} new, ${duplicates} duplicates skipped.`);
    } catch(e) { setStatusMsg('Sheets error: '+e.message); }
    setSheetsSyncing(false);
  };

  // Push current txns to Sheets
  const handleSheetsPush = async () => {
    if (!sheetsConfig?.accessToken) { alert('Connect Google Sheets first'); return; }
    setSheetsSyncing(true); setStatusMsg('Pushing to Google Sheets…');
    try {
      await syncBankTxnsToSheet(sheetsConfig.accessToken, sheetsConfig.spreadsheetId, bankTxns);
      setStatusMsg(`✓ ${bankTxns.length} transactions pushed to Google Sheets.`);
    } catch(e) { setStatusMsg('Sheets push error: '+e.message); }
    setSheetsSyncing(false);
  };

  const filteredTxns = bankTxns.filter(t=>{
    if (catFilter!=='all'&&catFilter!=='income_other'&&t.category!==catFilter) return false;
    if (catFilter==='income_other'&&t.category!=='income_other') return false;
    if (searchTxn&&!(t.payee+' '+t.memo).toLowerCase().includes(searchTxn.toLowerCase())) return false;
    if (dateFrom&&t.date<dateFrom) return false;
    if (dateTo&&t.date>dateTo) return false;
    return true;
  });

  const catSummary = Object.entries({...CATEGORIES,income_other:{label:'Other Income',color:'#27AE60',keywords:[]}}).map(([key,cat])=>({
    key, label:cat.label, color:cat.color,
    total:Math.abs(bankTxns.filter(t=>t.category===key).reduce((a,t)=>a+t.amount,0)),
    count:bankTxns.filter(t=>t.category===key).length
  })).filter(c=>c.count>0).sort((a,b)=>b.total-a.total);

  return (
    <div>
      <CsvImportModal open={showImportModal} parsed={parsedCsv} onClose={()=>{setShowImportModal(false);setParsedCsv(null);}} onApprove={handleApproveImport}/>

      <div className="flex items-center justify-between mb-4">
        <div className="tabs" style={{marginBottom:0}}>
          {['pl','bank','vehicles','customers','debtors'].map(t=>(
            <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
              {({pl:'P&L Report',bank:'Bank Transactions',vehicles:'By Vehicle',customers:'By Customer',debtors:'Debtors'})[t]}
              {t==='bank'&&bankTxns.length>0&&<span style={{marginLeft:6,background:'var(--red)',color:'#fff',fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:8}}>{bankTxns.length}</span>}
            </button>
          ))}
        </div>
        <div className="flex gap-2">
          <button className="btn btn-ghost btn-sm"><Icon name="download" size={13}/> Export PDF</button>
          <button className="btn btn-ghost btn-sm"><Icon name="download" size={13}/> Export Excel</button>
        </div>
      </div>

      {/* Bank Transactions Tab */}
      {tab==='bank'&&(
        <div>
          {/* Import toolbar */}
          <div className="card card-sm mb-4" style={{borderLeft:'3px solid var(--blue)'}}>
            <div style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>
                  ASB Bank Transactions
                  {bankMeta&&<span style={{marginLeft:8,fontSize:11,color:'var(--text3)',fontWeight:400}}>{bankMeta.count} stored · last updated {new Date(bankMeta.updated).toLocaleString('en-NZ',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</span>}
                </div>
                {statusMsg&&<div style={{fontSize:12,marginTop:2,color:statusMsg.startsWith('✓')?'var(--green)':statusMsg.startsWith('Error')||statusMsg.includes('error')?'var(--red-light)':'var(--text2)'}}>{statusMsg}</div>}
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={handleFileSelect}/>
                <button className="btn btn-primary btn-sm" onClick={()=>fileRef.current?.click()}>
                  <Icon name="download" size={13}/> Upload ASB CSV
                </button>
                <button className="btn btn-ghost btn-sm" onClick={handleXeroFetch} disabled={xeroFetching} style={{borderColor:'#00B8D9',color:'#00B8D9'}}>
                  <Icon name="sync" size={13} color="#00B8D9"/> {xeroFetching?'Fetching…':'Sync from Xero'}
                </button>
                <button className="btn btn-ghost btn-sm" onClick={handleSheetsPull} disabled={sheetsSyncing} style={{borderColor:'#34A853',color:'#34A853'}}>
                  <Icon name="sheets" size={13} color="#34A853"/> {sheetsSyncing?'Syncing…':'Pull from Sheets'}
                </button>
                <button className="btn btn-ghost btn-sm" onClick={handleSheetsPush} disabled={sheetsSyncing||bankTxns.length===0} style={{borderColor:'#34A853',color:'#34A853'}}>
                  <Icon name="sheets" size={13} color="#34A853"/> Push to Sheets
                </button>
                {bankTxns.length>0&&<button className="btn btn-ghost btn-sm" style={{color:'var(--red-light)'}} onClick={()=>{if(window.confirm('Clear ALL stored bank transactions? This cannot be undone.')){saveBankTxns([]);setBankTxns([]);setBankMeta(null);setStatusMsg('Cleared.');}}}>Clear All</button>}
              </div>
            </div>
          </div>

          {bankTxns.length===0&&(
            <div className="card" style={{textAlign:'center',padding:48}}>
              <div style={{fontSize:40,marginBottom:16}}>🏦</div>
              <div style={{fontWeight:700,fontSize:18,marginBottom:10}}>Connect Your ASB Bank Data</div>
              <div style={{fontSize:13,color:'var(--text2)',marginBottom:28,maxWidth:500,margin:'0 auto 28px'}}>
                Import your ASB statement CSV to automatically track income and expenses and generate real P&amp;L reports. Your data is stored locally — never sent anywhere except Google Sheets if connected.
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,maxWidth:700,margin:'0 auto'}}>
                {[
                  {icon:'📥',title:'Upload ASB CSV',desc:'Log in to asb.co.nz → your account → Export → CSV format → upload here'},
                  {icon:'🔄',title:'Sync from Xero',desc:'If your ASB account is a Xero bank feed, pull transactions directly via the button above'},
                  {icon:'📊',title:'Pull from Sheets',desc:'If you have a Bank Transactions tab in your Google Sheet, pull it in with dedup protection'},
                ].map(c=>(
                  <div key={c.title} style={{padding:'16px',background:'var(--bg3)',borderRadius:10,textAlign:'left'}}>
                    <div style={{fontSize:24,marginBottom:8}}>{c.icon}</div>
                    <div style={{fontWeight:700,marginBottom:6,fontSize:13}}>{c.title}</div>
                    <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.7}}>{c.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {bankTxns.length>0&&(
            <div>
              {/* Category summary cards */}
              <div className="grid mb-4" style={{gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:8}}>
                {catSummary.map(c=>(
                  <div key={c.key} className="card card-sm" style={{cursor:'pointer',borderLeft:`3px solid ${c.color}`,opacity:catFilter!=='all'&&catFilter!==c.key?0.45:1,transition:'opacity 0.15s'}} onClick={()=>setCatFilter(catFilter===c.key?'all':c.key)}>
                    <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',marginBottom:3,lineHeight:1.2}}>{c.label}</div>
                    <div style={{fontSize:17,fontWeight:800,color:c.color}}>{fmtCur(c.total)}</div>
                    <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{c.count} transactions</div>
                  </div>
                ))}
              </div>

              {/* Filters */}
              <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
                <input style={{flex:1,minWidth:160}} placeholder="Search payee or memo…" value={searchTxn} onChange={e=>setSearchTxn(e.target.value)}/>
                <select style={{width:170}} value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
                  <option value="all">All Categories</option>
                  {Object.entries(CATEGORIES).map(([k,c])=><option key={k} value={k}>{c.label}</option>)}
                  <option value="income_other">Other Income</option>
                </select>
                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} title="From date" style={{width:140}}/>
                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} title="To date" style={{width:140}}/>
                {(catFilter!=='all'||searchTxn||dateFrom||dateTo)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setCatFilter('all');setSearchTxn('');setDateFrom('');setDateTo('');}}>Clear Filters</button>}
                <span style={{alignSelf:'center',fontSize:12,color:'var(--text3)'}}>{filteredTxns.length} shown</span>
              </div>

              {/* Transaction table */}
              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Date</th><th>Payee</th><th>Memo</th><th>Category</th><th>Source</th><th style={{textAlign:'right'}}>Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredTxns.slice(0,300).map(t=>(
                      <tr key={t.id}>
                        <td style={{fontSize:12,whiteSpace:'nowrap',color:'var(--text2)'}}>{fmt(t.date)}</td>
                        <td style={{fontWeight:600,fontSize:13,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.payee||'—'}</td>
                        <td style={{fontSize:11,color:'var(--text2)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.memo||'—'}</td>
                        <td>
                          <span style={{fontSize:10,fontWeight:700,color:CATEGORIES[t.category]?.color||'var(--text3)',background:'var(--bg3)',padding:'2px 7px',borderRadius:4,whiteSpace:'nowrap'}}>
                            {CATEGORIES[t.category]?.label||t.category}
                          </span>
                        </td>
                        <td style={{fontSize:10,color:'var(--text3)'}}>{t.source||'csv'}</td>
                        <td style={{textAlign:'right',fontWeight:700,color:t.amount>0?'var(--green)':'var(--red-light)',whiteSpace:'nowrap'}}>
                          {t.amount>0?'+':''}{fmtCur(Math.abs(t.amount))}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {filteredTxns.length>300&&<div style={{textAlign:'center',padding:10,fontSize:12,color:'var(--text3)'}}>Showing 300 of {filteredTxns.length} — use filters to narrow down</div>}
              </div>
            </div>
          )}
        </div>
      )}

      {/* P&L Tab */}
      {tab==='pl'&&(
        <div>
          {bankTxns.length>0&&(
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(39,174,96,0.08)',border:'1px solid rgba(39,174,96,0.25)',borderRadius:8,marginBottom:16,fontSize:12}}>
              <Icon name="check" size={15} color="var(--green)"/>
              <span>P&amp;L generated from <strong style={{color:'var(--green)'}}>{bankTxns.length} real bank transactions</strong> · Latest: {bankTxns[0]?.date?fmt(bankTxns[0].date):'—'} · <span style={{color:'var(--text3)'}}>Duplicates excluded · All figures verified</span></span>
            </div>
          )}
          <div className="grid grid-4 mb-4">
            {[
              {l:'Revenue YTD 2026',v:fmtCur(totalRev),c:'var(--green)'},
              {l:'Expenses YTD 2026',v:fmtCur(totalExp),c:'var(--orange)'},
              {l:'Net Profit YTD',v:fmtCur(totalNet),c:totalNet>=0?'var(--blue)':'var(--red-light)'},
              {l:'Net Margin',v:(totalRev>0?((totalNet/totalRev)*100).toFixed(1):0)+'%',c:'var(--text)'},
            ].map(k=>(<div key={k.l} className="card card-sm"><div className="kpi-label">{k.l}</div><div style={{fontSize:20,fontWeight:800,marginTop:4,color:k.c}}>{k.v}</div></div>))}
          </div>
          <div className="grid grid-4 mb-4">
            {[
              {l:'RUC Costs YTD',v:fmtCur(totalRUC)},
              {l:'Repairs & Maintenance',v:fmtCur(totalMaint)},
              {l:'Loan Repayments',v:fmtCur(totalLoans)},
              {l:'Total Transactions',v:bankTxns.length>0?bankTxns.filter(t=>t.date.startsWith('2026')).length+' txns':'Hardcoded'},
            ].map(k=>(<div key={k.l} className="card card-sm"><div className="kpi-label">{k.l}</div><div style={{fontSize:18,fontWeight:800,marginTop:4}}>{k.v}</div></div>))}
          </div>
          <div className="card mb-4">
            <div className="card-header">
              <span className="card-title">Monthly P&L — {bankTxns.length>0?'From Real Bank Transactions':'Estimated'}</span>
            </div>
            <div className="table-wrap" style={{border:'none',borderRadius:0,margin:'0 -20px'}}>
              <table>
                <thead>
                  <tr>
                    <th>Month</th><th>Revenue</th><th>RUC</th><th>Navman</th><th>Insurance</th><th>Flexi</th><th>Heartland</th><th>Repairs</th><th>Other</th><th>Total Exp</th>
                    <th style={{fontWeight:800}}>Net Profit</th>
                  </tr>
                </thead>
                <tbody>
                  {pnlData.map(m=>(
                    <tr key={m.month} style={{background:m.net<0?'rgba(217,43,43,0.04)':'transparent'}}>
                      <td style={{fontWeight:600}}>{m.month}</td>
                      <td style={{fontWeight:700,color:'var(--green)'}}>{fmtCur(m.revenue)}</td>
                      <td style={{color:'var(--orange)',fontSize:12}}>{(m.ruc||0)>0?fmtCur(m.ruc):'—'}</td>
                      <td style={{fontSize:12}}>{(m.navman_ruc||0)>0?fmtCur(m.navman_ruc):'—'}</td>
                      <td style={{fontSize:12}}>{(m.insurance||0)>0?fmtCur(m.insurance):'—'}</td>
                      <td style={{fontSize:12}}>{(m.flexi||0)>0?fmtCur(m.flexi):'—'}</td>
                      <td style={{fontSize:12}}>{(m.heartland||0)>0?fmtCur(m.heartland):'—'}</td>
                      <td style={{fontSize:12}}>{(m.repairs||0)>0?fmtCur(m.repairs):'—'}</td>
                      <td style={{fontSize:12,color:'var(--text3)'}}>{(m.other||0)>0?fmtCur(m.other):'—'}</td>
                      <td style={{color:'var(--orange)',fontWeight:700}}>{fmtCur(m.expenses)}</td>
                      <td style={{fontWeight:800,fontSize:15,color:m.net>=0?'var(--green)':'var(--red-light)'}}>{fmtCur(m.net)}</td>
                    </tr>
                  ))}
                  <tr style={{borderTop:'2px solid var(--border2)',background:'var(--bg3)'}}>
                    <td style={{fontWeight:800}}>TOTAL</td>
                    <td style={{fontWeight:800,color:'var(--green)'}}>{fmtCur(pnlData.reduce((a,m)=>a+m.revenue,0))}</td>
                    <td style={{fontWeight:700}}>{fmtCur(pnlData.reduce((a,m)=>a+(m.ruc||0),0))}</td>
                    <td style={{fontWeight:700}}>{fmtCur(pnlData.reduce((a,m)=>a+(m.navman_ruc||0),0))}</td>
                    <td style={{fontWeight:700}}>{fmtCur(pnlData.reduce((a,m)=>a+(m.insurance||0),0))}</td>
                    <td style={{fontWeight:700}}>{fmtCur(pnlData.reduce((a,m)=>a+(m.flexi||0),0))}</td>
                    <td style={{fontWeight:700}}>{fmtCur(pnlData.reduce((a,m)=>a+(m.heartland||0),0))}</td>
                    <td style={{fontWeight:700}}>{fmtCur(pnlData.reduce((a,m)=>a+(m.repairs||0),0))}</td>
                    <td style={{fontWeight:700}}>{fmtCur(pnlData.reduce((a,m)=>a+(m.other||0),0))}</td>
                    <td style={{fontWeight:800,color:'var(--orange)'}}>{fmtCur(pnlData.reduce((a,m)=>a+m.expenses,0))}</td>
                    <td style={{fontWeight:800,fontSize:15,color:pnlData.reduce((a,m)=>a+m.net,0)>=0?'var(--green)':'var(--red-light)'}}>{fmtCur(pnlData.reduce((a,m)=>a+m.net,0))}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==='vehicles'&&(
        <div>
          <div className="card mb-4">
            <div className="card-header"><span className="card-title">Revenue vs Maintenance by Vehicle — YTD 2026</span></div>
            <div style={{height:260}}><VehicleRevenueChart theme={theme}/></div>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Vehicle</th><th>Make / Model</th><th>Status</th><th>Revenue YTD</th><th>Maint Cost YTD</th><th>Gross Profit</th><th>Margin</th><th>Downtime</th><th>Utilisation</th></tr></thead>
              <tbody>
                {TRUCKS.map(t=>{const gp=t.rev_ytd-t.maint_ytd;const margin=t.rev_ytd>0?Math.round((gp/t.rev_ytd)*100):0;const util=t.status==='on_hire'?Math.round(((150-t.downtime)/150)*100):0;return(
                  <tr key={t.id}><td style={{fontWeight:700}}>{t.rego}</td><td>{t.make} {t.model}</td>
                  <td><span className={statusBadge(t.status)}>{statusLabel(t.status)}</span></td>
                  <td style={{fontWeight:700,color:'var(--green)'}}>{fmtCur(t.rev_ytd)}</td>
                  <td style={{color:'var(--orange)'}}>{fmtCur(t.maint_ytd)}</td>
                  <td style={{fontWeight:700}}>{fmtCur(gp)}</td>
                  <td style={{color:margin>70?'var(--green)':margin>50?'var(--orange)':'var(--red-light)'}}>{margin}%</td>
                  <td>{t.downtime} days</td>
                  <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="progress" style={{width:60}}><div className="progress-bar" style={{width:util+'%',background:'var(--blue)'}}/></div><span style={{fontSize:12}}>{util}%</span></div></td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='customers'&&(
        <div className="table-wrap">
          <table>
            <thead><tr><th>Customer</th><th>Status</th><th>Weekly Rate</th><th>YTD Revenue</th><th>Outstanding</th><th>Credit Rating</th><th>Payment Terms</th></tr></thead>
            <tbody>
              {CUSTOMERS.filter(c=>c.status==='active').map(c=>(
                <tr key={c.id}>
                  <td style={{fontWeight:700}}>{c.company}</td>
                  <td><span className="badge badge-green">Active</span></td>
                  <td>{c.weekly_truck>0?fmtCur(c.weekly_truck+c.weekly_trailer)+'/wk':'—'}</td>
                  <td style={{fontWeight:700,color:'var(--green)'}}>{fmtCur(c.ytd_revenue)}</td>
                  <td style={{fontWeight:700,color:c.outstanding>0?'var(--red-light)':'var(--text2)'}}>{c.outstanding>0?fmtCur(c.outstanding):'—'}</td>
                  <td><span className={`badge badge-${c.credit_rating==='A+'?'green':c.credit_rating?.startsWith('A')?'blue':'orange'}`}>{c.credit_rating}</span></td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{c.payment_terms}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {tab==='debtors'&&(
        <div>
          {getInvoices().filter(i=>i.status==='overdue').length>0&&(
            <div className="alert alert-red mb-4"><Icon name="warning" size={15}/><div><strong>{fmtCur(getInvoices().filter(i=>i.status==='overdue').reduce((a,i)=>a+i.total,0))} overdue</strong> — {getInvoices().filter(i=>i.status==='overdue').length} invoice(s) outstanding.</div></div>
          )}
          <div className="table-wrap">
            <table>
              <thead><tr><th>Customer</th><th>Invoice</th><th>Due Date</th><th>Amount</th><th>Days Overdue</th><th>Action</th></tr></thead>
              <tbody>
                {getInvoices().filter(i=>i.status==='overdue').map(inv=>(
                  <tr key={inv.id}>
                    <td style={{fontWeight:700}}>{custName(inv.customer)}</td>
                    <td style={{fontWeight:600,fontSize:12}}>{inv.id}</td>
                    <td style={{color:'var(--red-light)',fontWeight:600}}>{fmt(inv.due)}</td>
                    <td style={{fontWeight:800}}>{fmtCur(inv.total)}</td>
                    <td><span style={{color:'var(--red-light)',fontWeight:700}}>{Math.abs(daysDiff(inv.due))} days</span></td>
                    <td><button className="btn btn-primary btn-sm">Send Reminder</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
};

/* ─── NEW HIRE WIZARD ────────────────────────────── */
const NewHireWizard = ({onClose, onCreated, sheetsConfig}) => {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    customer: '', customCustomer: '', isNewCustomer: false,
    startDate: '', endDate: '', hireType: 'weekly',
    truck: '', trailer: '', noTrailer: false,
    weeklyTruck: 0, weeklyTrailer: 0, mileageRate: 0.18, rucRate: 0.062,
    maxMileage: '',
    bond: 5000, bondPaid: false, signed: false, insuranceVerified: false, checklistDone: false,
    notes: '',
  });
  const [confirmed, setConfirmed] = useState(false);
  const [newHireId, setNewHireId] = useState('');

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  // Calculate hire duration and cost
  const calcDuration = () => {
    if (!form.startDate || !form.endDate) return {days:0, weeks:0, months:0, label:'—'};
    const diff = Math.ceil((new Date(form.endDate) - new Date(form.startDate)) / 86400000);
    const weeks = Math.ceil(diff / 7);
    const months = Math.ceil(diff / 30);
    return {days:diff, weeks, months, label: diff===1?'1 day':`${diff} days (${weeks} week${weeks!==1?'s':''})`};
  };

  const calcCost = () => {
    const dur = calcDuration();
    if (!dur.weeks) return 0;
    const total = (form.weeklyTruck + form.weeklyTrailer) * dur.weeks;
    return total;
  };

  // Get available trucks for selected dates
  const getAvailableTrucks = () => {
    if (!form.startDate || !form.endDate) return TRUCKS;
    const effHires = getEffectiveHires().filter(h => h.status === 'active');
    return TRUCKS.filter(t => {
      if (t.status === 'maintenance') return false;
      const conflict = effHires.find(h => {
        if (h.truck !== t.id) return false;
        const hStart = new Date(h.start), hEnd = new Date(h.end);
        const rStart = new Date(form.startDate), rEnd = new Date(form.endDate);
        return rStart <= hEnd && rEnd >= hStart;
      });
      return !conflict;
    });
  };

  const getAvailableTrailers = () => {
    if (!form.startDate || !form.endDate) return TRAILERS;
    const effHires = getEffectiveHires().filter(h => h.status === 'active');
    return TRAILERS.filter(t => {
      if (t.status === 'maintenance') return false;
      const conflict = effHires.find(h => {
        if (h.trailer !== t.id) return false;
        const hStart = new Date(h.start), hEnd = new Date(h.end);
        const rStart = new Date(form.startDate), rEnd = new Date(form.endDate);
        return rStart <= hEnd && rEnd >= hStart;
      });
      return !conflict;
    });
  };

  const availTrucks = getAvailableTrucks();
  const availTrailers = getAvailableTrailers();
  const dur = calcDuration();
  const totalCost = calcCost();

  // Auto-fill rate when truck selected
  const handleTruckSelect = (truckId) => {
    set('truck', truckId);
    const cust = CUSTOMERS.find(c => c.id === form.customer);
    if (cust && cust.weekly_truck) set('weeklyTruck', cust.weekly_truck);
    else {
      const t = TRUCKS.find(t => t.id === truckId);
      set('weeklyTruck', t?.weekly_rate || 2650);
    }
  };

  const handleTrailerSelect = (trailerId) => {
    set('trailer', trailerId);
    const cust = CUSTOMERS.find(c => c.id === form.customer);
    if (cust && cust.weekly_trailer) set('weeklyTrailer', cust.weekly_trailer);
    else set('weeklyTrailer', 550);
  };

  const handleCustomerSelect = (custId) => {
    set('customer', custId);
    const cust = CUSTOMERS.find(c => c.id === custId);
    if (cust) {
      if (cust.weekly_truck) set('weeklyTruck', cust.weekly_truck);
      if (cust.weekly_trailer) set('weeklyTrailer', cust.weekly_trailer);
    }
  };

  const handleConfirm = () => {
    // Create new customer if needed
    let custId = form.customer;
    if (form.customerMode === 'new' && form.newCompany) {
      const newCust = createNewCustomer({
        company: form.newCompany, director: form.newDirector||'',
        contact: form.newContact||form.newDirector||'', phone: form.newPhone||'',
        email: form.newEmail||'', address: form.newAddress||'',
        weekly_truck: form.weeklyTruck, weekly_trailer: form.weeklyTrailer,
      });
      custId = newCust.id;
      set('customer', custId);
    }
    const id = 'H' + String(HIRES.length + 1).padStart(3, '0');
    const newHire = {
      id, customer: custId||form.customer, truck: form.truck,
      trailer: form.noTrailer ? '' : form.trailer,
      start: form.startDate, end: form.endDate,
      status: 'active', hireType: form.hireType,
      weekly_truck: form.weeklyTruck, weekly_trailer: form.noTrailer ? 0 : form.weeklyTrailer,
      mileage_rate: form.mileageRate, ruc_rate: form.rucRate,
      bond: form.bond, bond_paid: form.bondPaid,
      signed: form.signed, insurance_verified: form.insuranceVerified,
      checklist_done: form.checklistDone,
      invoiced_to: form.startDate, next_invoice: form.startDate,
      max_mileage: form.maxMileage || '',
      notes: form.notes,
    };
    HIRES.unshift(newHire);
    // Update truck status
    const truck = TRUCKS.find(t => t.id === form.truck);
    if (truck) { truck.status = 'on_hire'; truck.hirer = form.customer; }
    const trailer = TRAILERS.find(t => t.id === form.trailer);
    if (trailer && !form.noTrailer) { trailer.status = 'on_hire'; trailer.hirer = form.customer; }
    // Save override
    // Save full hire to localStorage overrides so it persists across reloads
    saveHireOverride(id, {
      status:'active', end: form.endDate, start: form.startDate,
      weekly_truck: form.weeklyTruck, weekly_trailer: form.noTrailer ? 0 : form.weeklyTrailer,
      mileage_rate: form.mileageRate, ruc_rate: form.rucRate,
      bond: form.bond, bond_paid: form.bondPaid,
      signed: form.signed, insurance_verified: form.insuranceVerified,
      checklist_done: form.checklistDone,
      max_mileage: form.maxMileage || '',
      notes: form.notes,
      customer: custId || form.customer,
      truck: form.truck,
      trailer: form.noTrailer ? '' : form.trailer,
    });
    // Auto-sync new hire to Google Sheets if connected
    if (sheetsConfig && sheetsConfig.accessToken && sheetsConfig.spreadsheetId) {
      const allHires = getEffectiveHires();
      const hireRows = [
        ['Hire ID','Customer','Truck','Trailer','Start','End','Status','Weekly Rate','Mileage Rate','RUC Rate','Bond','Bond Paid','Signed','Insurance','Max Mileage','Notes'],
        ...allHires.map(h=>[
          h.id,
          CUSTOMERS.find(c=>c.id===h.customer)?.company||h.customer||'',
          TRUCKS.find(t=>t.id===h.truck)?.rego||h.truck||'',
          h.trailer?TRAILERS.find(t=>t.id===h.trailer)?.rego||h.trailer:'',
          h.start,h.end,h.status,
          (h.weekly_truck||0)+(h.weekly_trailer||0),
          h.mileage_rate||0,h.ruc_rate||0,h.bond||0,
          h.bond_paid?'Yes':'No',h.signed?'Yes':'No',h.insurance_verified?'Yes':'No',
          h.max_mileage||'',h.notes||''
        ])
      ];
      syncSheetTab(sheetsConfig.accessToken, sheetsConfig.spreadsheetId, 'Hire Management', hireRows)
        .catch(e => console.warn('Sheets hire sync failed:', e.message));
    }
    setNewHireId(id);
    setConfirmed(true);
  };

  const canProceed = () => {
    if (step === 1) return form.startDate && form.endDate && new Date(form.endDate) > new Date(form.startDate);
    if (step === 2) return form.truck;
    if (step === 3) return form.customer || (form.customerMode==='new' && form.newCompany && form.newPhone);
    if (step === 4) return form.weeklyTruck > 0;
    return true;
  };

  const steps = ['Dates & Type', 'Select Units', 'Customer', 'Rates & Terms', 'Confirm'];

  if (confirmed) {
    const cust = CUSTOMERS.find(c => c.id === form.customer);
    const truck = TRUCKS.find(t => t.id === form.truck);
    const trailer = TRAILERS.find(t => t.id === form.trailer);
    return (
      <div className="modal-overlay">
        <div className="modal" style={{maxWidth:560, textAlign:'center'}}>
          <div style={{padding:'32px 24px'}}>
            <div style={{fontSize:56, marginBottom:16}}>✅</div>
            <div style={{fontSize:22, fontWeight:800, marginBottom:8, color:'var(--green)'}}>Booking Confirmed!</div>
            <div style={{fontSize:14, color:'var(--text2)', marginBottom:24}}>Hire agreement <strong style={{color:'var(--text)'}}>{newHireId}</strong> has been created successfully.</div>
            <div style={{background:'var(--bg3)', borderRadius:12, padding:'16px 20px', marginBottom:24, textAlign:'left'}}>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                {[
                  ['Customer', cust?.company],
                  ['Truck', truck ? truck.rego+' '+truck.make+' '+truck.model : '—'],
                  ['Trailer', trailer&&!form.noTrailer ? trailer.rego+' '+trailer.make : 'None'],
                  ['Start Date', fmt(form.startDate)],
                  ['End Date', fmt(form.endDate)],
                  ['Duration', dur.label],
                  ['Weekly Rate', fmtCur(form.weeklyTruck + (form.noTrailer?0:form.weeklyTrailer))+'/wk'],
                  ['Est. Total', fmtCur(totalCost)],
                ].map(([l,v])=>(
                  <div key={l} style={{padding:'8px 10px', background:'var(--bg4)', borderRadius:8}}>
                    <div style={{fontSize:10, color:'var(--text3)', textTransform:'uppercase', marginBottom:2}}>{l}</div>
                    <div style={{fontSize:13, fontWeight:700}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'center'}}>
              <button className="btn btn-ghost" onClick={onClose}>Close</button>
              <button className="btn btn-primary" onClick={()=>{onCreated();}}>
                <Icon name="check" size={14}/> View Hire Management
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:680}}>
        <div className="modal-header">
          <span className="modal-title" style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon name="plus" size={18} color="var(--red)"/> New Hire Agreement
          </span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>

        {/* Step indicator */}
        <div style={{display:'flex', padding:'0 24px', borderBottom:'1px solid var(--border)', background:'var(--bg3)'}}>
          {steps.map((s,i)=>(
            <div key={s} onClick={()=>i+1<step&&setStep(i+1)}
              style={{flex:1, padding:'12px 4px', textAlign:'center', fontSize:11, fontWeight:700,
                color: step===i+1?'var(--red)':i+1<step?'var(--green)':'var(--text3)',
                borderBottom: step===i+1?'2px solid var(--red)':i+1<step?'2px solid var(--green)':'2px solid transparent',
                cursor: i+1<step?'pointer':'default', transition:'all 0.2s'}}>
              <div style={{fontSize:16, marginBottom:2}}>{i+1<step?'✓':i+1}</div>
              <div style={{textTransform:'uppercase', letterSpacing:.5}}>{s}</div>
            </div>
          ))}
        </div>

        <div className="modal-body">

          {/* STEP 1: Dates & Hire Type */}
          {step===1&&(
            <div>
              <div style={{marginBottom:20}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>When is the hire?</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>Select hire start and end dates to see available units.</div>
              </div>
              <div className="form-row mb-4">
                <div className="form-group">
                  <label>Hire Start Date</label>
                  <input type="date" value={form.startDate} min={new Date().toISOString().slice(0,10)}
                    onChange={e=>{set('startDate',e.target.value); if(form.endDate&&e.target.value>=form.endDate) set('endDate','');}}/>
                </div>
                <div className="form-group">
                  <label>Hire End Date</label>
                  <input type="date" value={form.endDate} min={form.startDate||new Date().toISOString().slice(0,10)}
                    onChange={e=>set('endDate',e.target.value)}/>
                </div>
              </div>
              {dur.days>0&&(
                <div style={{padding:'12px 16px', background:'rgba(39,174,96,0.08)', border:'1px solid rgba(39,174,96,0.2)', borderRadius:8, marginBottom:20, fontSize:13}}>
                  <strong style={{color:'var(--green)'}}>Duration: {dur.label}</strong>
                </div>
              )}
              <div className="form-group mb-4">
                <label>Hire Type</label>
                <div style={{display:'flex', gap:10}}>
                  {[['daily','Daily Hire'],['weekly','Weekly Hire'],['monthly','Monthly Hire']].map(([v,l])=>(
                    <button key={v} className={`btn btn-sm ${form.hireType===v?'btn-primary':'btn-ghost'}`}
                      onClick={()=>set('hireType',v)}
                      style={{flex:1, justifyContent:'center'}}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{padding:'12px 14px', background:'var(--bg3)', borderRadius:8, fontSize:12, color:'var(--text2)'}}>
                <strong>Available units will be shown after selecting dates.</strong><br/>
                Units with conflicting bookings are automatically excluded.
              </div>
            </div>
          )}

          {/* STEP 2: Select Units */}
          {step===2&&(
            <div>
              <div style={{marginBottom:16}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Select Units</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>Showing units available for {fmt(form.startDate)} — {fmt(form.endDate)}</div>
              </div>

              {/* Trucks */}
              <div style={{marginBottom:20}}>
                <div style={{fontWeight:700, fontSize:13, marginBottom:10, display:'flex', alignItems:'center', gap:8}}>
                  Trucks <span style={{fontSize:11, color:'var(--green)', fontWeight:400}}>{availTrucks.length} available</span>
                </div>
                {availTrucks.length===0&&<div style={{padding:16, background:'var(--bg3)', borderRadius:8, color:'var(--text3)', fontSize:13, textAlign:'center'}}>No trucks available for these dates</div>}
                <div style={{display:'grid', gap:8}}>
                  {availTrucks.map(t=>(
                    <div key={t.id} onClick={()=>handleTruckSelect(t.id)}
                      style={{padding:'12px 16px', border:`2px solid ${form.truck===t.id?'var(--red)':'var(--border)'}`,
                        borderRadius:10, cursor:'pointer', background:form.truck===t.id?'rgba(217,43,43,0.06)':'var(--card)',
                        display:'flex', alignItems:'center', gap:14, transition:'all 0.15s'}}>
                      <div style={{width:20, height:20, borderRadius:'50%', border:`2px solid ${form.truck===t.id?'var(--red)':'var(--border2)'}`,
                        background:form.truck===t.id?'var(--red)':'transparent', flexShrink:0}}/>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:800, fontSize:14}}>{t.rego} <span style={{fontWeight:400, color:'var(--text2)', fontSize:12}}>— {t.make} {t.model} {t.year}</span></div>
                        <div style={{fontSize:11, color:'var(--text3)', marginTop:2}}>Odometer: {t.odometer.toLocaleString()} km · COF: {fmt(t.cof_expiry)} · {statusLabel(t.status)}</div>
                      </div>
                      {t.weekly_rate>0&&<div style={{fontSize:13, fontWeight:700, color:'var(--green)'}}>{fmtCur(t.weekly_rate)}/wk</div>}
                    </div>
                  ))}
                </div>
              </div>

              {/* Trailers */}
              <div>
                <div style={{fontWeight:700, fontSize:13, marginBottom:10, display:'flex', alignItems:'center', gap:8, justifyContent:'space-between'}}>
                  <span>Trailers <span style={{fontSize:11, color:'var(--green)', fontWeight:400}}>{availTrailers.length} available</span></span>
                  <label style={{display:'flex', alignItems:'center', gap:6, fontSize:12, cursor:'pointer', textTransform:'none', marginBottom:0, fontWeight:400}}>
                    <input type="checkbox" checked={form.noTrailer} onChange={e=>set('noTrailer',e.target.checked)} style={{width:'auto'}}/>
                    No trailer needed
                  </label>
                </div>
                {!form.noTrailer&&(
                  <div style={{display:'grid', gap:8}}>
                    {availTrailers.map(t=>(
                      <div key={t.id} onClick={()=>handleTrailerSelect(t.id)}
                        style={{padding:'12px 16px', border:`2px solid ${form.trailer===t.id?'var(--blue)':'var(--border)'}`,
                          borderRadius:10, cursor:'pointer', background:form.trailer===t.id?'rgba(41,128,185,0.06)':'var(--card)',
                          display:'flex', alignItems:'center', gap:14, transition:'all 0.15s'}}>
                        <div style={{width:20, height:20, borderRadius:'50%', border:`2px solid ${form.trailer===t.id?'var(--blue)':'var(--border2)'}`,
                          background:form.trailer===t.id?'var(--blue)':'transparent', flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:800, fontSize:14}}>{t.rego} <span style={{fontWeight:400, color:'var(--text2)', fontSize:12}}>— {t.make} {t.model}</span></div>
                          <div style={{fontSize:11, color:'var(--text3)', marginTop:2}}>COF: {fmt(t.cof_expiry)} · {statusLabel(t.status)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* STEP 3: Customer */}
          {step===3&&(
            <div>
              <div style={{marginBottom:16}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Customer Details</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>Select an existing customer or add a new one.</div>
              </div>

              {/* Toggle: existing vs new */}
              <div style={{display:'flex',gap:0,borderRadius:8,overflow:'hidden',border:'1px solid var(--border2)',marginBottom:16}}>
                {[['existing','Select Existing Customer'],['new','Add New Customer']].map(([v,l])=>(
                  <div key={v} style={{flex:1,padding:'10px',textAlign:'center',background:form.customerMode===v||(!form.customerMode&&v==='existing')?'var(--red)':'var(--bg3)',color:form.customerMode===v||(!form.customerMode&&v==='existing')?'#fff':'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}
                    onClick={()=>{set('customerMode',v); if(v==='new') set('customer','');}}>
                    {l}
                  </div>
                ))}
              </div>

              {/* Existing customer */}
              {(form.customerMode==='existing'||!form.customerMode)&&(
                <div>
                  <div className="form-group mb-3">
                    <label>Search & Select Customer</label>
                    <select value={form.customer} onChange={e=>handleCustomerSelect(e.target.value)}>
                      <option value="">Select customer…</option>
                      {getAllCustomers().sort((a,b)=>a.company.localeCompare(b.company)).map(c=>(
                        <option key={c.id} value={c.id}>{c.company}{c.director?' — '+c.director:''}{c.status!=='active'?' ('+c.status+')':''}</option>
                      ))}
                    </select>
                  </div>
                  {form.customer&&(()=>{
                    const c = getAllCustomers().find(x=>x.id===form.customer);
                    return c ? (
                      <div style={{padding:'12px 16px', background:'var(--bg3)', borderRadius:10, marginBottom:16}}>
                        <div style={{fontWeight:700, marginBottom:8, fontSize:14}}>{c.company}</div>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, fontSize:12}}>
                          {[['Director',c.director||'—'],['Contact',c.contact],['Phone',c.phone],['Email',c.email||'—'],['Address',c.address||'—'],['Credit Rating',c.credit_rating],['Payment Terms',c.payment_terms],['YTD Revenue',fmtCur(c.ytd_revenue||0)]].map(([l,v])=>(
                            <div key={l} style={{padding:'6px 8px',background:'var(--bg4)',borderRadius:6}}>
                              <div style={{fontSize:10,color:'var(--text3)',marginBottom:1}}>{l}</div>
                              <div style={{fontWeight:600,fontSize:12}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        {(c.outstanding||0)>0&&<div style={{marginTop:8, padding:'6px 10px', background:'rgba(217,43,43,0.1)', borderRadius:6, fontSize:12, color:'var(--red-light)'}}>⚠ Outstanding balance: {fmtCur(c.outstanding)}</div>}
                      </div>
                    ) : null;
                  })()}
                </div>
              )}

              {/* New customer */}
              {form.customerMode==='new'&&(
                <div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Company Name <span style={{color:'var(--red)'}}>*</span></label>
                      <input value={form.newCompany||''} onChange={e=>set('newCompany',e.target.value)} placeholder="e.g. Chardikala Limited"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Director Name</label>
                      <input value={form.newDirector||''} onChange={e=>set('newDirector',e.target.value)} placeholder="e.g. Gurpinder Singh"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Contact Person</label>
                      <input value={form.newContact||''} onChange={e=>set('newContact',e.target.value)} placeholder="Contact name"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Cellphone <span style={{color:'var(--red)'}}>*</span></label>
                      <input value={form.newPhone||''} onChange={e=>set('newPhone',e.target.value)} placeholder="e.g. 027 510 0233"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Email Address</label>
                      <input type="email" value={form.newEmail||''} onChange={e=>set('newEmail',e.target.value)} placeholder="email@company.co.nz"/>
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label>Physical Address</label>
                      <input value={form.newAddress||''} onChange={e=>set('newAddress',e.target.value)} placeholder="e.g. 123 Main St, Auckland"/>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:'var(--text3)',background:'var(--bg3)',padding:'8px 12px',borderRadius:6}}>
                    The new customer will be saved to your customer database when the hire is confirmed.
                  </div>
                </div>
              )}

              <div className="form-group mt-3">
                <label>Notes / Special Conditions (optional)</label>
                <textarea value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Any special hire conditions, agreements, or notes…" rows={3}/>
              </div>
            </div>
          )}

          {/* STEP 4: Rates & Terms */}
          {step===4&&(()=>{
            const selTruck = TRUCKS.find(t=>t.id===form.truck);
            const selCust = getAllCustomers().find(c=>c.id===form.customer);
            const prevHire = HIRES.filter(h=>h.customer===form.customer&&h.truck===form.truck).sort((a,b)=>new Date(b.start)-new Date(a.start))[0];
            return (
            <div>
              <div style={{marginBottom:12}}>
                <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Rates & Terms</div>
                <div style={{fontSize:12, color:'var(--text2)'}}>All rates are editable for this booking — changes only apply to this hire agreement.</div>
              </div>

              {/* Smart suggestions bar */}
              {(selCust||selTruck||prevHire)&&(
                <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:12}}>
                  <div style={{fontWeight:700,marginBottom:8,color:'var(--text)',fontSize:13}}>💡 Suggested Rates</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {prevHire&&(
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:'var(--blue)',color:'var(--blue)'}}
                        onClick={()=>{set('weeklyTruck',prevHire.weekly_truck);set('weeklyTrailer',prevHire.weekly_trailer||0);set('mileageRate',prevHire.mileage_rate);set('rucRate',prevHire.ruc_rate);}}>
                        Use last hire rates ({fmtCur(prevHire.weekly_truck+prevHire.weekly_trailer)}/wk)
                      </button>
                    )}
                    {selCust&&selCust.weekly_truck>0&&(
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:'var(--green)',color:'var(--green)'}}
                        onClick={()=>{set('weeklyTruck',selCust.weekly_truck);set('weeklyTrailer',selCust.weekly_trailer||0);}}>
                        Use customer profile ({fmtCur(selCust.weekly_truck)}/wk)
                      </button>
                    )}
                    {selTruck&&selTruck.weekly_rate>0&&(
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:'var(--orange)',color:'var(--orange)'}}
                        onClick={()=>set('weeklyTruck',selTruck.weekly_rate)}>
                        Use truck standard rate ({fmtCur(selTruck.weekly_rate)}/wk)
                      </button>
                    )}
                  </div>
                  {prevHire&&<div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>Last hire: {fmt(prevHire.start)} — {fmt(prevHire.end)} · {truckRego(prevHire.truck)}</div>}
                </div>
              )}

              {/* Hire type pricing selector */}
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--text3)',marginBottom:8,display:'block'}}>Pricing Structure</label>
                <div style={{display:'flex',gap:8}}>
                  {[['daily','Daily'],['weekly','Weekly'],['monthly','Monthly'],['lease','Lease/Contract']].map(([v,l])=>(
                    <button key={v} className={`btn btn-sm ${form.hireType===v?'btn-primary':'btn-ghost'}`}
                      style={{flex:1,justifyContent:'center',fontSize:12}}
                      onClick={()=>{set('hireType',v);
                        if(v==='daily'&&selCust) { set('weeklyTruck',(selCust.weekly_truck||0)/7*1); }
                        if(v==='monthly'&&selCust) { set('weeklyTruck',(selCust.weekly_truck||0)*4); }
                      }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <div className="form-group" style={{marginBottom:0}}>
                  <label style={{display:'flex',justifyContent:'space-between'}}>
                    <span>{form.hireType==='daily'?'Daily':'Weekly'} Truck Rate (NZD) <span style={{color:'var(--red)'}}>*</span></span>
                    {selTruck&&<span style={{color:'var(--text3)',fontWeight:400,fontSize:10}}>{selTruck.rego}</span>}
                  </label>
                  <input type="number" step="0.01" value={form.weeklyTruck} onChange={e=>set('weeklyTruck',parseFloat(e.target.value)||0)}
                    style={{borderColor:form.weeklyTruck>0?'var(--green)':'var(--red)'}}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>
                    {form.hireType==='daily'&&form.weeklyTruck>0&&`≈ ${fmtCur(form.weeklyTruck*7)}/week`}
                    {form.hireType==='monthly'&&form.weeklyTruck>0&&`≈ ${fmtCur(form.weeklyTruck/4)}/week`}
                    {form.hireType==='weekly'&&form.weeklyTruck>0&&`≈ ${fmtCur(form.weeklyTruck/7)}/day`}
                  </div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label>{form.hireType==='daily'?'Daily':'Weekly'} Trailer Rate (NZD)</label>
                  <input type="number" step="0.01" value={form.weeklyTrailer} onChange={e=>set('weeklyTrailer',parseFloat(e.target.value)||0)} disabled={form.noTrailer}
                    style={{opacity:form.noTrailer?0.5:1}}/>
                  {form.noTrailer&&<div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>No trailer selected</div>}
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label style={{display:'flex',justifyContent:'space-between'}}>
                    <span>Mileage Rate ($/km)</span>
                    <span style={{color:'var(--text3)',fontWeight:400,fontSize:10}}>charged to hirer</span>
                  </label>
                  <input type="number" step="0.001" value={form.mileageRate} onChange={e=>set('mileageRate',parseFloat(e.target.value)||0)}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>e.g. 0.18 = 18 cents/km</div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label style={{display:'flex',justifyContent:'space-between'}}>
                    <span>RUC Rate ($/km)</span>
                    <span style={{color:'var(--text3)',fontWeight:400,fontSize:10}}>road user charges</span>
                  </label>
                  <input type="number" step="0.001" value={form.rucRate} onChange={e=>set('rucRate',parseFloat(e.target.value)||0)}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>e.g. 0.062 = standard RUC</div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label>Maximum Mileage <span style={{fontWeight:400,fontSize:10,color:'var(--text3)'}}>appears on schedule</span></label>
                  <input type="text" placeholder="e.g. 130,000 km p.a. (10,800 km per month)" value={form.maxMileage||''} onChange={e=>set('maxMileage',e.target.value)}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>Leave blank to use default</div>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label>Bond Amount (NZD)</label>
                  <input type="number" value={form.bond} onChange={e=>set('bond',parseFloat(e.target.value)||0)}/>
                </div>
                <div className="form-group" style={{marginBottom:0}}>
                  <label>Maintenance Charge ($/km)</label>
                  <input type="number" step="0.001" value={form.maintRate||0} onChange={e=>set('maintRate',parseFloat(e.target.value)||0)}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>Optional — leave 0 if not applicable</div>
                </div>
              </div>

              {/* Live cost summary */}
              <div style={{padding:'12px 16px', background:'rgba(39,174,96,0.08)', border:'1px solid rgba(39,174,96,0.2)', borderRadius:8, marginBottom:16}}>
                <div style={{fontWeight:700, color:'var(--green)', marginBottom:8, fontSize:13}}>Estimated Cost Summary</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12,marginBottom:8}}>
                  <div><span style={{color:'var(--text3)'}}>Truck hire:</span> <strong>{fmtCur(form.weeklyTruck)}/{form.hireType==='daily'?'day':'wk'}</strong></div>
                  {!form.noTrailer&&<div><span style={{color:'var(--text3)'}}>Trailer hire:</span> <strong>{fmtCur(form.weeklyTrailer)}/{form.hireType==='daily'?'day':'wk'}</strong></div>}
                  <div><span style={{color:'var(--text3)'}}>Mileage rate:</span> <strong>${form.mileageRate}/km</strong></div>
                  <div><span style={{color:'var(--text3)'}}>RUC rate:</span> <strong>${form.rucRate}/km</strong></div>
                  <div><span style={{color:'var(--text3)'}}>Duration:</span> <strong>{dur.label}</strong></div>
                  <div><span style={{color:'var(--text3)'}}>Bond:</span> <strong>{fmtCur(form.bond)}</strong></div>
                </div>
                <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid rgba(39,174,96,0.2)', paddingTop:8}}>
                  <span style={{fontWeight:700}}>Est. hire total (excl. mileage/RUC):</span>
                  <strong style={{fontSize:16, color:'var(--green)'}}>{fmtCur(totalCost)}</strong>
                </div>
              </div>

              <div style={{marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',color:'var(--text3)',marginBottom:8,letterSpacing:.5}}>
                  Pre-Hire Checklist
                  {(!form.bondPaid||!form.signed||!form.insuranceVerified||!form.checklistDone)&&
                    <span style={{marginLeft:8,color:'var(--orange)',fontWeight:700,textTransform:'none',fontSize:11}}>
                      ⚠ {[!form.bondPaid,!form.signed,!form.insuranceVerified,!form.checklistDone].filter(Boolean).length} item(s) pending
                    </span>
                  }
                  {(form.bondPaid&&form.signed&&form.insuranceVerified&&form.checklistDone)&&
                    <span style={{marginLeft:8,color:'var(--green)',fontWeight:700,textTransform:'none',fontSize:11}}>✓ All complete</span>
                  }
                </div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
                  {[
                    ['bondPaid','💰 Bond payment received','Collect bond before handover'],
                    ['signed','✍ Digital signature obtained','Get hire agreement signed'],
                    ['insuranceVerified','🛡 Insurance verified','Confirm hirer has valid insurance'],
                    ['checklistDone','📋 Pre-handover checklist done','Complete vehicle condition report'],
                  ].map(([k,l,hint])=>(
                    <label key={k} onClick={()=>set(k,!form[k])}
                      style={{display:'flex',alignItems:'flex-start',gap:10,fontSize:13,textTransform:'none',
                        marginBottom:0,cursor:'pointer',padding:'10px 12px',borderRadius:8,
                        background:form[k]?'rgba(39,174,96,0.08)':'rgba(230,126,34,0.06)',
                        border:`1px solid ${form[k]?'rgba(39,174,96,0.3)':'rgba(230,126,34,0.3)'}`,
                        transition:'all 0.15s'}}>
                      <div style={{width:20,height:20,borderRadius:4,flexShrink:0,marginTop:1,
                        background:form[k]?'var(--green)':'transparent',
                        border:`2px solid ${form[k]?'var(--green)':'var(--orange)'}`,
                        display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {form[k]&&<Icon name="check" size={12} color="#fff"/>}
                      </div>
                      <div>
                        <div style={{fontWeight:600,color:form[k]?'var(--text)':'var(--text2)'}}>{l}</div>
                        {!form[k]&&<div style={{fontSize:11,color:'var(--orange)',marginTop:2}}>{hint}</div>}
                      </div>
                    </label>
                  ))}
                </div>
                {(!form.bondPaid||!form.signed||!form.insuranceVerified||!form.checklistDone)&&(
                  <div style={{marginTop:10,padding:'8px 12px',background:'rgba(230,126,34,0.08)',border:'1px solid rgba(230,126,34,0.25)',borderRadius:8,fontSize:12,color:'var(--orange)'}}>
                    ⚠ Some checklist items are not completed. You can still proceed — items can be completed at time of handover.
                  </div>
                )}
              </div>
            </div>
            );
          })()}

          {/* STEP 5: Confirm */}
          {step===5&&(()=>{
            const cust = CUSTOMERS.find(c=>c.id===form.customer);
            const truck = TRUCKS.find(t=>t.id===form.truck);
            const trailer = TRAILERS.find(t=>t.id===form.trailer);
            return (
              <div>
                <div style={{marginBottom:16}}>
                  <div style={{fontWeight:700, fontSize:15, marginBottom:4}}>Review & Confirm</div>
                  <div style={{fontSize:12, color:'var(--text2)'}}>Review all details before creating the hire agreement.</div>
                </div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20}}>
                  {[
                    ['Customer', cust?.company||'—'],
                    ['Hire Type', form.hireType.charAt(0).toUpperCase()+form.hireType.slice(1)],
                    ['Start Date', fmt(form.startDate)],
                    ['End Date', fmt(form.endDate)],
                    ['Duration', dur.label],
                    ['Truck', truck?`${truck.rego} ${truck.make} ${truck.model}`:'—'],
                    ['Trailer', trailer&&!form.noTrailer?`${trailer.rego} ${trailer.make}`:'None'],
                    ['Weekly Rate', fmtCur(form.weeklyTruck+(form.noTrailer?0:form.weeklyTrailer))+'/wk'],
                    ['Mileage Rate', '$'+form.mileageRate+'/km'],
                    ['RUC Rate', '$'+form.rucRate+'/km'],
                    ['Bond', fmtCur(form.bond)],
                    ['Est. Total', fmtCur(totalCost)],
                  ].map(([l,v])=>(
                    <div key={l} style={{padding:'10px 12px', background:'var(--bg3)', borderRadius:8}}>
                      <div style={{fontSize:10, color:'var(--text3)', textTransform:'uppercase', marginBottom:3}}>{l}</div>
                      <div style={{fontSize:13, fontWeight:700}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--text3)',marginBottom:8}}>Pre-Hire Checklist</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                    {[['bondPaid','Bond Paid'],['signed','Agreement Signed'],['insuranceVerified','Insurance Verified'],['checklistDone','Handover Checklist Done']].map(([k,l])=>(
                      <div key={k} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,
                        background:form[k]?'rgba(39,174,96,0.08)':'rgba(230,126,34,0.06)',
                        border:`1px solid ${form[k]?'rgba(39,174,96,0.25)':'rgba(230,126,34,0.25)'}`}}>
                        <div style={{width:18,height:18,borderRadius:3,flexShrink:0,
                          background:form[k]?'var(--green)':'transparent',
                          border:`2px solid ${form[k]?'var(--green)':'var(--orange)'}`,
                          display:'flex',alignItems:'center',justifyContent:'center'}}>
                          {form[k]&&<Icon name="check" size={11} color="#fff"/>}
                        </div>
                        <span style={{fontSize:12,fontWeight:600,color:form[k]?'var(--text)':'var(--orange)'}}>{form[k]?'✓ ':' '}{l}</span>
                      </div>
                    ))}
                  </div>
                  {(!form.bondPaid||!form.signed||!form.insuranceVerified||!form.checklistDone)&&(
                    <div style={{marginTop:8,padding:'8px 12px',background:'rgba(230,126,34,0.08)',border:'1px solid rgba(230,126,34,0.25)',borderRadius:8,fontSize:12,color:'var(--orange)'}}>
                      ⚠ {[!form.bondPaid&&'Bond not paid',!form.signed&&'Agreement not signed',!form.insuranceVerified&&'Insurance not verified',!form.checklistDone&&'Handover checklist not done'].filter(Boolean).join(' · ')}
                    </div>
                  )}
                </div>
                {form.notes&&<div style={{padding:'10px 14px', background:'var(--bg3)', borderRadius:8, fontSize:12, color:'var(--text2)', marginBottom:16}}><strong>Notes:</strong> {form.notes}</div>}
                <div style={{padding:'12px 14px', background:'rgba(217,43,43,0.06)', border:'1px solid rgba(217,43,43,0.2)', borderRadius:8, fontSize:12}}>
                  <strong>⚠ Confirm:</strong> Clicking &quot;Create Hire Agreement&quot; will book the selected units for the chosen dates and add them to Hire Management.
                </div>
              </div>
            );
          })()}

        </div>

        {/* Footer navigation */}
        <div style={{display:'flex', justifyContent:'space-between', padding:'16px 24px', borderTop:'1px solid var(--border)', background:'var(--bg3)'}}>
          <button className="btn btn-ghost" onClick={()=>step>1?setStep(s=>s-1):onClose()}>
            {step>1?'← Back':'Cancel'}
          </button>
          <div style={{display:'flex', alignItems:'center', gap:12}}>
            <span style={{fontSize:12, color:'var(--text3)'}}>Step {step} of {steps.length}</span>
            {step<5?(
              <button className="btn btn-primary" onClick={()=>setStep(s=>s+1)} disabled={!canProceed()}>
                Continue →
              </button>
            ):(
              <button className="btn btn-primary" onClick={handleConfirm} style={{padding:'10px 24px'}}>
                <Icon name="check" size={15}/> Create Hire Agreement
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─── COMMUNICATIONS ENGINE ──────────────────────── */
const COMM_LOG_KEY = 'ss_rentals_comm_log';
const COMM_TEMPLATES_KEY = 'ss_rentals_comm_templates';
const COMM_SCHEDULE_KEY = 'ss_rentals_comm_schedule';

const loadCommLog = () => { try { return JSON.parse(localStorage.getItem(COMM_LOG_KEY)||'[]'); } catch { return []; } };
const saveCommLog = log => localStorage.setItem(COMM_LOG_KEY, JSON.stringify(log));
const loadTemplates = () => {
  try {
    const saved = JSON.parse(localStorage.getItem(COMM_TEMPLATES_KEY)||'null');
    return saved || DEFAULT_TEMPLATES;
  } catch { return DEFAULT_TEMPLATES; }
};
const saveTemplates = t => localStorage.setItem(COMM_TEMPLATES_KEY, JSON.stringify(t));
const loadSchedule = () => { try { return JSON.parse(localStorage.getItem(COMM_SCHEDULE_KEY)||'[]'); } catch { return []; } };
const saveSchedule = s => localStorage.setItem(COMM_SCHEDULE_KEY, JSON.stringify(s));

const DEFAULT_TEMPLATES = [
  {
    id:'t001', name:'Payment Reminder — Friendly', type:'both', category:'reminder',

const CS_CREDS_KEY = 'ss_rentals_clicksend_creds';
const CS_DEFAULT_CREDS = {username:'ssrentalsnz@gmail.com', apiKey:'1EC9DA95-EDD2-5A7A-1909-3D1BE3C36EAC'};
const loadCSCreds = () => {
  try {

    return stored || CS_DEFAULT_CREDS;
  } catch { return CS_DEFAULT_CREDS; }
};
const saveCSCreds = c => localStorage.setItem(CS_CREDS_KEY, JSON.stringify(c));

// Format NZ phone number to E.164 international format
const formatNZPhone = (phone) => {
  if (!phone) return '';
  let p = phone.replace(/[\s\-().]/g, '');
  if (p.startsWith('+64')) return p;
  if (p.startsWith('64')) return '+' + p;
  if (p.startsWith('0')) return '+64' + p.slice(1);
  return '+64' + p;
};

// Build Basic Auth header from stored ClickSend credentials
const csAuth = () => {
  const creds = loadCSCreds();
  if (!creds?.username || !creds?.apiKey) return null;
  return 'Basic ' + btoa(creds.username + ':' + creds.apiKey);
};

// Send bulk SMS directly via ClickSend REST API (supports CORS from browser)
const sendBulkSMSReal = async (messages) => {
  const auth = csAuth();
  if (!auth) return messages.map(() => ({ status: 'NO_CREDENTIALS', error: 'ClickSend credentials not configured. Go to Settings → SMS Setup.' }));
  try {
    const formatted = messages.map(m => ({
      to: formatNZPhone(m.to),
      body: m.body,
      source: 'SS Rentals',
    }));
    const res = await fetch('https://rest.clicksend.com/v3/sms/send', {
      method: 'POST',
      headers: { 'Authorization': auth, 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: formatted }),
    });
    const data = await res.json();
    if (!res.ok) return messages.map(() => ({ status: 'FAILED', error: data?.response_msg || 'API error ' + res.status }));
    return data?.data?.messages || [];
  } catch(e) { return messages.map(() => ({ status: 'FAILED', error: e.message })); }
};

// Fetch SMS delivery history directly from ClickSend
const fetchSMSHistory = async () => {
  const auth = csAuth();
  if (!auth) return [];
  try {
    const res = await fetch('https://rest.clicksend.com/v3/sms/history?limit=50', {
      headers: { 'Authorization': auth },
    });
    const data = await res.json();
    return data?.data?.data || [];
  } catch(e) { return []; }
};

// Test ClickSend credentials
const testCSCreds = async () => {
  const auth = csAuth();
  if (!auth) return { ok: false, msg: 'No credentials saved.' };
  try {
    const res = await fetch('https://rest.clicksend.com/v3/account', { headers: { 'Authorization': auth } });
    const data = await res.json();
    if (res.ok) return { ok: true, msg: 'Connected! Account: ' + (data?.data?.username || 'OK') + ' · Balance: $' + (data?.data?.balance || '?') };
    return { ok: false, msg: data?.response_msg || 'Auth failed — check username and API key.' };
  } catch(e) { return { ok: false, msg: e.message }; }
};

// Email via mailto (no email API yet)
const sendEmail = (email, subject, body) => {
  const url = 'mailto:'+email+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  window.open(url, '_blank');
  return {status:'opened', channel:'email'};
};

  const [sendResult,setSendResult]=useState(null);

  const overdueCustomers = CUSTOMERS.filter(c=>c.status==='active'&&getInvoices().some(i=>i.customer===c.id&&i.status==='overdue'));
  const activeCustomers = CUSTOMERS.filter(c=>c.status==='active');

  const getCustomerOverdue = (custId) => getInvoices().filter(i=>i.customer===custId&&i.status==='overdue').reduce((a,i)=>a+i.total,0);

  const buildVars = (cust) => {
    const invs = getCustomerInvoices(cust.id);

    const latest = overdue[0]||invs[0];
    const hire = getEffectiveHires().find(h=>h.customer===cust.id&&h.status==='active');

    return {
      company: cust.company,
      contact: cust.contact.split(' ')[0],
      phone: cust.phone,
      email: cust.email,
      invoice_id: latest?.id||'—',
      amount: latest?fmtCur(latest.total):'—',
      due_date: latest?fmt(latest.due):'—',
      days_overdue: latest?Math.max(0,Math.abs(daysDiff(latest.due)))+'':'0',
      period: latest?.period||'—',
      total_outstanding: fmtCur(getCustomerOverdue(cust.id)),
      vehicle: truck?`${truck.rego} ${truck.make} ${truck.model}`:'—',
      end_date: hire?fmt(hire.end):'—',
    };

    if (selectedCustomers.length===displayCustomers.length) setSelectedCustomers([]);
    else setSelectedCustomers(displayCustomers.map(c=>c.id));

    if (selectedCustomers.length===0) { alert('Select at least one customer.'); return; }
    setSending(true); setSendResult(null);
    const msg = useCustom ? customMsg : tpl;

    // Build all messages first
    const allMessages = selectedCustomers.map(custId => {
      const cust = CUSTOMERS.find(c=>c.id===custId);
      if (!cust) return null;
      const vars = buildVars(cust);
      return {
        custId, cust,
        smsText: fillTemplate(msg.sms||'', vars),
        emailSubj: fillTemplate(msg.subject||'', vars),
        emailBody: fillTemplate(msg.email||'', vars),
      };
    }).filter(Boolean);

    const results = [];

    // Send SMS via ClickSend API (bulk for efficiency)

      const smsMessages = allMessages.filter(m=>m.cust.phone).map(m=>({ to: m.cust.phone, body: m.smsText }));

          const r = bulkResults[i];

          const status = ok ? 'sent' : r?.status === 'NO_CREDENTIALS' ? 'failed' : m.cust.phone ? 'failed' : 'no_phone';
          const errNote = (!ok && r?.error) ? r.error : (!ok && r?.status) ? r.status : '';
