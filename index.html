        {[{l:'Total Documents',v:DOCUMENTS.length},{l:'Hire Agreements',v:DOCUMENTS.filter(d=>d.type==='Hire Agreement').length},{l:'Signed',v:DOCUMENTS.filter(d=>d.signed).length},{l:'Expiring Soon',v:2}].map(k=>(
          <div key={k.l} className="card card-sm"><div className="kpi-label">{k.l}</div><div style={{fontSize:22,fontWeight:800,marginTop:4}}>{k.v}</div></div>
        ))}
      </div>
      <div className="grid grid-auto">
        {filtered.map(d=>(
          <div key={d.id} className="card card-sm" style={{cursor:'pointer',transition:'border .15s'}} onMouseEnter={e=>e.currentTarget.style.borderColor='var(--red)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
            <div style={{width:44,height:44,borderRadius:10,background:'rgba(217,43,43,.12)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
              <Icon name="documents" size={22} color="var(--red)"/>
            </div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:4,lineHeight:1.4}}>{d.name}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>{d.type} · {d.size}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>{fmt(d.date)}{d.customer?' · '+custName(d.customer):''}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              {d.signed?<span className="badge badge-green">Signed</span>:<span className="badge badge-gray">Unsigned</span>}
              <button className="btn btn-ghost btn-sm"><Icon name="download" size={13}/></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ─── NAVMAN PAGE ─────────────────────────────────── */
const NAVMAN_DATA_KEY = 'ss_rentals_navman_data';
const loadNavmanData = () => { try { return JSON.parse(localStorage.getItem(NAVMAN_DATA_KEY)||'null'); } catch { return null; } };
const saveNavmanData = d => localStorage.setItem(NAVMAN_DATA_KEY, JSON.stringify(d));

const NavmanPage = () => {
  const initKm = () => {
    const saved = loadNavmanData();
    const defaults = {};
    TRUCKS.forEach(t => { defaults[t.id] = { weekly_km: t.weekly_km, odometer: t.odometer, location: t.location, updated: null }; });
    return saved ? { ...defaults, ...saved } : defaults;
  };
  const [kmData, setKmData] = useState(initKm);
  const [editing, setEditing] = useState(false);
  const [editVals, setEditVals] = useState({});
  const [saved, setSaved] = useState(false);
  const [tab, setTab] = useState('weekly');
  const [history] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ss_rentals_navman_history')||'[]'); } catch { return []; }
  });

  const totalKm = Object.values(kmData).reduce((a,v)=>a+(v.weekly_km||0),0);
  const totalRUC = TRUCKS.reduce((a,t)=>{
    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
    const rate = h?.ruc_rate||0.062;
    return a + (kmData[t.id]?.weekly_km||0)*rate;
  },0);
  const totalMileage = TRUCKS.reduce((a,t)=>{
    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
    const rate = h?.mileage_rate||0;
    return a + (kmData[t.id]?.weekly_km||0)*rate;
  },0);

  const startEdit = () => {
    const vals = {};
    TRUCKS.forEach(t => { vals[t.id] = { weekly_km: kmData[t.id]?.weekly_km||0, odometer: kmData[t.id]?.odometer||t.odometer, location: kmData[t.id]?.location||t.location }; });
    setEditVals(vals);
    setEditing(true);
  };

  const saveEdit = () => {
    const now = new Date().toISOString();
    const updated = {};
    TRUCKS.forEach(t => { updated[t.id] = { ...editVals[t.id], updated: now }; });
    setKmData(updated);
    saveNavmanData(updated);
    // Save to history
    const hist = JSON.parse(localStorage.getItem('ss_rentals_navman_history')||'[]');
    hist.unshift({ date: now, entries: updated });
    if (hist.length > 12) hist.pop();
    localStorage.setItem('ss_rentals_navman_history', JSON.stringify(hist));
    setEditing(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 3000);
  };

  const weekStr = () => {
    const now = new Date();
    const mon = new Date(now); mon.setDate(now.getDate() - now.getDay() + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return `${mon.toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})} – ${sun.toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'})}`;
  };

  return (
    <div>
      {/* Status bar */}
      <div className="card card-sm mb-4" style={{borderLeft:'3px solid var(--orange)',display:'flex',alignItems:'center',gap:16}}>
        <Icon name="navman" size={22} color="var(--orange)"/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13}}>Teletrac Navman — Manual Entry Mode</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>API key requested — awaiting Teletrac Navman approval. Enter weekly km manually below. Will auto-upgrade to live data once API key arrives.</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {saved&&<span className="badge badge-green">✓ Saved</span>}
          <button className="btn btn-primary btn-sm" onClick={startEdit}><Icon name="edit" size={13}/> Update This Week</button>
        </div>
      </div>

      {/* KPI row */}
      <div className="grid grid-4 mb-4">
        {[
          {l:'Active Vehicles',v:TRUCKS.filter(t=>t.status==='on_hire').length+' of '+TRUCKS.length},
          {l:'Total KM This Week',v:totalKm.toLocaleString()+' km'},
          {l:'RUC Charges This Week',v:fmtCur(totalRUC)},
          {l:'Mileage Revenue This Week',v:fmtCur(totalMileage)},
        ].map(k=>(
          <div key={k.l} className="card card-sm"><div className="kpi-label">{k.l}</div><div style={{fontSize:20,fontWeight:800,marginTop:4}}>{k.v}</div></div>
        ))}
      </div>

      <div className="tabs mb-4">
        {['weekly','history'].map(t=><button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t==='weekly'?'This Week':'Entry History'}</button>)}
      </div>

      {tab==='weekly'&&(
        <div>
          {/* Week header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>Week: {weekStr()}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Enter odometer readings and km travelled per truck this week</div>
            </div>
          </div>

          {/* Per-truck entry cards */}
          <div className="grid" style={{gap:14,marginBottom:20}}>
            {TRUCKS.map(t => {
              const d = kmData[t.id] || {};
              const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
              const milRate = h?.mileage_rate||0;
              const rucRate = h?.ruc_rate||0.062;
              const km = d.weekly_km||0;
              const milCharge = km * milRate;
              const rucCharge = km * rucRate;
              const ev = editVals[t.id] || {};
              return (
                <div key={t.id} className="card" style={{borderLeft:`3px solid ${t.status==='on_hire'?'var(--blue)':'var(--border2)'}`}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:16}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                        <span style={{fontWeight:800,fontSize:16}}>{t.rego}</span>
                        <span style={{fontSize:12,color:'var(--text2)'}}>{t.make} {t.model}</span>
                        <span className={statusBadge(t.status)}>{statusLabel(t.status)}</span>
                        {t.hirer&&<span style={{fontSize:12,color:'var(--text3)'}}>→ {custName(t.hirer)}</span>}
                      </div>
                      {editing ? (
                        <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
                          <div className="form-group" style={{marginBottom:0}}>
                            <label>Weekly KM</label>
                            <input type="number" value={ev.weekly_km||''} onChange={e=>setEditVals(v=>({...v,[t.id]:{...v[t.id],weekly_km:parseInt(e.target.value)||0}}))} placeholder="e.g. 3500"/>
                          </div>
                          <div className="form-group" style={{marginBottom:0}}>
                            <label>Current Odometer (km)</label>
                            <input type="number" value={ev.odometer||''} onChange={e=>setEditVals(v=>({...v,[t.id]:{...v[t.id],odometer:parseInt(e.target.value)||0}}))} placeholder="e.g. 354000"/>
                          </div>
                          <div className="form-group" style={{marginBottom:0}}>
                            <label>Current Location</label>
                            <input value={ev.location||''} onChange={e=>setEditVals(v=>({...v,[t.id]:{...v[t.id],location:e.target.value}}))} placeholder="e.g. Auckland — On Road"/>
                          </div>
                        </div>
                      ) : (
                        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10}}>
                          {[
                            ['Weekly KM', km>0?km.toLocaleString()+' km':'Not set', km>0?'var(--text)':'var(--text3)'],
                            ['Odometer', (d.odometer||t.odometer).toLocaleString()+' km','var(--text)'],
                            ['Location', d.location||t.location,'var(--text2)'],
                            ['Mileage Rate', milRate>0?'$'+milRate+'/km':'No charge','var(--text2)'],
                            ['Mileage Charge', milRate>0?fmtCur(milCharge):'—', milCharge>0?'var(--orange)':'var(--text3)'],
                            ['RUC Charge', fmtCur(rucCharge), 'var(--red-light)'],
                          ].map(([l,v,c])=>(
                            <div key={l} style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:8}}>
                              <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>{l}</div>
                              <div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                  {!editing&&km>0&&(
                    <div style={{marginTop:12}}>
                      <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Weekly progress vs 3,000km target</div>
                      <div className="progress">
                        <div className="progress-bar" style={{width:`${Math.min(100,(km/3000)*100)}%`,background:km>4000?'var(--red)':km>3000?'var(--orange)':'var(--blue)'}}/>
                      </div>
                      <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>{km.toLocaleString()} km ({Math.round((km/3000)*100)}% of 3,000km target){km>4000?' — ⚠️ Excessive mileage':''}</div>
                    </div>
                  )}
                  {d.updated&&<div style={{fontSize:10,color:'var(--text3)',marginTop:8}}>Last updated: {new Date(d.updated).toLocaleString('en-NZ')}</div>}
                </div>
              );
            })}
          </div>

          {editing&&(
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginBottom:20}}>
              <button className="btn btn-ghost" onClick={()=>setEditing(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveEdit}><Icon name="check" size={14}/> Save Weekly Data</button>
            </div>
          )}

          {/* Weekly summary */}
          <div className="card" style={{borderLeft:'3px solid var(--green)'}}>
            <div className="card-header"><span className="card-title">Weekly Invoice Summary — Charges to Bill</span><span className="badge badge-blue">{weekStr()}</span></div>
            <div className="table-wrap" style={{border:'none',borderRadius:0,margin:'0 -20px'}}>
              <table>
                <thead><tr><th>Truck</th><th>Customer</th><th>Weekly Hire</th><th>KM This Week</th><th>Mileage Charge</th><th>RUC Charge</th><th>Total to Invoice</th></tr></thead>
                <tbody>
                  {TRUCKS.filter(t=>t.status==='on_hire').map(t=>{
                    const h = HIRES.find(h=>h.truck===t.id&&h.status==='active');
                    const km = kmData[t.id]?.weekly_km||0;
                    const milCharge = km*(h?.mileage_rate||0);
                    const rucCharge = km*(h?.ruc_rate||0.062);
                    const total = (h?.weekly_truck||0)+(h?.weekly_trailer||0)+milCharge+rucCharge;
                    return (
                      <tr key={t.id}>
                        <td style={{fontWeight:700}}>{t.rego}</td>
                        <td>{custName(t.hirer)}</td>
                        <td style={{fontWeight:700}}>{fmtCur((h?.weekly_truck||0)+(h?.weekly_trailer||0))}</td>
                        <td style={{fontWeight:700}}>{km.toLocaleString()} km</td>
                        <td style={{color:'var(--orange)'}}>{milCharge>0?fmtCur(milCharge):'—'}</td>
                        <td style={{color:'var(--red-light)'}}>{fmtCur(rucCharge)}</td>
                        <td style={{fontWeight:800,fontSize:15}}>{fmtCur(total)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==='history'&&(
        <div>
          {history.length===0&&(
            <div className="card" style={{textAlign:'center',padding:40}}>
              <Icon name="navman" size={32} color="var(--text3)"/>
              <div style={{fontSize:14,color:'var(--text2)',marginTop:12}}>No history yet — save your first weekly entry to start tracking.</div>
            </div>
          )}
          {history.map((h,i)=>(
            <div key={i} className="card mb-4">
              <div className="card-header">
                <span className="card-title">Entry — {new Date(h.date).toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</span>
                <span style={{fontSize:12,color:'var(--text3)'}}>{new Date(h.date).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})}</span>
              </div>
              <div className="grid grid-4">
                {TRUCKS.map(t=>{
                  const d = h.entries?.[t.id];
                  if (!d) return null;
                  return (
                    <div key={t.id} style={{padding:'10px 12px',background:'var(--bg3)',borderRadius:8}}>
                      <div style={{fontWeight:700,marginBottom:6}}>{t.rego}</div>
                      <div style={{fontSize:12,color:'var(--text2)'}}>KM: <strong style={{color:'var(--text)'}}>{(d.weekly_km||0).toLocaleString()}</strong></div>
                      <div style={{fontSize:12,color:'var(--text2)'}}>Odo: <strong style={{color:'var(--text)'}}>{(d.odometer||0).toLocaleString()}</strong></div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{d.location}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

                  {sheetsConfig?.spreadsheetId&&<span style={{marginLeft:12}}>Spreadsheet: <code style={{fontSize:10,background:'var(--bg4)',padding:'1px 5px',borderRadius:3}}>{sheetsConfig.spreadsheetId.slice(0,20)}…</code></span>}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end'}}>
                {sheetsConfig?.accessToken ? (
                  <>
                    <button className="btn btn-primary btn-sm" onClick={onManualSync} disabled={syncState?.syncing}>
                      <Icon name="sync" size={13}/> {syncState?.syncing?'Syncing…':'Sync Now'}
                    </button>
                    <button className="btn btn-ghost btn-sm" onClick={onSheetsSetup}>Reconfigure</button>
                  </>
                ) : (
                  <button className="btn btn-primary btn-sm" onClick={onSheetsSetup} style={{background:'#34A853'}}>
                    <Icon name="sheets" size={13}/> Connect
                  </button>
                )}
              </div>
            </div>
            {syncState?.syncing&&(
              <div style={{marginTop:14,padding:'10px 12px',background:'rgba(52,168,83,0.06)',borderRadius:8,border:'1px solid rgba(52,168,83,0.15)'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:12,color:'#34A853',fontWeight:600}}>{syncState.syncMsg||'Syncing…'}</span>
                  <span style={{fontSize:12,color:'var(--text3)'}}>{syncState.syncPct}%</span>
                </div>
                <div className="progress"><div className="progress-bar" style={{width:`${syncState.syncPct}%`,background:'#34A853'}}/></div>
              </div>
            )}
            {sheetsConfig?.accessToken&&!syncState?.syncing&&(
              <div style={{marginTop:14,display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8}}>
                {['Fleet & Trailers','Customers','Hire Management','Invoices','Maintenance','P&L Detail'].map(t=>(
                  <div key={t} style={{padding:'8px 10px',background:'var(--bg3)',borderRadius:7,textAlign:'center',border:'1px solid rgba(52,168,83,0.2)'}}>
                    <div style={{fontSize:9,color:'#34A853',fontWeight:700,textTransform:'uppercase',letterSpacing:.3,marginBottom:2}}>✓</div>
                    <div style={{fontSize:10,color:'var(--text2)',lineHeight:1.3}}>{t}</div>
                  </div>
                ))}
              </div>
            )}
            {syncState?.error&&<div className="alert alert-red" style={{marginTop:12}}><Icon name="warning" size={14}/><span>{syncState.error}</span></div>}
          </div>
          {/* Other integrations */}
          {integrations.map(i=>(
            <div key={i.name} className="card" style={{display:'flex',alignItems:'center',gap:16,borderLeft:`3px solid ${i.status==='connected'?'var(--green)':'var(--border2)'}`}}>
              <div style={{width:48,height:48,borderRadius:12,background:i.status==='connected'?'rgba(39,174,96,.15)':'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name={i.icon} size={24} color={i.status==='connected'?'var(--green)':'var(--text3)'}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{i.name}</div>
                <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{i.desc}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>Last sync: {i.last}</div>
              </div>
              {i.status==='connected'?<span className="badge badge-green">Connected</span>:<button className="btn btn-primary btn-sm">Connect</button>}
            </div>
          ))}
        </div>
      )}

      {tab==='automations'&&(
        <div className="card">
          <div className="card-header"><span className="card-title">Automated Workflows</span><span className="badge badge-blue">6 active</span></div>
          {[
            {name:'Weekly Invoice Generation',trigger:'Every Monday 6:00 AM',action:'Generate invoices for all active hires → Push to Xero → Email customer',active:true},
            {name:'Overdue Invoice Reminder',trigger:'3 days after due date, then weekly',action:'Send email reminder → Log in customer notes → Alert director',active:true},
            {name:'COF Expiry Alert',trigger:'30 days before expiry, then 14, 7, 1',action:'Email director → Create maintenance task → Block vehicle if overdue',active:true},
            {name:'Rego Renewal Reminder',trigger:'30 days before expiry',action:'Email director and operations manager',active:true},
            {name:'Service Due Reminder',trigger:'5,000km before due',action:'Create maintenance task → Email workshop team',active:true},
            {name:'Insurance Expiry Alert',trigger:'60 days before expiry',action:'Email director and customer',active:true},
            {name:'Hire Expiry Reminder',trigger:'14 days before hire end date',action:'Email director with re-hire options',active:false},
          ].map(a=>(
            <div key={a.name} style={{padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:6}}>
                <div style={{fontWeight:700,fontSize:13}}>{a.name}</div>
                <span className={`badge badge-${a.active?'green':'gray'}`}>{a.active?'Active':'Disabled'}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text3)',marginBottom:3}}>Trigger: {a.trigger}</div>
              <div style={{fontSize:12,color:'var(--text2)'}}>Action: {a.action}</div>
            </div>
          ))}
        </div>
      )}

      {tab==='general'&&(
        <div className="grid" style={{gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div className="card"><div className="card-header"><span className="card-title">Company Settings</span></div>
            <div className="form-group"><label>Company Name</label><input defaultValue="SS Rentals Ltd"/></div>
            <div className="form-group"><label>GST Number</label><input defaultValue="123-456-789"/></div>
            <div className="form-group"><label>Address</label><input defaultValue="Auckland, New Zealand"/></div>
            <div className="form-group"><label>Default RUC Rate ($/km)</label><input defaultValue="0.062" type="number"/></div>
            <button className="btn btn-primary btn-sm">Save Changes</button>
          </div>
          <div className="card"><div className="card-header"><span className="card-title">Invoice Settings</span></div>
            <div className="form-group"><label>Invoice Prefix</label><input defaultValue="INV-2026-"/></div>
            <div className="form-group"><label>Default Payment Terms (days)</label><input defaultValue="7" type="number"/></div>
            <div className="form-group"><label>Invoice Day</label><select><option>Monday (weekly)</option><option>Sunday</option></select></div>
            <div className="form-group"><label>GST Rate (%)</label><input defaultValue="15" type="number"/></div>
            <button className="btn btn-primary btn-sm">Save Changes</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ─── GOOGLE SHEETS SETUP MODAL ───────────────────── */
const SheetsSetupModal = ({open, onClose, onSave, initialConfig}) => {
  const [clientId, setClientId] = useState(initialConfig?.clientId||'');
  const [spreadsheetId, setSpreadsheetId] = useState(initialConfig?.spreadsheetId||'');
  const [step, setStep] = useState(1);
  const [status, setStatus] = useState(null); // {ok, msg}
  const [authing, setAuthing] = useState(false);

  const handleAuth = () => {
    if (!clientId || !spreadsheetId) { setStatus({ok:false,msg:'Please fill in both fields first.'}); return; }
    if (!window.google?.accounts?.oauth2) {
      setStatus({ok:false,msg:'Google Identity Services not loaded yet. Wait a moment and try again.'}); return;
    }
    setAuthing(true);
    setStatus(null);
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      callback: (resp) => {
        setAuthing(false);
        if (resp.error) {
          setStatus({ok:false, msg:`Auth error: ${resp.error} — ${resp.error_description||''}`});
          return;
        }
        onSave({
          clientId,
          spreadsheetId,
          accessToken: resp.access_token,
          tokenExpiry: Date.now() + (resp.expires_in||3600)*1000
        });
        onClose();
      },
      error_callback: (err) => {
        setAuthing(false);
        setStatus({ok:false, msg: err.type==='popup_closed' ? 'Popup was closed — please try again.' : `Error: ${err.type}`});
      }
    });
    client.requestAccessToken({prompt:'consent'});
  };

  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:600}}>
        <div className="modal-header">
          <span className="modal-title" style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon name="sheets" size={20} color="#34A853"/> Google Sheets Live Sync
          </span>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>
        <div className="modal-body">
          <div style={{background:'rgba(52,168,83,0.08)',border:'1px solid rgba(52,168,83,0.25)',borderRadius:10,padding:'14px 16px',marginBottom:20,fontSize:13,lineHeight:1.7}}>
            <strong style={{color:'#34A853'}}>What gets synced (6 tabs):</strong><br/>
            Fleet &amp; Trailers &nbsp;·&nbsp; Customers &nbsp;·&nbsp; Hire Management &nbsp;·&nbsp; Invoices &nbsp;·&nbsp; Maintenance &nbsp;·&nbsp; P&amp;L Detail<br/>
            <span style={{color:'var(--text3)'}}>Auto-syncs every 5 minutes. Manual trigger available anytime.</span>
          </div>

          <div style={{display:'flex',gap:0,borderRadius:8,overflow:'hidden',border:'1px solid var(--border2)',marginBottom:20}}>
            {['1. Credentials','2. Authorise'].map((s,i)=>(
              <div key={s} style={{flex:1,padding:'10px',textAlign:'center',background:step===i+1?'var(--red)':'var(--bg3)',color:step===i+1?'#fff':'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}} onClick={()=>setStep(i+1)}>{s}</div>
            ))}
          </div>

          {step===1&&(
            <div>
              <div className="form-group">
                <label>Google OAuth 2.0 Client ID</label>
                <input value={clientId} onChange={e=>setClientId(e.target.value)} placeholder="123456789-abc...apps.googleusercontent.com"/>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>
                  <strong>console.cloud.google.com</strong> → APIs &amp; Services → Enable <em>Google Sheets API</em> → Credentials → Create OAuth 2.0 Client ID (Web Application type).
                </div>
              </div>
              <div className="form-group">
                <label>Google Spreadsheet ID</label>
                <input value={spreadsheetId} onChange={e=>setSpreadsheetId(e.target.value)} placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"/>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>
                  From your Google Sheet URL: docs.google.com/spreadsheets/d/<strong style={{color:'var(--text)'}}>THIS_PART</strong>/edit
                </div>
              </div>
              <div style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:16,fontSize:12,lineHeight:1.8,borderLeft:'3px solid var(--orange)'}}>
                <strong>Required setup in Google Cloud Console:</strong><br/>
                1. OAuth consent screen → App name: <em>SS Rentals</em> → User type: <em>External</em><br/>
                2. OAuth Client → Authorised JavaScript Origins → add: <code style={{background:'var(--bg4)',padding:'1px 6px',borderRadius:3}}>{window.location.origin}</code><br/>
                3. Make sure your Google account has <strong>edit access</strong> to the spreadsheet
              </div>
              <button className="btn btn-primary" onClick={()=>setStep(2)} disabled={!clientId||!spreadsheetId}>Continue →</button>
            </div>
          )}

          {step===2&&(
            <div>
              <div className="alert alert-green" style={{marginBottom:16}}>
                <Icon name="info" size={15}/>
                <div>Uses Google Identity Services (GIS) — Google&apos;s current secure auth method. A consent popup will appear. Your token stays in your browser only.</div>
              </div>
              <div style={{padding:'12px 14px',background:'var(--bg3)',borderRadius:8,marginBottom:16,fontSize:12,lineHeight:1.8}}>
                <strong>Client ID:</strong> <code style={{fontSize:11,wordBreak:'break-all'}}>{clientId}</code><br/>
                <strong>Spreadsheet:</strong> <code style={{fontSize:11}}>{spreadsheetId}</code>
              </div>
              {status&&(
                <div className={`alert alert-${status.ok?'green':'red'}`} style={{marginBottom:14}}>
                  <Icon name={status.ok?'check':'warning'} size={15}/>
                  <span>{status.msg}</span>
                </div>
              )}
              <button className="btn btn-primary" onClick={handleAuth} disabled={authing} style={{background:'#34A853'}}>
                {authing
                  ? <><div style={{width:14,height:14,border:'2px solid #fff',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/> Waiting for Google…</>
                  : <><Icon name="sheets" size={15}/> Sign in with Google &amp; Authorise</>
                }
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ─── SYNC STATUS BAR (header widget) ─────────────── */
const SyncStatusBar = ({syncState, onManualSync, onOpenSetup}) => {
  const [countdown, setCountdown] = useState(300);
  useEffect(()=>{
    if (!syncState.configured) return;
    const iv = setInterval(()=>{
      const elapsed = syncState.lastSync ? Math.floor((Date.now()-syncState.lastSync.getTime())/1000) : 300;
      setCountdown(Math.max(0,300-elapsed));
    },1000);
    return ()=>clearInterval(iv);
  },[syncState.lastSync, syncState.configured]);

  const mm = String(Math.floor(countdown/60)).padStart(2,'0');
  const ss2 = String(countdown%60).padStart(2,'0');
  const pct = (countdown/300)*100;

  if (!syncState.configured) {
    return (
      <button className="btn btn-ghost btn-sm" onClick={onOpenSetup} style={{gap:6,borderColor:'rgba(52,168,83,0.4)',color:'#34A853'}}>
        <Icon name="sheets" size={14} color="#34A853"/> Connect Sheets
      </button>
    );
  }
  return (
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      {syncState.syncing ? (
        <div style={{display:'flex',alignItems:'center',gap:7,padding:'5px 12px',background:'rgba(52,168,83,0.1)',border:'1px solid rgba(52,168,83,0.3)',borderRadius:7}}>
          <div style={{width:14,height:14,border:'2px solid #34A853',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
          <span style={{fontSize:12,fontWeight:600,color:'#34A853'}}>{syncState.syncMsg||'Syncing…'}</span>
          {syncState.syncPct>0&&<span style={{fontSize:11,color:'var(--text3)'}}>{syncState.syncPct}%</span>}
        </div>
      ) : (
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,cursor:'pointer'}} onClick={onManualSync} title="Click to sync now">
          <div style={{width:7,height:7,borderRadius:'50%',background:'#34A853',boxShadow:'0 0 0 3px rgba(52,168,83,0.2)'}}/>
          <span style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>Sheets</span>
          {syncState.lastSync&&<span style={{fontSize:11,color:'var(--text3)'}}>synced {syncState.lastSync.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})}</span>}
          <span style={{fontSize:11,color:'var(--text3)',fontFamily:'monospace'}}>{mm}:{ss2}</span>
          <div style={{width:28,height:3,background:'var(--border2)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${100-pct}%`,background:'#34A853',borderRadius:2,transition:'width 1s linear'}}/>
          </div>
        </div>
      )}
      {syncState.error&&<span style={{fontSize:11,color:'var(--red-light)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={syncState.error}>⚠ {syncState.error}</span>}
    </div>
  );
};

/* ─── MAIN APP ────────────────────────────────────── */
const App = () => {
  const [theme,setTheme]=useState('light');
  const [page,setPage]=useState('dashboard');
  const [sheetsSetupOpen, setSheetsSetupOpen] = useState(false);
  const [showNewHireWizard, setShowNewHireWizard] = useState(false);
  const [dataRefreshKey, setDataRefreshKey] = useState(0);
  const [sheetsConfig, setSheetsConfig] = useState(()=>loadSheetsConfig());
  const [syncState, setSyncState] = useState({configured:false,syncing:false,lastSync:null,error:null,syncMsg:'',syncPct:0});
  const autoSyncTimer = useRef(null);
  const syncInProgress = useRef(false);
  // Xero state
  const [xeroConfig, setXeroConfig] = useState(()=>loadXeroConfig());
  const [xeroSyncState, setXeroSyncState] = useState({configured:false,syncing:false,lastSync:null,error:null,syncMsg:'',updates:[]});
  const xeroSyncInProgress = useRef(false);

  useEffect(()=>{document.body.className=theme==='light'?'light':'';},[theme]);

  // Handle Xero OAuth callback (PKCE redirect back to app)
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const savedState = sessionStorage.getItem('xero_state') || localStorage.getItem('xero_state_backup');
    localStorage.removeItem('xero_state_backup');
    if (code && state && state === savedState) {
      window.history.replaceState({}, '', window.location.pathname);
      exchangeXeroCode(code).then(tokens => {
        const cfg = { ...tokens, tenantId: null };
        saveXeroConfig(cfg);
        setXeroConfig(cfg);
        setXeroSyncState(s=>({...s, error:null, configured:true}));
      }).catch(e => {
        const msg = 'Token exchange failed: ' + e.message;
        setXeroSyncState(s=>({...s, error:msg}));
        alert('Xero auth error: ' + e.message + '\n\nPlease go to Settings → Integrations and try Disconnect then Connect Xero again.');
      });
    }
  }, []);

  useEffect(()=>{
    setXeroSyncState(s=>({...s, configured:!!(xeroConfig?.accessToken)}));
  },[xeroConfig]);

  const doXeroSync = useCallback(async () => {
    if (xeroSyncInProgress.current) return;
    if (!xeroConfig?.accessToken) { alert('Xero not connected — please connect first.'); return; }
    xeroSyncInProgress.current = true;
    setXeroSyncState(s=>({...s,syncing:true,error:null,syncMsg:'Starting…'}));
    await syncXeroToApp(
      xeroConfig,
      (msg,pct)=>setXeroSyncState(s=>({...s,syncMsg:msg})),
      (ts,updates,total)=>{
        setXeroSyncState(s=>({...s,syncing:false,lastSync:ts,syncMsg:'',updates}));
        xeroSyncInProgress.current=false;
        if(updates.length>0) alert('Xero sync complete! Updated '+updates.length+' invoice(s): '+updates.map(u=>u.id+' → '+u.newStatus).join(', '));
        else alert('Xero sync complete — '+total+' invoices checked, no status changes found.\n\nNote: invoices must have matching numbers in both Xero and this app (e.g. INV-0268).');
      },
      (err)=>{
        setXeroSyncState(s=>({...s,syncing:false,error:err,syncMsg:''}));
        xeroSyncInProgress.current=false;
        alert('Xero sync failed: '+err);
      }
    );
  },[xeroConfig]);

  useEffect(()=>{
    setSyncState(s=>({...s,configured:!!(sheetsConfig?.accessToken&&sheetsConfig?.spreadsheetId)}));
  },[sheetsConfig]);

  const doSync = useCallback(async (cfg) => {
    if (syncInProgress.current) return;
    const config = cfg || sheetsConfig;
    if (!config?.accessToken || !config?.spreadsheetId) return;
    syncInProgress.current = true;
    setSyncState(s=>({...s,syncing:true,error:null,syncMsg:'Starting…',syncPct:0}));
    await runFullSync(
      config,
      (msg,pct)=>setSyncState(s=>({...s,syncMsg:msg,syncPct:pct})),
      (ts)=>{setSyncState(s=>({...s,syncing:false,lastSync:ts,syncMsg:'',syncPct:0}));syncInProgress.current=false;setDataRefreshKey(k=>k+1);},
      (err)=>{setSyncState(s=>({...s,syncing:false,error:err,syncMsg:'',syncPct:0}));syncInProgress.current=false;}
    );
  },[sheetsConfig]);

  // 5-minute auto-sync trigger
  useEffect(()=>{
    if (!sheetsConfig?.accessToken) return;
    if (autoSyncTimer.current) clearInterval(autoSyncTimer.current);
    doSync(sheetsConfig);
    autoSyncTimer.current = setInterval(()=>doSync(), 5*60*1000);
    return ()=>clearInterval(autoSyncTimer.current);
  },[sheetsConfig]);

  const handleSaveConfig = (cfg) => { saveSheetsConfig(cfg); setSheetsConfig(cfg); };

  const pages={
    dashboard:<Dashboard theme={theme} setPage={setPage}/>,
    fleet:<FleetPage theme={theme}/>,
    customers:<CustomersPage/>,
    hires:<HiresPage refreshKey={dataRefreshKey}/>,
    invoicing:<InvoicingPage/>,
    maintenance:<MaintenancePage/>,
    reports:<ReportsPage theme={theme} xeroConfig={xeroConfig} sheetsConfig={sheetsConfig}/>,
    communications:<CommunicationsPage/>,
    documents:<DocumentsPage/>,
    navman:<NavmanPage/>,
    settings:<SettingsPage sheetsConfig={sheetsConfig} syncState={syncState} onSheetsSetup={()=>setSheetsSetupOpen(true)} onManualSync={()=>doSync()} xeroConfig={xeroConfig} xeroSyncState={xeroSyncState} onXeroConnect={startXeroAuth} onXeroSync={doXeroSync} onXeroDisconnect={()=>{clearXeroConfig();setXeroConfig(null);}} onXeroDiag={async()=>{ try { const t=xeroConfig?.accessToken; if(!t){alert('Not connected');return;} const r=await fetch('https://xero-proxy.ssrentalsnz.workers.dev/xero-api/connections',{headers:{Authorization:'Bearer '+t}}); const d=await r.json(); alert('Connection OK! Orgs: '+JSON.stringify(d.map(x=>x.tenantName))); } catch(e){alert('Error: '+e.message);}}}/>,
  };

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage}/>
      <div className="main">
        <Header page={page} theme={theme} toggleTheme={()=>setTheme(t=>t==='dark'?'light':'dark')}
          syncState={syncState} onManualSync={()=>doSync()} onOpenSetup={()=>setSheetsSetupOpen(true)}
          xeroSyncState={xeroSyncState} onXeroSync={doXeroSync} onNewHire={()=>setShowNewHireWizard(true)}/>
        <div className="content">{pages[page]||<Dashboard theme={theme} setPage={setPage}/>}</div>
      </div>
      <SheetsSetupModal open={sheetsSetupOpen} onClose={()=>setSheetsSetupOpen(false)} onSave={handleSaveConfig} initialConfig={sheetsConfig}/>
      {showNewHireWizard&&<NewHireWizard onClose={()=>setShowNewHireWizard(false)} onCreated={()=>{setShowNewHireWizard(false);setDataRefreshKey(k=>k+1);}}/>}
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
